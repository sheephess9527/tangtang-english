                    </div>

                    <div className="w-full aspect-[3/4] perspective-1000 cursor-pointer mb-8" onClick={() => setFlipped(!flipped)}>
                        <div className={`relative w-full h-full transition-transform duration-700 transform-style-3d shadow-[0_20px_40px_rgba(0,0,0,0.08)] rounded-[2rem] ${flipped ? 'rotate-y-180' : 'active:scale-[0.98]'}`}>
                            <div className="absolute inset-0 bg-white border border-slate-100 rounded-[2rem] flex flex-col items-center justify-center p-8 text-center backface-hidden shadow-inner">
                                <span className="text-2xl font-bold text-slate-800 tracking-tight mb-8 whitespace-pre-wrap leading-relaxed">{card.f}</span>
                                {card.type !== 'grammar' && (
                                    <button onClick={(e) => handlePlayAudio(card.f, e)} className="p-4 bg-blue-50 active:bg-blue-100 rounded-full transition-all text-blue-500 shadow-inner">
                                        <Volume2 className={`w-8 h-8 ${playingWord === card.f ? 'animate-pulse text-blue-400' : ''}`} />
                                    </button>
                                )}
                                <div className="absolute bottom-6 text-slate-300 text-xs font-medium flex items-center gap-1">
                                    <RotateCcw className="w-3 h-3" /> 点击翻转
                                </div>
                            </div>
                            <div className="absolute inset-0 bg-gradient-to-br from-indigo-500 to-blue-500 rounded-[2rem] flex flex-col items-center justify-center p-8 text-center text-white rotate-y-180 backface-hidden shadow-inner overflow-y-auto">
                                <span className="text-[17px] font-semibold leading-relaxed whitespace-pre-wrap">{card.b}</span>
                            </div>
                        </div>
                    </div>

                    {flipped ? (
                        <div className="flex gap-4 w-full animate-in fade-in slide-in-from-bottom-2">
                            <button onClick={() => handleNext('unknown')} className="flex-1 py-4 btn-ghost text-rose-500 border border-rose-100 flex justify-center items-center gap-1">
                                <XCircle className="w-5 h-5" /> 还不知道
                            </button>
                            <button onClick={() => handleNext('known')} className="flex-1 py-4 btn-ok flex justify-center items-center gap-1">
                                <CheckCircle2 className="w-5 h-5" /> 记住了
                            </button>
                        </div>
                    ) : (
                        <div className="h-[58px] w-full flex items-center justify-center text-slate-400 text-sm font-medium">请点击卡片查看答案</div>
                    )}
                </div>
            );
        };

        // ==========================================
        // 7. 主应用程序
        // ==========================================
        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [currentUser, setCurrentUser] = useState('');  // 'tangtang' | 'mama'
            const [activeBookId, setActiveBookId] = useState('B1');
            const [activeUnit, setActiveUnit] = useState(1);
            const [tab, setTab] = useState('notes');
            const [playingWord, setPlayingWord] = useState(null);
            const [sidebarOpen, setSidebarOpen] = useState(false);
            // ── 每位用户数据完全隔离：同一个 key 下按用户分区 ──────────
            const userPrefix = currentUser || 'guest';
            const [allUsersData, setAllUsersData] = useLocalStorage('tt_all_users_v2', {});

            const userData     = allUsersData[userPrefix] || {};
            const masteryData  = userData.mastery   || {};
            const progressData = userData.progress  || {};
            const cardLoopData = userData.cardLoop  || {};
            const mistakeBank  = userData.mistakes  || [];

            const setMasteryData = (updater) => setAllUsersData(prev => {
                const u = prev[userPrefix] || {};
                const next = typeof updater === 'function' ? updater(u.mastery || {}) : updater;
                return { ...prev, [userPrefix]: { ...u, mastery: next } };
            });
            const setProgressData = (updater) => setAllUsersData(prev => {
                const u = prev[userPrefix] || {};
                const next = typeof updater === 'function' ? updater(u.progress || {}) : updater;
                return { ...prev, [userPrefix]: { ...u, progress: next } };
            });
            const setCardLoopData = (updater) => setAllUsersData(prev => {
                const u = prev[userPrefix] || {};
                const next = typeof updater === 'function' ? updater(u.cardLoop || {}) : updater;
                return { ...prev, [userPrefix]: { ...u, cardLoop: next } };
            });
            const setMistakeBank = (updater) => setAllUsersData(prev => {
                const u = prev[userPrefix] || {};
                const next = typeof updater === 'function' ? updater(u.mistakes || []) : updater;
                return { ...prev, [userPrefix]: { ...u, mistakes: next } };
            });

            const normalizeProgressRecord = (record) => {
                const base = {
                    started: false,
                    attempts: 0,
                    completed: false,
                    totalQuestions: 0,
                    totalCorrect: 0,
                    totalAnswered: 0,
                    bestScore: 0,
                    lastScore: 0,
                    fullAttempts: 0,
                    focusAttempts: 0,
                    completedQuizCount: 0,
                    currentSessionAnswered: 0,
                    currentSessionTotal: 0,
                    currentSessionMode: '',
                    lastMode: '',
                    lastPracticedAt: ''
                };
                if (typeof record === 'number') {
                    return { ...base, attempts: 1, completed: true, bestScore: record, lastScore: record, lastMode: '旧版记录' };
                }
                return { ...base, ...(record || {}) };
            };

            const getUnitProgress = (key) => normalizeProgressRecord(progressData[key] ?? masteryData[key]);

            const buildInitialCardQueue = (unitData, unitKey, mistakeBank = []) => {
                const baseCards = generateCards(unitData);
                const errorCards = mistakeBank
                    .filter(m => m.unitKey === unitKey)
                    .map(m => ({
                        id: `err-${m.id}`,
                        f: m.q,
                        b: `${m.wrongOpt}

✅ 正确答案：${m.correctOpt}

解析：${m.rat}`,
                        type: 'error'
                    }));
                return [...errorCards, ...baseCards].map((card, index) => ({ ...card, _seed: `${card.id}-${index}` }));
            };

            const normalizeCardLoopRecord = (record) => ({
                queue: [],
                wrongIds: [],
                masteredIds: [],
                rounds: 0,
                reviewed: 0,
                completed: false,
                totalBaseCards: 0,
                lastStudiedAt: '',
                ...(record || {})
            });

            const startCardLoop = (keepWrongOnly = false) => {
                const existing = normalizeCardLoopRecord(cardLoopData[unitKey]);
                const fullDeck = buildInitialCardQueue(dbData, unitKey, mistakeBank);
                let queue = [];
                let rounds = existing.rounds || 0;
                let masteredIds = [];

                if (keepWrongOnly) {
                    // 一轮结束后 queue 已被清空，打叉卡片要按 wrongIds 从完整卡池里重建
                    const wrongIds = existing.wrongIds || [];
                    const wrongCards = fullDeck.filter(card => wrongIds.includes(card.id));
                    if (wrongCards.length === 0) {
                        alert('当前没有需要重新循环的打叉卡片。');
                        return;
                    }
                    queue = shuffle(wrongCards).map((card, index) => ({ ...card, _seed: `${card.id}-retry-${rounds + 1}-${index}` }));
                    rounds = rounds + 1;
                    masteredIds = existing.masteredIds || [];
                } else {
                    queue = shuffle(fullDeck).map((card, index) => ({ ...card, _seed: `${card.id}-round1-${index}` }));
                    rounds = 1;
                }

                setCardLoopData(prev => ({
                    ...prev,
                    [unitKey]: {
                        queue,
                        wrongIds: [],
                        masteredIds,
                        rounds,
                        reviewed: 0,
                        completed: false,
                        totalBaseCards: fullDeck.length,
                        lastStudiedAt: new Date().toLocaleString('zh-CN', { hour12: false })
                    }
                }));
                setActiveCards(queue);
                setTab('cards');
            };


            const unitKey = `${activeBookId}-${activeUnit}`;
            const dbData = useMemo(() => getUnitData(unitKey), [unitKey]);
            const [quizArr, setQuizArr] = useState([]);
            const [qIdx, setQIdx] = useState(0);
            const [ansIdx, setAnsIdx] = useState(null);
            const [score, setScore] = useState(0);
            const [sessionCorrect, setSessionCorrect] = useState(0);
            const [sessionAnswered, setSessionAnswered] = useState(0);
            const [sessionModeLabel, setSessionModeLabel] = useState('');
            const [isFinished, setIsFinished] = useState(false);
            const [isReinforcement, setIsReinforcement] = useState(false);
            const [activeCards, setActiveCards] = useState([]);

            useEffect(() => {
                if (tab !== 'cards') return;
                const existing = normalizeCardLoopRecord(cardLoopData[unitKey]);
                if (existing.queue && existing.queue.length > 0) {
                    setActiveCards(existing.queue);
                } else if ((existing.rounds || 0) > 0) {
                    // 本轮已刷完：保持空队列以显示结算页，不要自动重置整副卡片
                    setActiveCards([]);
                } else {
                    // 从未开始过：自动生成第一轮
                    const initialQueue = shuffle(buildInitialCardQueue(dbData, unitKey, mistakeBank)).map((card, index) => ({ ...card, _seed: `${card.id}-auto-${index}` }));
                    setActiveCards(initialQueue);
                    setCardLoopData(prev => ({
                        ...prev,
                        [unitKey]: {
                            ...normalizeCardLoopRecord(prev[unitKey]),
                            queue: initialQueue,
                            wrongIds: [],
                            masteredIds: [],
                            rounds: 1,
                            reviewed: 0,
                            completed: false,
                            totalBaseCards: initialQueue.length,
                            lastStudiedAt: new Date().toLocaleString('zh-CN', { hour12: false })
                        }
                    }));
                }
            }, [tab, unitKey, dbData, mistakeBank, cardLoopData]);

            const handleUpdateCardStatus = (card, status) => {
                const current = normalizeCardLoopRecord(cardLoopData[unitKey]);
                const currentQueue = current.queue && current.queue.length ? current.queue : activeCards;
                if (!currentQueue || currentQueue.length === 0) return;

                const nextQueue = currentQueue.slice(1);
                let wrongIds = current.wrongIds || [];
                let masteredIds = current.masteredIds || [];

                if (status === 'known') {
                    wrongIds = wrongIds.filter(id => id !== card.id);
                    masteredIds = unique([...masteredIds, card.id]);
                } else {
                    if (!wrongIds.includes(card.id)) wrongIds = [...wrongIds, card.id];
                    masteredIds = masteredIds.filter(id => id !== card.id);
                }

                setActiveCards(nextQueue);
                setCardLoopData(prev => ({
                    ...prev,
                    [unitKey]: {
                        ...normalizeCardLoopRecord(prev[unitKey]),
                        queue: nextQueue,
                        wrongIds,
                        masteredIds,
                        reviewed: (current.reviewed || 0) + 1,
                        completed: nextQueue.length === 0,
                        lastStudiedAt: new Date().toLocaleString('zh-CN', { hour12: false })
                    }
                }));
            };

            const playAudio = useCallback((text, e) => {
                if (e) e.stopPropagation();
                if (!text || !window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                setPlayingWord(text);
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85;
                utterance.onend = () => setPlayingWord(null);
                utterance.onerror = () => setPlayingWord(null);
                window.speechSynthesis.speak(utterance);
            }, []);

            const startQuiz = (mode = 'full') => {
                const isGaokao = mode === 'gaokao';
                const qs = generateZhejiangQuiz(dbData, isGaokao, unitKey);
                const modeLabel = isGaokao ? '重点练习' : '单元练习';
                setQuizArr(qs);
                setQIdx(0);
                setScore(0);
                setSessionCorrect(0);
                setSessionAnswered(0);
                setSessionModeLabel(modeLabel);
                setAnsIdx(null);
                setIsFinished(false);
                setIsReinforcement(false);
                setProgressData(prev => {
                    const existing = normalizeProgressRecord(prev[unitKey] ?? masteryData[unitKey]);
                    return {
                        ...prev,
                        [unitKey]: {
                            ...existing,
                            started: true,
                            currentSessionAnswered: 0,
                            currentSessionTotal: qs.length,
                            currentSessionMode: modeLabel,
                            lastMode: modeLabel,
                            lastPracticedAt: new Date().toLocaleString('zh-CN', { hour12: false })
                        }
                    };
                });
                setTab(isGaokao ? 'gaokaoquiz' : 'quiz');
            };

            const startReinforcement = (mistakeMeta) => {
                const qs = buildReinforcementQs(mistakeMeta);
                if (qs.length === 0) return alert('当前题目暂无可强化练习内容');
                setQuizArr(qs);
                setQIdx(0);
                setScore(0);
                setAnsIdx(null);
                setIsFinished(false);
                setIsReinforcement(true);
                setTab('quiz');
            };

            const handleAnswer = (idx) => {
                if (ansIdx !== null) return;
                setAnsIdx(idx);
                const currentQ = quizArr[qIdx];
                const isCorrect = idx === currentQ.ans;
                if (isCorrect) {
                    setScore(s => s + 1);
                    setSessionCorrect(s => s + 1);
                } else if (!isReinforcement && tab !== 'cards') {
                    const mistakeCard = {
                        id: Date.now() + Math.random(),
                        unitKey,
                        q: currentQ.q,
                        wrongOpt: currentQ.opts[idx],
                        correctOpt: currentQ.opts[currentQ.ans],
                        rat: currentQ.rat,
                        meta: currentQ.meta,
                    };
                    setMistakeBank(prev => [mistakeCard, ...prev]);
                }

                if (!isReinforcement && (tab === 'quiz' || tab === 'gaokaoquiz')) {
                    setSessionAnswered(s => s + 1);
                    setProgressData(prev => {
                        const existing = normalizeProgressRecord(prev[unitKey] ?? masteryData[unitKey]);
                        const modeLabel = tab === 'gaokaoquiz' ? '重点练习' : '单元练习';
                        return {
                            ...prev,
                            [unitKey]: {
                                ...existing,
                                started: true,
                                totalAnswered: existing.totalAnswered + 1,
                                totalCorrect: existing.totalCorrect + (isCorrect ? 1 : 0),
                                currentSessionAnswered: Math.min((existing.currentSessionTotal || quizArr.length || 0), (existing.currentSessionAnswered || 0) + 1),
                                currentSessionTotal: existing.currentSessionTotal || quizArr.length,
                                currentSessionMode: modeLabel,
                                lastMode: modeLabel,
                                lastPracticedAt: new Date().toLocaleString('zh-CN', { hour12: false })
                            }
                        };
                    });
                }
            };

            const nextQuestion = () => {
                if (qIdx < quizArr.length - 1) {
                    setQIdx(i => i + 1);
                    setAnsIdx(null);
                } else {
                    setIsFinished(true);
                    if (!isReinforcement && (tab === 'quiz' || tab === 'gaokaoquiz')) {
                        const finalCorrect = sessionCorrect;
                        const finalScore = Math.round((finalCorrect / Math.max(1, quizArr.length)) * 100);
                        setMasteryData(prev => {
                            const existing = typeof prev[unitKey] === 'number' ? prev[unitKey] : (prev[unitKey]?.bestScore || 0);
                            return { ...prev, [unitKey]: Math.max(existing, finalScore) };
                        });
                        setProgressData(prev => {
                            const existing = normalizeProgressRecord(prev[unitKey] ?? masteryData[unitKey]);
                            const isFocusMode = tab === 'gaokaoquiz';
                            return {
                                ...prev,
                                [unitKey]: {
                                    ...existing,
                                    started: true,
                                    attempts: existing.attempts + 1,
                                    completed: true,
                                    totalQuestions: existing.totalQuestions + quizArr.length,
                                    bestScore: Math.max(existing.bestScore, finalScore),
                                    lastScore: finalScore,
                                    fullAttempts: existing.fullAttempts + (isFocusMode ? 0 : 1),
                                    focusAttempts: existing.focusAttempts + (isFocusMode ? 1 : 0),
                                    completedQuizCount: existing.completedQuizCount + 1,
                                    currentSessionAnswered: quizArr.length,
                                    currentSessionTotal: quizArr.length,
                                    currentSessionMode: isFocusMode ? '重点练习' : '单元练习',
                                    lastMode: isFocusMode ? '重点练习' : '单元练习',
                                    lastPracticedAt: new Date().toLocaleString('zh-CN', { hour12: false })
                                }
                            };
                        });
                    }
                }
            };

            const navItems = [
                { id: 'notes', label: '核心笔记', icon: <BookOpen className="w-4 h-4" /> },
                { id: 'gaokao', label: '重点练习', icon: <Award className="w-4 h-4" /> },
                { id: 'cards', label: '互动卡片', icon: <Layers className="w-4 h-4" /> },
                { id: 'mistakes', label: '错题库', icon: <AlertCircle className="w-4 h-4" /> },
                { id: 'mastery', label: '进度', icon: <BarChart3 className="w-4 h-4" /> },
            ];

            const currentBookName = SYLLABUS.find((b) => b.id === activeBookId)?.name || '教材';
            const currentTabLabel = navItems.find((item) => item.id === (tab === 'gaokaoquiz' ? 'gaokao' : tab))?.label || '学习中心';

            if (!isLoggedIn) return <LoginScreen onLogin={(user) => { setCurrentUser(user); setIsLoggedIn(true); }} />;

            const renderMainContent = () => {
                if (tab === 'notes') {
                    return (
                        <div className="space-y-6">
                            <div className="card-lg p-6 md:p-8 xl:p-10">
                                {dbData.msg && (
                                    <div className="mb-10 teacher-banner p-6 flex items-start gap-4">
                                        <div className="bg-white/20 p-2.5 rounded-xl shrink-0">
                                            <Lightbulb className="w-6 h-6 text-white" />
                                        </div>
                                        <div>
                                            <h3 className="font-bold text-white mb-1 text-base">老师寄语</h3>
                                            <p className="text-blue-50 text-sm md:text-base leading-relaxed">{dbData.msg}</p>
                                        </div>
                                    </div>
                                )}

                                <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3">Level 1</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-10">
                                    {dbData.words.map((w, i) => (
                                        <div key={i} className="bg-slate-50 p-4 rounded-2xl flex items-start justify-between group active:bg-slate-100 cursor-pointer hover:bg-white hover:shadow-md border border-transparent hover:border-blue-100 transition-all" onClick={(e) => playAudio(w.w, e)}>
                                            <div className="flex-1 pr-3">
                                                <div className={`font-black text-xl mb-1 ${playingWord === w.w ? 'text-blue-500' : 'text-slate-800'} group-hover:text-blue-600 transition-colors`}>{w.w}</div>
                                                <div className="text-sm font-medium text-slate-500 mb-3">{w.m}</div>
                                                <div className="flex flex-col items-start gap-1.5">
                                                    <span className="text-[9px] font-bold text-slate-400 bg-slate-200/50 px-2 py-0.5 rounded-full uppercase tracking-wider">Usage</span>
                                                    <div className="text-xs font-bold text-blue-700 bg-blue-50 px-2.5 py-1.5 rounded-lg inline-block border border-blue-100/50">{w.d}</div>
                                                </div>
                                            </div>
                                            <Volume2 className={`w-5 h-5 flex-shrink-0 mt-1 ${playingWord === w.w ? 'text-blue-500' : 'text-slate-300'} group-hover:text-blue-400 transition-colors`} />
                                        </div>
                                    ))}
                                </div>

                                {dbData.l2 && dbData.l2.length > 0 && (
                                    <>
                                        <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3">Level 2</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-10">
                                            {dbData.l2.map((w, i) => (
                                                <div key={i} className="bg-indigo-50/60 p-4 rounded-2xl flex items-start justify-between group active:bg-indigo-100 cursor-pointer hover:bg-white hover:shadow-md border border-indigo-100/50 hover:border-indigo-200 transition-all" onClick={(e) => playAudio(w.w, e)}>
                                                    <div className="flex-1 pr-3">
                                                        <div className={`font-black text-xl mb-1 ${playingWord === w.w ? 'text-indigo-600' : 'text-indigo-900'} group-hover:text-indigo-600 transition-colors`}>{w.w}</div>
                                                        <div className="text-sm font-medium text-indigo-700">{w.m}</div>
                                                    </div>
                                                    <Volume2 className={`w-5 h-5 flex-shrink-0 mt-1 ${playingWord === w.w ? 'text-indigo-600' : 'text-indigo-300'} group-hover:text-indigo-500 transition-colors`} />
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                )}

                                <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3">Grammar</h3>
                                <div className="space-y-4 mb-10">
                                    {dbData.grammar.map((g, i) => (
                                        <div key={i} className="bg-slate-900 text-white p-6 rounded-[24px] shadow-md">
                                            <h4 className="font-bold mb-3 flex items-center gap-2 text-amber-400"><Target className="w-5 h-5" />{g.t}</h4>
                                            <p className="text-[15px] font-medium leading-relaxed opacity-90 mb-4 whitespace-pre-wrap">{g.r}</p>
                                            <div className="bg-white/10 p-4 rounded-xl text-sm font-medium leading-relaxed border border-white/5"><span className="text-amber-300 mr-2">例句：</span>{g.p}</div>
                                        </div>
                                    ))}
                                </div>

                                <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3">Sentences</h3>
                                <div className="space-y-3">
                                    {dbData.sentences.map((s, i) => (
                                        <div key={i} className="p-5 bg-emerald-50 rounded-2xl active:bg-emerald-100 cursor-pointer" onClick={(e) => playAudio(s.e, e)}>
                                            <p className={`font-bold italic text-lg mb-2 leading-relaxed ${playingWord === s.e ? 'text-emerald-600' : 'text-emerald-900'}`}>{s.e}</p>
                                            <p className="text-sm font-medium text-emerald-700">{s.z}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    );
                }

                if (tab === 'cards') {
                    const cardRecord = normalizeCardLoopRecord(cardLoopData[unitKey]);
                    const currentWrongCount = cardRecord.queue.length === 0 ? (cardRecord.wrongIds || []).length : activeCards.filter(card => (cardRecord.wrongIds || []).includes(card.id)).length;
                    return <FlashcardCarousel cards={activeCards} playingWord={playingWord} handlePlayAudio={playAudio} onUpdateCardStatus={handleUpdateCardStatus} loopStats={{ total: (cardRecord.queue && cardRecord.queue.length > 0 ? cardRecord.queue.length : activeCards.length) || 0, rounds: cardRecord.rounds || 1, wrongCount: currentWrongCount }} onRestartLoop={() => startCardLoop(true)} onResetAllCards={() => startCardLoop(false)} />;
                }

                if (tab === 'quiz' || tab === 'gaokaoquiz') {
                    return (
                        <div className="max-w-xl mx-auto">
                            {!isFinished ? (
                                <div className="card-lg p-6 md:p-8">
                                    <div className="flex justify-between items-center mb-6">
                                        <span className={`px-3 py-1 rounded-lg text-[11px] font-bold tracking-wide ${isReinforcement ? 'bg-amber-100 text-amber-700' : tab === 'gaokaoquiz' ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-100 text-slate-600'}`}>{isReinforcement ? '强化练习' : tab === 'gaokaoquiz' ? '重点练习' : '单元测验'}</span>
                                        <span className="text-xs font-bold text-slate-400">{qIdx + 1} / {quizArr.length}</span>
                                    </div>

                                    {quizArr[qIdx]?.source && (
                                        <div className="flex gap-2 mb-3">
                                            <span className="px-2 py-0.5 rounded-md text-[10px] font-bold bg-violet-100 text-violet-700 tracking-wide">AI生成</span>
                                            {quizArr[qIdx]?.needsReview && <span className="px-2 py-0.5 rounded-md text-[10px] font-bold bg-amber-100 text-amber-700 tracking-wide">需复核</span>}
                                        </div>
                                    )}
                                    <p className="text-[17px] font-semibold leading-relaxed mb-6 whitespace-pre-wrap">{quizArr[qIdx]?.q}</p>

                                    <div className="space-y-3">
                                        {quizArr[qIdx]?.opts.map((opt, i) => (
                                            <button key={i} onClick={() => handleAnswer(i)} className={`w-full p-4 rounded-2xl border-2 text-left transition-all flex items-center justify-between text-[15px] font-bold ${ansIdx === null ? 'border-slate-100 bg-white active:bg-slate-50 hover:border-blue-200' : i === quizArr[qIdx].ans ? 'option-correct text-emerald-800' : ansIdx === i ? 'option-wrong text-rose-800' : 'border-slate-50 opacity-40'}`}>
                                                <span>{opt}</span>
                                                {ansIdx !== null && i === quizArr[qIdx].ans && <CheckCircle2 className="w-5 h-5 text-emerald-500" />}
                                                {ansIdx !== null && ansIdx === i && i !== quizArr[qIdx].ans && <XCircle className="w-5 h-5 text-rose-500" />}
                                            </button>
                                        ))}
                                    </div>

                                    {ansIdx !== null && (
                                        <div className="mt-8">
                                            <div className="p-5 bg-slate-50 rounded-2xl mb-6">
                                                <div className="text-blue-500 font-bold text-[11px] mb-2 uppercase tracking-widest">Explanation</div>
                                                <p className="text-slate-700 text-sm font-medium leading-relaxed whitespace-pre-wrap">{quizArr[qIdx]?.rat}</p>
                                            </div>
                                            <button onClick={nextQuestion} className="w-full bg-gradient-to-r from-blue-500 to-indigo-500 text-white py-4 rounded-2xl font-bold text-[17px] active:scale-95 transition-transform shadow-lg shadow-blue-500/20">{qIdx === quizArr.length - 1 ? '查看成绩' : '下一题'}</button>
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="text-center bg-white rounded-[32px] p-10 shadow-[0_10px_40px_rgba(15,23,42,0.06)] border border-white/70">
                                    <div className="w-20 h-20 bg-gradient-to-br from-blue-500 to-indigo-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-500/30">
                                        <CheckCircle2 className="w-10 h-10 text-white" />
                                    </div>
                                    <h2 className="text-2xl font-bold mb-2 tracking-tight">{isReinforcement ? '强化练习完成' : tab === 'gaokaoquiz' ? '真题完成' : '测验完成'}</h2>
                                    <div className="text-6xl font-bold text-blue-500 mb-8 tracking-tighter">{Math.round((score / quizArr.length) * 100)}<span className="text-xl text-slate-300 ml-1 font-medium">%</span></div>
                                    {(tab === 'quiz' || tab === 'gaokaoquiz') && !isReinforcement && <button onClick={() => setTab('mistakes')} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold mb-3 active:scale-95 transition-transform">查看错题</button>}
                                    <button onClick={() => startQuiz(tab === 'gaokaoquiz' ? 'gaokao' : 'full')} className="w-full bg-slate-100 text-slate-700 py-4 rounded-2xl font-bold active:bg-slate-200">重新开始</button>
                                </div>
                            )}
                        </div>
                    );
                }

                if (tab === 'mistakes') {
                    return (
                        <div>
                            <h2 className="text-2xl font-bold tracking-tight mb-6">错题库</h2>
                            {mistakeBank.length === 0 ? (
                                <div className="text-center p-10 card-lg text-slate-400 font-medium">还没有错题，继续保持。</div>
                            ) : (
                                <div className="space-y-6">
                                    {mistakeBank.map((m) => (
                                        <div key={m.id} className="card-lg p-6 border-l-4 border-rose-500 relative">
                                            <button onClick={() => setMistakeBank((prev) => prev.filter((x) => x.id !== m.id))} className="absolute top-4 right-4 p-2 text-slate-300 active:text-rose-500"><XCircle className="w-5 h-5" /></button>
                                            <div className="text-[10px] font-bold text-slate-400 mb-3 uppercase tracking-wider">{m.unitKey}</div>
                                            <p className="font-semibold text-[15px] mb-4 leading-relaxed whitespace-pre-wrap">{m.q}</p>
                                            <div className="flex flex-col gap-2 mb-4">
                                                <div className="bg-rose-50 text-rose-700 px-3 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2"><XCircle className="w-4 h-4" />{m.wrongOpt}</div>
                                                <div className="bg-emerald-50 text-emerald-700 px-3 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2"><CheckCircle2 className="w-4 h-4" />{m.correctOpt}</div>
                                            </div>
                                            <p className="text-xs font-medium text-slate-500 bg-slate-50 p-4 rounded-xl mb-4 leading-relaxed whitespace-pre-wrap">{m.rat}</p>
                                            {m.meta && <button onClick={() => startReinforcement(m.meta)} className="w-full py-3.5 bg-amber-50 text-amber-700 font-bold rounded-xl active:bg-amber-100 transition-colors flex items-center justify-center gap-2"><Zap className="w-4 h-4" />强化练习</button>}
                                        </div>
                                    ))}
                                    <button onClick={() => setMistakeBank([])} className="w-full mt-6 py-4 btn-ghost text-rose-500">清空错题库</button>
                                </div>
                            )}
                        </div>
                    );
                }

                if (tab === 'mastery') {
                    const bookUnits = [1, 2, 3, 4, 5].map((u) => {
                        const key = `${activeBookId}-${u}`;
                        return {
                            unit: u,
                            key,
                            progress: getUnitProgress(key),
                            cards: normalizeCardLoopRecord(cardLoopData[key])
                        };
                    });

                    const engagedCount = bookUnits.filter(item => item.progress.totalAnswered > 0 || item.cards.reviewed > 0).length;
                    const totalAttempts = bookUnits.reduce((sum, item) => sum + item.progress.attempts, 0);
                    const totalAnswered = bookUnits.reduce((sum, item) => sum + item.progress.totalAnswered, 0);
                    const totalCorrect = bookUnits.reduce((sum, item) => sum + item.progress.totalCorrect, 0);
                    const overallAccuracy = totalAnswered ? Math.round(totalCorrect / totalAnswered * 100) : 0;

                    return (
                        <div className="space-y-6">
                            <div>
                                <h2 className="text-2xl font-bold tracking-tight mb-6">学习进度</h2>
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                                    <div className="card rounded-[28px] p-5">
                                        <div className="text-xs text-slate-400 font-semibold mb-2">已学习单元</div>
                                        <div className="text-3xl font-bold text-slate-900">{engagedCount}<span className="text-base text-slate-400 font-semibold"> / 5</span></div>
                                        <div className="text-sm text-slate-500 mt-2">做过题或刷过卡片都算已学习</div>
                                    </div>
                                    <div className="card rounded-[28px] p-5">
                                        <div className="text-xs text-slate-400 font-semibold mb-2">完成练习次数</div>
                                        <div className="text-3xl font-bold text-slate-900">{totalAttempts}</div>
                                        <div className="text-sm text-slate-500 mt-2">完成一次单元练习或重点练习记 1 次</div>
                                    </div>
                                    <div className="card rounded-[28px] p-5">
                                        <div className="text-xs text-slate-400 font-semibold mb-2">累计作答题数</div>
                                        <div className="text-3xl font-bold text-slate-900">{totalAnswered}</div>
                                        <div className="text-sm text-slate-500 mt-2">按每一道题真实累计</div>
                                    </div>
                                    <div className="card rounded-[28px] p-5">
                                        <div className="text-xs text-slate-400 font-semibold mb-2">累计正确率</div>
                                        <div className="text-3xl font-bold text-slate-900">{overallAccuracy}%</div>
                                        <div className="text-sm text-slate-500 mt-2">基于所有已作答题目计算</div>
                                    </div>
                                </div>
                            </div>

                            <div className="card-lg p-6">
                                <h3 className="font-bold text-[15px] mb-5 border-b border-slate-100 pb-3">{SYLLABUS.find((b) => b.id === activeBookId)?.name}</h3>
                                <div className="space-y-5">
                                    {bookUnits.map(({ unit, key, progress, cards }) => {
                                        const accuracy = progress.totalAnswered ? Math.round(progress.totalCorrect / progress.totalAnswered * 100) : 0;
                                        const cardMastered = cards.masteredIds?.length || 0;
                                        const cardTotal = cards.totalBaseCards || buildInitialCardQueue(getUnitData(key), key, mistakeBank).length;
                                        const cardPercent = cardTotal ? Math.round(cardMastered / cardTotal * 100) : 0;
                                        const quizPercent = progress.currentSessionTotal ? Math.round(progress.currentSessionAnswered / progress.currentSessionTotal * 100) : (progress.attempts > 0 ? 100 : 0);
                                        const overallBar = Math.max(progress.bestScore, cardPercent, (progress.totalAnswered > 0 || cards.reviewed > 0) ? 8 : 0);
                                        return (
                                            <div key={key} className="card rounded-2xl p-4">
                                                <div className="flex items-start justify-between gap-4 mb-3">
                                                    <div>
                                                        <div className="font-bold text-slate-800">Unit {unit}</div>
                                                        <div className="text-xs text-slate-400 mt-1">{progress.lastPracticedAt || cards.lastStudiedAt || '尚未开始学习'}</div>
                                                    </div>
                                                    <div className="text-right">
                                                        <div className="text-sm font-bold text-blue-600">最佳 {progress.bestScore}%</div>
                                                        <div className="text-xs text-slate-400 mt-1">最近 {progress.lastScore}%</div>
                                                    </div>
                                                </div>

                                                <div className="w-full h-2.5 pbar-track mb-4">
                                                    <div className={`h-full transition-all duration-1000 ${overallBar >= 90 ? 'bg-emerald-500' : overallBar >= 60 ? 'bg-blue-500' : overallBar > 0 ? 'bg-amber-500' : 'bg-slate-200'}`} style={{ width: `${overallBar}%` }} />
                                                </div>

                                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm mb-3">
                                                    <div className="stat-chip px-3 py-2">
                                                        <div className="text-slate-400 text-xs">完成练习</div>
                                                        <div className="font-bold text-slate-700 mt-1">{progress.attempts}</div>
                                                    </div>
                                                    <div className="stat-chip px-3 py-2">
                                                        <div className="text-slate-400 text-xs">累计答题</div>
                                                        <div className="font-bold text-slate-700 mt-1">{progress.totalAnswered}</div>
                                                    </div>
                                                    <div className="stat-chip px-3 py-2">
                                                        <div className="text-slate-400 text-xs">累计正确率</div>
                                                        <div className="font-bold text-slate-700 mt-1">{accuracy}%</div>
                                                    </div>
                                                    <div className="stat-chip px-3 py-2">
                                                        <div className="text-slate-400 text-xs">卡片掌握</div>
                                                        <div className="font-bold text-slate-700 mt-1">{cardMastered}/{cardTotal}</div>
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm">
                                                    <div className="bg-blue-50 rounded-xl px-4 py-3">
                                                        <div className="flex justify-between text-xs text-blue-500 mb-2">
                                                            <span>本次练习进度</span>
                                                            <span>{progress.currentSessionAnswered}/{progress.currentSessionTotal || 0}</span>
                                                        </div>
                                                        <div className="w-full h-2 bg-blue-100 rounded-full overflow-hidden mb-2">
                                                            <div className="h-full bg-blue-500" style={{ width: `${quizPercent}%` }} />
                                                        </div>
                                                        <div className="text-xs text-blue-700">{progress.currentSessionMode || '暂无练习记录'}</div>
                                                    </div>
                                                    <div className="bg-emerald-50 rounded-xl px-4 py-3">
                                                        <div className="flex justify-between text-xs text-emerald-500 mb-2">
                                                            <span>互动卡片进度</span>
                                                            <span>{cardPercent}%</span>
                                                        </div>
                                                        <div className="w-full h-2 bg-emerald-100 rounded-full overflow-hidden mb-2">
                                                            <div className="h-full bg-emerald-500" style={{ width: `${cardPercent}%` }} />
                                                        </div>
                                                        <div className="text-xs text-emerald-700">已掌握 {cardMastered} 张，未清零 {cards.wrongIds?.length || 0} 张</div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    );
                }

                return null;
            };

            return (
                <div className="min-h-screen text-slate-800">
                    <div className="max-w-[1480px] mx-auto p-3 md:p-5">
                        <div className="flex gap-4 md:gap-6">
                            <aside className="hidden lg:flex w-[292px] shrink-0 flex-col glass rounded-[30px] p-4 sticky top-5 h-[calc(100vh-40px)]">
                                <div className="flex items-center gap-3 mb-5">
                                    <div className="bg-gradient-to-br from-indigo-500 to-blue-500 p-2.5 rounded-2xl shadow-lg shadow-blue-500/20">
                                        <GraduationCap className="w-5 h-5 text-white" />
                                    </div>
                                    <div>
                                        <h1 className="font-bold tracking-tight text-lg logo-text">糖糖提分通</h1>
                                        <p className="text-xs text-slate-500">英语提分学习平台</p>
                        {currentUser && <p className="text-xs font-semibold text-blue-500 mt-0.5">{currentUser === 'tangtang' ? '👧 糖糖' : '👩 妈妈'} 的学习空间</p>}
                                    </div>
                                </div>

                                <div className="space-y-3 mb-5">
                                    <div className="relative">
                                        <select value={activeBookId} onChange={(e) => { setActiveBookId(e.target.value); setActiveUnit(1); setTab('notes'); }} className="w-full bg-white/80 border border-slate-200 font-semibold rounded-2xl pl-4 pr-10 py-3 outline-none shadow-sm">
                                            {SYLLABUS.map((b) => <option key={b.id} value={b.id}>{b.name}</option>)}
                                        </select>
                                        <ChevronDown className="w-4 h-4 text-slate-400 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none" />
                                    </div>
                                    <div className="relative">
                                        <select value={activeUnit} onChange={(e) => { setActiveUnit(Number(e.target.value)); setTab('notes'); }} className="w-full bg-white/80 border border-slate-200 font-semibold rounded-2xl pl-4 pr-10 py-3 outline-none shadow-sm">
                                            {[1,2,3,4,5].map((u) => <option key={u} value={u}>Unit {u}</option>)}
                                        </select>
                                        <ChevronDown className="w-4 h-4 text-slate-400 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none" />
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    {navItems.map((item) => (
                                        <button
                                            key={item.id}
                                            onClick={() => { if (item.id === 'gaokao') startQuiz('gaokao'); else setTab(item.id); }}
                                            className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all font-semibold ${((tab === item.id) || (tab === 'gaokaoquiz' && item.id === 'gaokao')) ? 'nav-item active' : 'nav-item'}`}
                                        >
                                            {item.icon}
                                            <span>{item.label}</span>
                                        </button>
                                    ))}
                                </div>

                                <div className="mt-auto">
                                    <button onClick={() => { setIsLoggedIn(false); setCurrentUser(''); }} className="w-full text-xs text-slate-400 hover:text-slate-600 py-2 mb-2 rounded-xl hover:bg-slate-100 transition-all font-medium">退出登录</button>
                                    <div className="rounded-[24px] card p-4">
                                        <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">当前学习</div>
                                        <div className="text-base font-bold text-slate-900 mb-1">{currentBookName}</div>
                                        <div className="text-sm text-slate-500 mb-3">Unit {activeUnit}</div>
                                        <div className="w-full h-2 pbar-track">
                                            <div className="h-full pbar-fill" style={{ width: `${masteryData[unitKey] || 0}%` }} />
                                        </div>
                                        <div className="text-xs text-slate-500 mt-2">掌握度：{masteryData[unitKey] || 0}%</div>
                                    </div>
                                </div>
                            </aside>

                            <section className="flex-1 min-w-0">
                                <div className="lg:hidden sticky top-3 z-40 mb-4">
                                    <div className="rounded-[24px] bg-white/85 backdrop-blur-xl border border-white/70 shadow-[0_8px_30px_rgba(15,23,42,0.06)] px-4 py-3 flex items-center justify-between">
                                        <div className="flex items-center gap-3 min-w-0">
                                            <div className="bg-gradient-to-br from-blue-500 to-indigo-500 p-2 rounded-xl shadow-md shadow-blue-500/20">
                                                <GraduationCap className="w-5 h-5 text-white" />
                                            </div>
                                            <div className="min-w-0">
                                                <div className="font-bold text-slate-900 truncate">糖糖提分通</div>
                                                <div className="text-xs text-slate-500 truncate">{currentBookName} · Unit {activeUnit}{currentUser ? ` · ${currentUser === 'tangtang' ? '糖糖' : '妈妈'}` : ''}</div>
                                            </div>
                                        </div>
                                        <button onClick={() => setSidebarOpen(true)} className="w-10 h-10 rounded-xl bg-slate-100/80 border border-slate-200 flex items-center justify-center">
                                            <Menu className="w-5 h-5 text-slate-700" />
                                        </button>
                                    </div>
                                </div>

                                {sidebarOpen && (
                                    <div className="lg:hidden fixed inset-0 z-50">
                                        <div className="absolute inset-0 bg-slate-900/35 backdrop-blur-sm" onClick={() => setSidebarOpen(false)} />
                                        <div className="absolute left-0 top-0 h-full w-[84%] max-w-[320px] bg-white rounded-r-[28px] shadow-2xl p-4 overflow-y-auto">
                                            <div className="flex items-center justify-between mb-5">
                                                <div className="flex items-center gap-3">
                                                    <div className="bg-gradient-to-br from-blue-500 to-indigo-500 p-2.5 rounded-2xl"><GraduationCap className="w-5 h-5 text-white" /></div>
                                                    <div>
                                                        <h2 className="font-bold text-slate-900">糖糖提分通</h2>
                                                        <p className="text-xs text-slate-500">学习导航</p>
                                                    </div>
                                                </div>
                                                <button onClick={() => setSidebarOpen(false)} className="w-10 h-10 rounded-xl bg-slate-100/80 border border-slate-200 flex items-center justify-center"><X className="w-5 h-5 text-slate-700" /></button>
                                            </div>

                                            <div className="space-y-3 mb-5">
                                                <div className="relative">
                                                    <select value={activeBookId} onChange={(e) => { setActiveBookId(e.target.value); setActiveUnit(1); setTab('notes'); setSidebarOpen(false); }} className="w-full bg-white/80 border border-slate-200 font-semibold rounded-2xl pl-4 pr-10 py-3 outline-none shadow-sm">
                                                        {SYLLABUS.map((b) => <option key={b.id} value={b.id}>{b.name}</option>)}
                                                    </select>
                                                    <ChevronDown className="w-4 h-4 text-slate-400 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none" />
                                                </div>
                                                <div className="relative">
                                                    <select value={activeUnit} onChange={(e) => { setActiveUnit(Number(e.target.value)); setTab('notes'); setSidebarOpen(false); }} className="w-full bg-white/80 border border-slate-200 font-semibold rounded-2xl pl-4 pr-10 py-3 outline-none shadow-sm">
                                                        {[1,2,3,4,5].map((u) => <option key={u} value={u}>Unit {u}</option>)}
                                                    </select>
                                                    <ChevronDown className="w-4 h-4 text-slate-400 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none" />
                                                </div>
                                            </div>

                                            <div className="space-y-2">
                                                {navItems.map((item) => (
                                                    <button
                                                        key={item.id}
                                                        onClick={() => { if (item.id === 'gaokao') startQuiz('gaokao'); else setTab(item.id); setSidebarOpen(false); }}
                                                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all font-semibold ${((tab === item.id) || (tab === 'gaokaoquiz' && item.id === 'gaokao')) ? 'nav-item active' : 'nav-item'}`}
                                                    >
                                                        {item.icon}
                                                        <span>{item.label}</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <div className="rounded-[30px] bg-white/70 backdrop-blur-xl border border-white/70 shadow-[0_8px_30px_rgba(15,23,42,0.05)] px-3 py-3 mb-5">
                                    <div className="flex items-center justify-between gap-3 flex-wrap">
                                        <div>
                                            <div className="text-xs font-bold uppercase tracking-[0.18em] text-slate-400 mb-1">Learning Center</div>
                                            <h2 className="text-xl md:text-2xl font-bold tracking-tight text-slate-900">{currentTabLabel}</h2>
                                        </div>
                                        <div className="hidden md:flex p-1 bg-slate-100/80 rounded-[18px] overflow-x-auto no-scrollbar shadow-inner">
                                            {navItems.map((t) => (
                                                <button
                                                    key={t.id}
                                                    onClick={() => { if (t.id === 'gaokao') startQuiz('gaokao'); else setTab(t.id); }}
                                                    className={`flex-none flex items-center justify-center gap-1.5 min-w-[92px] px-4 py-2.5 rounded-[14px] transition-all ${((tab === t.id) || (tab === 'gaokaoquiz' && t.id === 'gaokao')) ? 'bg-white text-blue-500 shadow-sm font-bold' : 'text-slate-500 font-semibold active:bg-slate-300/50'}`}
                                                >
                                                    {t.icon}
                                                    <span className="text-sm tracking-wide">{t.label}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <main className="pb-10">{renderMainContent()}</main>
                            </section>
                        </div>
                    </div>
                </div>
            );
        };

const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
