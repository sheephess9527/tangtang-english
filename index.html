          "B3-1": [
            { q: "___ he said at the meeting greatly surprised all of us.", opts: ["What", "That", "Which", "It"], ans: 0, source: "AI生成", rat: "主语从句中 said 缺宾语，用 What（他所说的话）。That 引导的从句不缺成分；Which、It 不能这样引导，均不符。" },
            { q: "___ the festival has a history of over 1,000 years is well known to all.", opts: ["What", "That", "Which", "Whether"], ans: 1, source: "AI生成", rat: "主语从句不缺成分，用 That。What 需作成分；Which 不引导此类从句；Whether 表“是否”与“众所周知”矛盾，均不符。" },
            { q: "___ makes this festival special is the warm atmosphere of family reunion.", opts: ["That", "Which", "What", "It"], ans: 2, source: "AI生成", rat: "主语从句中 makes 缺主语，用 What（……的东西）。That 从句不缺成分；Which、It 不引导此结构，均不符。" },
            { q: "He expressed the hope ___ he could visit the festival again.", opts: ["which", "what", "where", "that"], ans: 3, source: "AI生成", rat: "hope 后的同位语从句用 that 引导，不作成分。which、what 要作成分；where 表地点，均不符。" },
            { q: "The news ___ the festival would be held online disappointed many people.", opts: ["that", "which", "what", "how"], ans: 0, source: "AI生成", rat: "news 后的同位语从句用 that 引导，且不作成分。which、what 需作成分；how 表方式，均不符。" },
            { q: "This is the village ___ which the ancient custom first started.", opts: ["to", "in", "for", "of"], ans: 1, source: "AI生成", rat: "start in the village（在村里开始），介词用 in，故 in which。to、for、of 均不与 start 搭配此意。" },
            { q: "Every year, people from all over the country ___ together to celebrate.", opts: ["range", "decorate", "gather", "feature"], ans: 2, source: "AI生成", rat: "gather together（聚集）符合“庆祝节日”。range 范围；decorate 装饰；feature 以……为特色，均不符。" },
            { q: "The festival has its ___ in an old farming celebration thousands of years ago.", opts: ["custom", "belief", "feature", "origin"], ans: 3, source: "AI生成", rat: "have its origin in（起源于）符合“源于古老的农耕庆典”。custom 习俗；belief 信仰；feature 特色，均不符“起源”。" },
            { q: "Lighting lanterns is a popular ___ during the Spring Festival.", opts: ["custom", "origin", "range", "feature"], ans: 0, source: "AI生成", rat: "custom（习俗）符合“春节挂灯笼的习俗”。origin 起源；range 范围；feature 特色，均不符。" },
            { q: "People ___ their houses with red couplets to welcome the New Year.", opts: ["gather", "decorate", "feature", "range"], ans: 1, source: "AI生成", rat: "decorate...with（用……装饰）符合“用对联装饰房子”。gather 聚集；feature 以……为特色；range 范围，均不符。" },
            { q: "The activities ___ from lion dances to fireworks during the celebration.", opts: ["gather", "decorate", "range", "feature"], ans: 2, source: "AI生成", rat: "range from...to...（从……到……不等）符合“从舞狮到烟花”。gather 聚集；decorate 装饰；feature 以……为特色，均不符。" },
            { q: "Eating mooncakes is a ___ activity of the Mid-Autumn Festival.", opts: ["diverse", "ancient", "curious", "typical"], ans: 3, source: "AI生成", rat: "typical（典型的）符合“中秋节的典型活动”。diverse 多样的；ancient 古老的；curious 好奇的，均不如 typical 贴切。" },
            { q: "The whole street was filled with a joyful festive ___ that night.", opts: ["atmosphere", "origin", "custom", "belief"], ans: 0, source: "AI生成", rat: "festive atmosphere（节日气氛）符合“街上充满欢乐气氛”。origin 起源；custom 习俗；belief 信仰，均不符。" },
            { q: "This festival shows the deep religious ___ of the local people.", opts: ["feature", "belief", "range", "origin"], ans: 1, source: "AI生成", rat: "religious belief（宗教信仰）符合“当地人深厚的宗教信仰”。feature 特色；range 范围；origin 起源，均不符。" },
            { q: "He is a well-known ___ in Chinese history, respected by all.", opts: ["custom", "range", "figure", "origin"], ans: 2, source: "AI生成", rat: "figure 取“人物/名人”的生义（熟义是“身材/数字”），a well-known figure（知名人物）。custom 习俗；range 范围；origin 起源，均不符。" },
            { q: "On that special day, children love to ___ up as their favourite heroes.", opts: ["gather", "feature", "decorate", "dress"], ans: 3, source: "AI生成", rat: "dress up（乔装打扮）是固定搭配，符合“打扮成喜爱的英雄”。gather 聚集；feature 以……为特色；decorate 装饰，均不符。" },
            { q: "Many traditional festivals are closely linked to ___ work in the fields.", opts: ["agricultural", "agriculture", "agriculturally", "agricultured"], ans: 0, source: "AI生成", rat: "agricultural（形容词：农业的）派生自 agriculture，agricultural work（农活）。agriculture 名词；agriculturally 副词；agricultured 非正确词，均不符。" },
            { q: "The festival has a strong ___ meaning for people who share the same faith.", opts: ["religion", "religious", "religiously", "religioned"], ans: 1, source: "AI生成", rat: "religious（形容词：宗教的）派生自 religion，religious meaning（宗教意义）。religion 名词；religiously 副词；religioned 非正确词，均不符。" },
            { q: "Through these celebrations, people ___ a deep sense of belonging together.", opts: ["range", "decorate", "gain", "feature"], ans: 2, source: "AI生成", rat: "gain a sense of belonging（获得归属感）符合“通过庆典获得归属感”。range 范围；decorate 装饰；feature 特色，均不符。" },
            { q: "The lively ___ of the festival made every visitor feel at home.", opts: ["custom", "origin", "range", "atmosphere"], ans: 3, source: "AI生成", rat: "lively atmosphere（热闹的气氛）符合“让游客有家的感觉”。custom 习俗；origin 起源；range 范围，均不符“气氛”。" }

          "B3-2": [
            { q: "Modern technology has made ___ possible for us to study online.", opts: ["it", "that", "this", "them"], ans: 0, source: "AI生成", rat: "make it + adj + to do 中 it 作形式宾语，真正宾语是后面的不定式，不可省。that、this、them 均不能作此形式宾语。" },
            { q: "We all find ___ important to help those in need around us.", opts: ["that", "it", "this", "what"], ans: 1, source: "AI生成", rat: "find it + adj + to do 中 it 作形式宾语，真正宾语是 to do。that、this、what 不能作此形式宾语，均不符。" },
            { q: "He devoted almost all his free time to ___ children in poor areas.", opts: ["help", "helped", "helping", "to help"], ans: 2, source: "AI生成", rat: "devote...to 中 to 是介词，后接动名词 helping。help 原形；helped 过去式；to help 不定式，均不符“介词+doing”。" },
            { q: "She has contributed greatly to ___ the lives of poor villagers.", opts: ["improve", "improved", "to improve", "improving"], ans: 3, source: "AI生成", rat: "contribute to 中 to 是介词，后接动名词 improving。improve 原形；improved 过去式；to improve 不定式，均不符。" },
            { q: "___ we need most at present is patience and confidence.", opts: ["What", "That", "Which", "It"], ans: 0, source: "AI生成", rat: "主语从句中 need 缺宾语，用 What。That、Which、It 不能引导缺宾语的主语从句，均不符。" },
            { q: "___ surprised everyone was that the shy boy won the speech contest.", opts: ["That", "What", "Which", "It"], ans: 1, source: "AI生成", rat: "主语从句中 surprised 缺主语，用 What。That 从句不缺成分；Which、It 不引导此结构，均不符。" },
            { q: "She is always ___ to help others whenever they are in trouble.", opts: ["tough", "moral", "willing", "ancient"], ans: 2, source: "AI生成", rat: "be willing to do（乐意做）符合“乐于助人”。tough 艰难；moral 道德的；ancient 古老的，均不搭配此结构。" },
            { q: "He won a full ___ to study at one of the best universities.", opts: ["virtue", "charity", "principle", "scholarship"], ans: 3, source: "AI生成", rat: "scholarship（奖学金）符合“获全额奖学金深造”。virtue 美德；charity 慈善；principle 原则，均不符。" },
            { q: "Honesty is a ___ that we should keep all through our lives.", opts: ["virtue", "scholarship", "charity", "principle"], ans: 0, source: "AI生成", rat: "virtue（美德）符合“诚实是应终生保持的美德”。scholarship 奖学金；charity 慈善；principle 原则，均不如 virtue 贴切。" },
            { q: "He made a great ___ to the development of his hometown.", opts: ["scholarship", "contribution", "charity", "principle"], ans: 1, source: "AI生成", rat: "make a contribution to（为……做贡献）符合“为家乡发展做贡献”。scholarship 奖学金；charity 慈善；principle 原则，均不符。" },
            { q: "She gives part of her income to ___ to help homeless children.", opts: ["virtue", "scholarship", "charity", "fortune"], ans: 2, source: "AI生成", rat: "give to charity（捐给慈善机构）符合“帮助无家可归的孩子”。virtue 美德；scholarship 奖学金；fortune 财富，均不符。" },
            { q: "A good leader should always stick to his ___ and never cheat.", opts: ["scholarships", "charities", "virtues", "principles"], ans: 3, source: "AI生成", rat: "stick to one's principles（坚守原则）符合“好领导不欺骗”。scholarships 奖学金；charities 慈善机构；virtues 美德（语义近但 stick to principles 更固定），均不如 principles 贴切。" },
            { q: "It was a ___ task, but he never gave up halfway.", opts: ["tough", "moral", "willing", "generous"], ans: 0, source: "AI生成", rat: "a tough task（艰巨的任务）符合“他从未中途放弃”。moral 道德的；willing 乐意的；generous 慷慨的，均不符。" },
            { q: "With great effort, he finally ___ all the difficulties in his way.", opts: ["retired", "overcame", "contributed", "devoted"], ans: 1, source: "AI生成", rat: "overcome difficulties（克服困难），过去式 overcame，符合语境。retire 退休；contribute 贡献；devote 致力于，均不符。" },
            { q: "After working for forty years, the old doctor decided to ___.", opts: ["overcome", "devote", "retire", "contribute"], ans: 2, source: "AI生成", rat: "retire（退休）符合“工作四十年后决定退休”。overcome 克服；devote 致力于；contribute 贡献，均不符。" },
            { q: "In ___ a difficult one, he should still treat every patient with care.", opts: ["point", "virtue", "charity", "case"], ans: 3, source: "AI生成", rat: "case 取“情况/案例”的生义（熟义是“箱子”），in case of a difficult one 指“遇到困难情况”。point 点；virtue 美德；charity 慈善，均不符。" },
            { q: "The teacher gave a clear ___ of how to solve the maths problem.", opts: ["description", "describe", "described", "describing"], ans: 0, source: "AI生成", rat: "description（名词：描述/说明）派生自 describe，a clear description of。describe 动词；described 过去分词；describing 分词，均不作名词。" },
            { q: "His ___ to strangers in need has won him great respect.", opts: ["generous", "generosity", "generously", "generousness"], ans: 1, source: "AI生成", rat: "generosity（名词：慷慨）派生自 generous，one's generosity to。generous 形容词；generously 副词；generousness 非常用词，均不作名词。" },
            { q: "The old lady was known for her ___ to everyone in the village.", opts: ["kind", "kindly", "kindness", "kinder"], ans: 2, source: "AI生成", rat: "kindness（名词：仁慈）派生自 kind，be known for one's kindness。kind 形容词；kindly 副词；kinder 比较级，均不作名词。" },

          "B3-3": [
            { q: "When ___ about his future plans, the boy just smiled and said nothing.", opts: ["asked", "asking", "ask", "to ask"], ans: 0, source: "AI生成", rat: "状语从句省略，When (he was) asked，主语与主句一致且为被动，用过去分词 asked。asking 表主动；ask、to ask 形式错误。" },
            { q: "Though ___ many times, the volunteer never lost her warm smile.", opts: ["tiring", "tired", "tire", "to tire"], ans: 1, source: "AI生成", rat: "状语从句省略，Though (she was) tired，主语为“感到累”（被动状态），用过去分词 tired。tiring 表“令人累的”；tire、to tire 形式错误。" },
            { q: "While ___ in the city, he learned to respect different cultures.", opts: ["lived", "live", "living", "to live"], ans: 2, source: "AI生成", rat: "状语从句省略，While (he was) living，live 与主语 he 是主动关系，用现在分词 living。lived、live、to live 均不符省略后主动进行的形式。" },
            { q: "The young man finally admitted ___ the wallet on the bus.", opts: ["take", "to take", "taken", "taking"], ans: 3, source: "AI生成", rat: "admit 后只能接动名词 doing，选 taking。take 原形；to take 不定式；taken 过去分词，均不符 admit doing。" },
            { q: "He couldn't escape ___ the difficult question from the reporters.", opts: ["answering", "answer", "to answer", "answered"], ans: 0, source: "AI生成", rat: "escape 后接动名词 doing，escape answering（逃避回答）。answer 原形；to answer 不定式；answered 过去分词，均不符。" },
            { q: "Shanghai is the city ___ I spent my happy childhood.", opts: ["which", "where", "that", "when"], ans: 1, source: "AI生成", rat: "先行词 city 表地点，关系词在从句中作地点状语，用 where。which、that 须作主宾语；when 表时间，均不符。" },
            { q: "This is the small town ___ many famous artists were born.", opts: ["which", "that", "where", "who"], ans: 2, source: "AI生成", rat: "先行词 town 表地点，关系词作地点状语（be born in the town），用 where。which、that 须作主宾语；who 指人，均不符。" },
            { q: "Many young people come to big cities to ___ better job opportunities.", opts: ["escape", "claim", "retire", "seek"], ans: 3, source: "AI生成", rat: "seek（寻找）与 opportunities 搭配，符合“到大城市找机会”。escape 逃避；claim 宣称；retire 退休，均不符。" },
            { q: "We live in a ___ society where people of many cultures live together.", opts: ["diverse", "historical", "minority", "fortunate"], ans: 0, source: "AI生成", rat: "a diverse society（多元社会）符合“多种文化共处”。historical 历史的；minority 少数；fortunate 幸运的，均不符。" },
            { q: "She was ___ enough to get a place at her dream university.", opts: ["diverse", "fortunate", "historical", "conventional"], ans: 1, source: "AI生成", rat: "fortunate（幸运的）符合“有幸进入理想大学”。diverse 多样的；historical 历史的；conventional 传统的，均不符。" },
            { q: "After a hard interview, she finally gained ___ to the college.", opts: ["fortune", "minority", "admission", "series"], ans: 2, source: "AI生成", rat: "gain admission to（获得……的准入）符合“被学院录取”。fortune 财富；minority 少数；series 系列，均不符。" },
            { q: "The company ___ that its new product is the best on the market.", opts: ["seeks", "escapes", "earns", "claims"], ans: 3, source: "AI生成", rat: "claim that（宣称）符合“公司宣称产品最好”。seek 寻找；escape 逃避；earn 赚得，均不符。" },
            { q: "He read a ___ of books about different cultures last summer.", opts: ["series", "minority", "fortune", "admission"], ans: 0, source: "AI生成", rat: "a series of（一系列）符合“读了一系列书”。minority 少数；fortune 财富；admission 准入，均不符。" },
            { q: "Only a small ___ of students chose to study abroad that year.", opts: ["series", "minority", "fortune", "admission"], ans: 1, source: "AI生成", rat: "a small minority of（少数）符合“只有少数学生出国”。series 系列；fortune 财富；admission 准入，均不符。" },
            { q: "He works hard to ___ enough money to support his big family.", opts: ["escape", "claim", "earn", "admit"], ans: 2, source: "AI生成", rat: "earn money（赚钱）符合“养活大家庭”。escape 逃避；claim 宣称；admit 承认，均不符。" },
            { q: "The city has many ___ buildings that record its long past.", opts: ["diverse", "fortunate", "minority", "historical"], ans: 3, source: "AI生成", rat: "historical buildings（历史建筑）符合“记录漫长过去”。diverse 多样的；fortunate 幸运的；minority 少数的，均不符。" },
            { q: "The price of the house has risen two ___ over the last ten years.", opts: ["fold", "point", "series", "fortune"], ans: 0, source: "AI生成", rat: "fold 取“倍”的生义（如 twofold），two fold 表“两倍”。point 点；series 系列；fortune 财富，均不符。" },
            { q: "The teacher ___ out several mistakes in my English composition.", opts: ["sought", "pointed", "escaped", "claimed"], ans: 1, source: "AI生成", rat: "point out（指出）是固定搭配，符合“指出作文中的错误”。seek 寻找；escape 逃避；claim 宣称，均不与 out 构成此意。" },
            { q: "Many ___ came to this country a century ago to start a new life.", opts: ["minorities", "fortunes", "immigrants", "series"], ans: 2, source: "AI生成", rat: "immigrant（移民，人）派生自 immigrate，符合“一个世纪前来到这个国家”。minorities 少数群体（语义近但 immigrants 更准确指“移民”）；fortunes 财富；series 系列，均不如 immigrants 贴切。" },
            { q: "Living in a ___ city, she has made friends from all over the world.", opts: ["minority", "historical", "fortunate", "diverse"], ans: 3, source: "AI生成", rat: "a diverse city（多元化的城市）符合“结交世界各地的朋友”。minority 少数；historical 历史的；fortunate 幸运的，均不符。" }
          ],
          "B3-4": [
            { q: "The ground is all wet. It ___ heavily last night.", opts: ["must have rained", "must rain", "must be raining", "may rain"], ans: 0, source: "AI生成", rat: "对过去情况的肯定推测用 must have done，选 must have rained。must rain、must be raining 指现在；由“地面湿透”的确凿证据看，may rain 把握不足，不如 must。" },
            { q: "Nobody answered the door. They ___ out when I called.", opts: ["must go", "must have gone", "must be going", "can go"], ans: 1, source: "AI生成", rat: "对过去的肯定推测用 must have done，选 must have gone（一定出去了）。must go、must be going 指现在或将来；can go 不表推测，均不符。" },
            { q: "She looks tired. She ___ well last night.", opts: ["can't sleep", "mustn't sleep", "can't have slept", "needn't sleep"], ans: 2, source: "AI生成", rat: "对过去的否定推测用 can't have done，选 can't have slept（昨晚不可能睡好）。can't sleep 指现在；mustn't、needn't 不表推测，均不符。" },
            { q: "We should attach great importance ___ protecting the environment.", opts: ["of", "for", "on", "to"], ans: 3, source: "AI生成", rat: "attach importance to 中 to 是介词，后接动名词。of、for、on 均不与该短语搭配。" },
            { q: "Scientists attach great importance ___ studying the deep ocean.", opts: ["to", "of", "for", "with"], ans: 0, source: "AI生成", rat: "attach importance to 中 to 是介词，后接动名词 studying。of、for、with 均不与该短语搭配。" },
            { q: "A new rocket ___ into space next month according to the plan.", opts: ["is to launch", "is to be launched", "launches", "has launched"], ans: 1, source: "AI生成", rat: "be to do 表按计划将发生；rocket 是被发射，用被动 is to be launched。is to launch 主动；launches 一般现在；has launched 完成时，均不符。" },
            { q: "The astronauts ___ the spaceship at nine o'clock tomorrow morning.", opts: ["are to be boarded", "board", "are to board", "have boarded"], ans: 2, source: "AI生成", rat: "be to do 表按计划安排；astronauts 主动登上飞船，用主动 are to board。are to be boarded 被动（主语应主动）；board 一般现在；have boarded 完成时，均不符。" },
            { q: "China plans to ___ another satellite into orbit this year.", opts: ["attach", "orbit", "signal", "launch"], ans: 3, source: "AI生成", rat: "launch a satellite（发射卫星）为固定搭配。attach 附上；orbit 绕轨运行；signal 发信号，均不符。" },
            { q: "Human beings have long been curious about the vast ___.", opts: ["universe", "satellite", "gravity", "signal"], ans: 0, source: "AI生成", rat: "the vast universe（广阔的宇宙）符合“人类对宇宙好奇”。satellite 卫星；gravity 重力；signal 信号，均不符。" },
            { q: "The spaceship is now travelling in ___ around the Earth.", opts: ["universe", "orbit", "oxygen", "mystery"], ans: 1, source: "AI生成", rat: "in orbit（在轨道上）符合“绕地球运行”。universe 宇宙；oxygen 氧气；mystery 神秘，均不符。" },
            { q: "Without ___, human beings cannot survive on the moon.", opts: ["orbit", "signal", "oxygen", "satellite"], ans: 2, source: "AI生成", rat: "oxygen（氧气）符合“没有氧气无法在月球生存”。orbit 轨道；signal 信号；satellite 卫星，均不符。" },
            { q: "In space, astronauts float around because there is almost no ___.", opts: ["oxygen", "signal", "resource", "gravity"], ans: 3, source: "AI生成", rat: "gravity（重力）符合“几乎没有重力所以漂浮”。oxygen 氧气；signal 信号；resource 资源，均不符。" },
            { q: "The deep ocean is still full of ___ that scientists hope to solve.", opts: ["mysteries", "satellites", "orbits", "signals"], ans: 0, source: "AI生成", rat: "mysteries（谜团）符合“科学家希望解开的谜”。satellites 卫星；orbits 轨道；signals 信号，均不符。" },
            { q: "The Earth provides us with rich natural ___ such as water and coal.", opts: ["mysteries", "resources", "signals", "orbits"], ans: 1, source: "AI生成", rat: "natural resources（自然资源）符合“水和煤等”。mysteries 谜团；signals 信号；orbits 轨道，均不符。" },
            { q: "The space station sent a clear ___ back to the control centre on Earth.", opts: ["gravity", "orbit", "signal", "resource"], ans: 2, source: "AI生成", rat: "send a signal（发送信号）符合“向地面控制中心发回信号”。gravity 重力；orbit 轨道；resource 资源，均不符。" },
            { q: "Please ___ the file to the email before you send it to the teacher.", opts: ["launch", "orbit", "signal", "attach"], ans: 3, source: "AI生成", rat: "attach...to（把……附加到）符合“把文件附在邮件里”。launch 发射；orbit 绕轨；signal 发信号，均不符。" },
            { q: "When the bell rang, all the students hurried to ___ the school bus.", opts: ["board", "launch", "attach", "orbit"], ans: 0, source: "AI生成", rat: "board 取“上（车/船/机）”的生义（熟义是“木板”），board the bus（上校车）。launch 发射；attach 附上；orbit 绕轨，均不符。" },
            { q: "The exciting football match ___ for nearly two hours last night.", opts: ["launched", "lasted", "attached", "orbited"], ans: 1, source: "AI生成", rat: "last 取“持续”的生义（熟义是“最后的”），lasted for two hours（持续两小时）。launch 发射；attach 附上；orbit 绕轨，均不符。" },
            { q: "The famous ___ spent his whole life studying distant stars and planets.", opts: ["astronomy", "astronomical", "astronomer", "astronaut"], ans: 2, source: "AI生成", rat: "astronomer（天文学家，人）派生自 astronomy，符合“研究遥远星球”。astronomy 天文学（学科）；astronomical 形容词；astronaut 宇航员（语义偏，研究星星的是天文学家），均不如 astronomer 贴切。" },
            { q: "With the development of technology, more space ___ will be uncovered.", opts: ["resources", "signals", "orbits", "mysteries"], ans: 3, source: "AI生成", rat: "space mysteries（太空之谜）符合“更多谜团将被揭开”。resources 资源；signals 信号；orbits 轨道，均不符“被揭开的谜”。" }
          ],
          "B3-5": [
            { q: "___ your timely help, I couldn't have finished the project on time.", opts: ["Without", "Thanks to", "Because of", "Due to"], ans: 0, source: "AI生成", rat: "由主句 couldn't have finished（与过去事实相反的含蓄虚拟）知需用 Without（=要不是）。其余三项表“由于”，与虚拟语气及句意矛盾。" },
            { q: "___ the doctor's care, the old man would have died last winter.", opts: ["Thanks to", "But for", "Because of", "According to"], ans: 1, source: "AI生成", rat: "主句 would have died 是含蓄虚拟，需用 But for（=要不是）。Thanks to、Because of、According to 表“由于/根据”，与虚拟语气矛盾，均不符。" },
            { q: "Without water and air, no living thing ___ on the earth.", opts: ["survives", "survived", "would survive", "has survived"], ans: 2, source: "AI生成", rat: "Without 引导与现在事实相反的含蓄虚拟，主句用 would do，选 would survive。survives、survived、has survived 不符虚拟语气。" },
            { q: "I must apologize ___ you ___ being late for the meeting.", opts: ["for; to", "to; of", "with; for", "to; for"], ans: 3, source: "AI生成", rat: "apologize to sb for sth（因某事向某人道歉），故为 to you for being late。其余介词搭配错误。" },
            { q: "He came to ___ to his teacher for his rude words the day before.", opts: ["apologize", "judge", "bet", "earn"], ans: 0, source: "AI生成", rat: "apologize to sb（向某人道歉）符合“为粗鲁言辞道歉”。judge 判断；bet 打赌；earn 赚得，均不符。" },
            { q: "___ from his accent, he must come from the south of China.", opts: ["Judge", "Judging", "Judged", "To judge"], ans: 1, source: "AI生成", rat: "judging from 是固定的独立状语，表“从……来判断”。Judge、Judged、To judge 均不能构成该习惯用法。" },
            { q: "___ by her clothes, she must be a rich and elegant lady.", opts: ["Judge", "Judged", "Judging", "To judge"], ans: 2, source: "AI生成", rat: "judging by 是固定独立状语，表“从……来判断”。Judge、Judged、To judge 均不构成该习惯用法。" },
            { q: "Teaching young children well requires a great deal of ___.", opts: ["fault", "apology", "bet", "patience"], ans: 3, source: "AI生成", rat: "patience（耐心）符合“教孩子需要耐心”。fault 过失；apology 道歉；bet 打赌，均不符。" },
            { q: "We should judge a person by ___ rather than by money.", opts: ["character", "fault", "bet", "scene"], ans: 0, source: "AI生成", rat: "judge a person by character（凭人品评价人）符合“而非金钱”。fault 过失；bet 打赌；scene 场景，均不符。" },
            { q: "It is impolite to find ___ with others all the time.", opts: ["apology", "fault", "patience", "scene"], ans: 1, source: "AI生成", rat: "find fault with（挑剔/找茬）是固定搭配，符合“总挑别人毛病不礼貌”。apology 道歉；patience 耐心；scene 场景，均不符。" },
            { q: "At the dinner table, good table ___ leave a nice impression on others.", opts: ["faults", "apologies", "manners", "bets"], ans: 2, source: "AI生成", rat: "table manners（餐桌礼仪）是固定搭配，符合“留下好印象”。faults 过失；apologies 道歉；bets 打赌，均不符。" },
            { q: "He is a ___ friend who always tells you the truth.", opts: ["tough", "moral", "previous", "genuine"], ans: 3, source: "AI生成", rat: "a genuine friend（真诚的朋友）符合“总对你说实话”。tough 艰难的；moral 道德的；previous 先前的，均不符。" },
            { q: "Honesty is more valuable than any ___ of money in the world.", opts: ["amount", "scene", "fault", "apology"], ans: 0, source: "AI生成", rat: "any amount of money（任何数额的金钱）符合“诚实比金钱可贵”。scene 场景；fault 过失；apology 道歉，均不符。" },
            { q: "I'd like to ___ that our team will win the final match tomorrow.", opts: ["judge", "bet", "apologize", "earn"], ans: 1, source: "AI生成", rat: "bet that（打赌……）符合“打赌我队会赢”。judge 判断；apologize 道歉；earn 赚得，均不符语气。" },
            { q: "When the accident happened, several people were already on the ___.", opts: ["fault", "amount", "scene", "apology"], ans: 2, source: "AI生成", rat: "on the scene（在现场）符合“事故发生时有人在场”。fault 过失；amount 数量；apology 道歉，均不符。" },
            { q: "The shopkeeper handed me the ___ after I paid with a hundred-yuan note.", opts: ["scene", "fault", "bet", "change"], ans: 3, source: "AI生成", rat: "change 取“零钱/找零”的生义（熟义是“改变”），handed me the change（找给我零钱）。scene 场景；fault 过失；bet 打赌，均不符。" },
            { q: "He paid for the small toy with a ten-yuan ___.", opts: ["note", "scene", "fault", "amount"], ans: 0, source: "AI生成", rat: "note 取“钞票”的生义（熟义是“笔记”），a ten-yuan note（一张十元钞票）。scene 场景；fault 过失；amount 数量，均不符。" },
            { q: "Visitors must show their tickets before they gain ___ to the hall.", opts: ["apology", "admission", "patience", "fault"], ans: 1, source: "AI生成", rat: "admission 取“准入”的派生义（来自 admit），gain admission to（获准进入）。apology 道歉；patience 耐心；fault 过失，均不符。" },
            { q: "He was so ___ that he kept looking at his watch while waiting.", opts: ["patient", "patience", "impatient", "patiently"], ans: 2, source: "AI生成", rat: "impatient（不耐烦的）派生自 patience，符合“等待时不停看表”。patient 耐心的（语义相反）；patience 名词；patiently 副词，均不符。" },
            { q: "We should ___ a person by their character rather than their wealth.", opts: ["bet", "apologize", "earn", "judge"], ans: 3, source: "AI生成", rat: "judge a person by（凭……评价人）符合“凭人品而非财富”。bet 打赌；apologize 道歉；earn 赚得，均不符。" }
          ],
          "S1-1": [
            { q: "Tu Youyou, ___ won the Nobel Prize, has devoted herself to medical research.", opts: ["who", "that", "which", "whom"], ans: 0, source: "AI生成", rat: "非限制性定语从句修饰人且作主语，用 who，且不能用 that。which 指物；whom 作宾语，均不符。" },
            { q: "The new library, ___ opened last month, is very popular among students.", opts: ["that", "which", "who", "where"], ans: 1, source: "AI生成", rat: "非限制性定语从句修饰物 library 且作主语，用 which，不能用 that。who 指人；where 作状语，均不符。" },
            { q: "Yuan Longping, ___ work fed millions, is remembered by all Chinese people.", opts: ["who", "whom", "whose", "which"], ans: 2, source: "AI生成", rat: "关系词修饰 work 表所属（他的工作），非限定从句用 whose。who、whom 作主宾语；which 不表所属，均不符。" },
            { q: "Under no circumstances ___ give up our dreams of success.", opts: ["we should", "we will", "we can", "should we"], ans: 3, source: "AI生成", rat: "否定词组 Under no circumstances 置于句首，主句部分倒装（助动词提前），故 should we。其余语序未倒装。" },
            { q: "Never before ___ such a brave and devoted scientist in this field.", opts: ["have we seen", "we have seen", "we saw", "saw we"], ans: 0, source: "AI生成", rat: "否定副词 Never before 置于句首，主句部分倒装，故 have we seen。we have seen、we saw 未倒装；saw we 完全倒装不符。" },
            { q: "As a doctor, she is committed to ___ the health of poor villagers.", opts: ["improve", "improving", "improved", "to improve"], ans: 1, source: "AI生成", rat: "be committed to 中 to 是介词，后接动名词 improving。improve 原形；improved 过去式；to improve 不定式，均不符。" },
            { q: "He has devoted his whole life to ___ poor children in the mountains.", opts: ["teach", "taught", "teaching", "to teach"], ans: 2, source: "AI生成", rat: "devote...to 中 to 是介词，后接动名词 teaching。teach 原形；taught 过去式；to teach 不定式，均不符。" },
            { q: "Careful preparation is ___ to the success of any big project.", opts: ["academic", "subjective", "ordinary", "crucial"], ans: 3, source: "AI生成", rat: "be crucial to（对……至关重要）符合语境。academic 学术的；subjective 主观的；ordinary 普通的，均不合。" },
            { q: "Her ___ to the company over twenty years deeply moved everyone.", opts: ["commitment", "objective", "circumstance", "conclusion"], ans: 0, source: "AI生成", rat: "commitment（奉献/承诺）符合“二十年的奉献感动众人”。objective 目标；circumstance 环境；conclusion 结论，均不符。" },
            { q: "Our main ___ this year is to improve the quality of our products.", opts: ["commitment", "objective", "circumstance", "property"], ans: 1, source: "AI生成", rat: "objective（目标）符合“今年的主要目标是提高产品质量”。commitment 奉献；circumstance 环境；property 财产/特性，均不符。" },
            { q: "Teachers should fairly ___ each student's progress in study.", opts: ["acknowledge", "obtain", "evaluate", "remark"], ans: 2, source: "AI生成", rat: "evaluate（评估）符合“公正评估学生的进步”。acknowledge 承认；obtain 获得；remark 评论，均不符。" },
            { q: "He finally ___ that he had made a serious mistake in the report.", opts: ["evaluated", "obtained", "remarked", "acknowledged"], ans: 3, source: "AI生成", rat: "acknowledge that（承认）符合“承认报告中犯了严重错误”。evaluate 评估；obtain 获得；remark 评论，均不符。" },
            { q: "Her research has had a ___ influence on modern medical science.", opts: ["profound", "academic", "subjective", "ordinary"], ans: 0, source: "AI生成", rat: "a profound influence（深远的影响）符合“对现代医学影响深远”。academic 学术的；subjective 主观的；ordinary 普通的，均不符。" },
            { q: "He achieved great success despite the difficult ___ of his childhood.", opts: ["objectives", "circumstances", "conclusions", "properties"], ans: 1, source: "AI生成", rat: "difficult circumstances（艰难的环境/处境）符合“尽管童年艰难”。objectives 目标；conclusions 结论；properties 财产，均不符。" },
            { q: "Years of ___ study finally helped her win the top scientific prize.", opts: ["crucial", "subjective", "academic", "remarkable"], ans: 2, source: "AI生成", rat: "academic study（学术研究）符合“多年学术研究让她获奖”。crucial 至关重要的；subjective 主观的；remarkable 非凡的，均不如 academic 贴切。" },
            { q: "After ten years of hard work, he finally ___ a doctor's degree.", opts: ["evaluated", "acknowledged", "remarked", "obtained"], ans: 3, source: "AI生成", rat: "obtain a degree（获得学位）符合“十年努力终获博士学位”。evaluate 评估；acknowledge 承认；remark 评论，均不符。" },
            { q: "She made ___ progress in such a short time that everyone was amazed.", opts: ["remarkable", "subjective", "academic", "crucial"], ans: 0, source: "AI生成", rat: "remarkable progress（非凡的进步）符合“短时间内进步惊人”。subjective 主观的；academic 学术的；crucial 关键的，均不如 remarkable 贴切。" },
            { q: "Honesty is an important ___ of his character that everyone admires.", opts: ["objective", "property", "conclusion", "circumstance"], ans: 1, source: "AI生成", rat: "property 取“特性/属性”的生义（熟义是“财产”），a property of his character（他性格的特质）。objective 目标；conclusion 结论；circumstance 环境，均不符。" },
            { q: "The doctors carefully studied the ___ taken from the patient's blood.", opts: ["objective", "conclusion", "extract", "circumstance"], ans: 2, source: "AI生成", rat: "extract 取“提取物”的生义（熟义是“拔出”），the extract from blood（从血液中提取的物质）。objective 目标；conclusion 结论；circumstance 环境，均不符。" },
            { q: "After many experiments, the scientists came to an important ___.", opts: ["conclude", "concluded", "concluding", "conclusion"], ans: 3, source: "AI生成", rat: "conclusion（名词：结论）派生自 conclude，come to a conclusion（得出结论）。conclude 动词；concluded 过去分词；concluding 分词，均不作名词。" }
          ],
          "S1-2": [
            { q: "At this time tomorrow, I ___ over the Pacific Ocean to New York.", opts: ["will be flying", "will fly", "fly", "am flying"], ans: 0, source: "AI生成", rat: "At this time tomorrow 表将来某刻正在进行，用将来进行时 will be flying。will fly、fly、am flying 不能表达该含义。" },
            { q: "This time next week, the students ___ exams in the big hall.", opts: ["will take", "will be taking", "take", "are taking"], ans: 1, source: "AI生成", rat: "This time next week 表将来某刻正在进行，用将来进行时 will be taking。will take、take、are taking 不能表达“那时正在进行”。" },
            { q: "Don't call me at eight tonight; I ___ a online meeting then.", opts: ["will have", "have", "will be having", "am having"], ans: 2, source: "AI生成", rat: "at eight tonight 表将来某刻正在进行，用将来进行时 will be having。will have、have、am having 不能准确表达“那时正在开会”。" },
            { q: "Experts say that AI ___ to change the way we live in the future.", opts: ["is possible", "is probable", "maybe", "is likely"], ans: 3, source: "AI生成", rat: "be likely to do（很可能做某事）主语可为物。possible、probable 不接 to do（须用 It is possible/probable that）；maybe 是副词，均不符。" },
            { q: "With prices rising, more families ___ to cut their daily spending.", opts: ["are likely", "are possible", "are probable", "are maybe"], ans: 0, source: "AI生成", rat: "be likely to do（很可能）符合语境，主语 families。possible、probable 不接 to do；are maybe 结构错误，均不符。" },
            { q: "With technology ___ so fast, our daily life becomes more convenient.", opts: ["develop", "developing", "developed", "to develop"], ans: 1, source: "AI生成", rat: "with 复合结构中 technology 与 develop 是主动关系，用现在分词 developing。develop、developed、to develop 不符主动进行的逻辑。" },
            { q: "With all the work ___, she finally went home for a good rest.", opts: ["do", "doing", "done", "to do"], ans: 2, source: "AI生成", rat: "with 复合结构中 work 与 do 是被动且已完成的关系，用过去分词 done。do、doing 表主动；to do 表将来未做，均不符。" },
            { q: "The newly designed system is far more ___ than the old one, saving us time.", opts: ["relevant", "automatic", "available", "efficient"], ans: 3, source: "AI生成", rat: "由“saving us time”知强调“高效”，用 efficient。relevant 相关；automatic 自动；available 可获得，均不符“省时”的对比语境。" },
            { q: "Smart watches can ___ your heart rate and tell you when to rest.", opts: ["monitor", "predict", "detect", "warn"], ans: 0, source: "AI生成", rat: "monitor（监控/监测）符合“监测心率”。predict 预测；detect 查明（侧重发现）；warn 警告，均不如 monitor 贴切。" },
            { q: "These data are not ___ to our topic, so we'd better leave them out.", opts: ["efficient", "relevant", "automatic", "innovative"], ans: 1, source: "AI生成", rat: "be relevant to（与……相关）符合“与主题无关，最好删去”。efficient 高效的；automatic 自动的；innovative 创新的，均不符。" },
            { q: "The doors of the new building open ___ when someone comes near.", opts: ["efficiently", "relevantly", "automatically", "securely"], ans: 2, source: "AI生成", rat: "open automatically（自动打开）符合“有人靠近就自动开门”。efficiently 高效地；relevantly 相关地；securely 安全地，均不符。" },
            { q: "This app can ___ a fire early and send a warning to your phone.", opts: ["monitor", "predict", "warn", "detect"], ans: 3, source: "AI生成", rat: "detect（查明/检测到）符合“及早检测到火情”。monitor 持续监控；predict 预测；warn 警告，均不如 detect 表“发现”贴切。" },
            { q: "Scientists can now ___ the weather quite accurately for the coming week.", opts: ["predict", "detect", "monitor", "warn"], ans: 0, source: "AI生成", rat: "predict the weather（预测天气）符合“准确预测下周天气”。detect 查明；monitor 监控；warn 警告，均不符。" },
            { q: "The system will give a ___ when the temperature rises too high.", opts: ["security", "warning", "mode", "prediction"], ans: 1, source: "AI生成", rat: "give a warning（发出警告）符合“温度过高时发出警告”。security 安全；mode 模式；prediction 预测，均不符。" },
            { q: "This ___ idea changed the whole way people communicate with each other.", opts: ["relevant", "available", "innovative", "automatic"], ans: 2, source: "AI生成", rat: "an innovative idea（创新的想法）符合“改变了人们交流的方式”。relevant 相关的；available 可获得的；automatic 自动的，均不符。" },
            { q: "The latest model of the phone is now ___ in stores across the country.", opts: ["efficient", "relevant", "automatic", "available"], ans: 3, source: "AI生成", rat: "be available（可获得的/有售）符合“全国门店均有售”。efficient 高效的；relevant 相关的；automatic 自动的，均不符。" },
            { q: "When you don't use the phone, put it into sleep ___ to save power.", opts: ["mode", "security", "warning", "prediction"], ans: 0, source: "AI生成", rat: "mode 取“模式”的生义，sleep mode（睡眠模式）符合“省电”。security 安全；warning 警告；prediction 预测，均不符。" },
            { q: "Farmers can now control the machines from home with a ___ device.", opts: ["efficient", "remote", "relevant", "available"], ans: 1, source: "AI生成", rat: "remote 取“远程（控制）的”生义（熟义是“遥远的”），a remote device（远程设备）。efficient 高效的；relevant 相关的；available 可获得的，均不符。" },
            { q: "The doctor noticed something ___ in the patient's test results.", opts: ["normal", "normally", "abnormal", "normalize"], ans: 2, source: "AI生成", rat: "abnormal（反常的）是 normal 的反义派生词，符合“检查结果异常”。normal 正常的（语义相反）；normally 副词；normalize 动词，均不符。" },
            { q: "The smart home system can ___ all the lights and doors of the house.", opts: ["predict", "warn", "detect", "control"], ans: 3, source: "AI生成", rat: "control（控制）符合“智能系统控制全屋灯光门窗”。predict 预测；warn 警告；detect 查明，均不符。" }
          ],
          "S1-3": [
            { q: "___ the natural environment is the responsibility of every citizen.", opts: ["Protecting", "Protect", "Protected", "Protects"], ans: 0, source: "AI生成", rat: "动词作主语须用动名词 Protecting；谓语用单数 is。Protect 原形、Protected 过去分词、Protects 第三人称单数均不能作主语。" },
            { q: "___ in a national park can help us get close to nature.", opts: ["Wander", "Wandering", "Wandered", "To wandering"], ans: 1, source: "AI生成", rat: "动词作主语用动名词 Wandering（漫步）。Wander 原形；Wandered 过去分词；To wandering 结构错误，均不能作主语。" },
            { q: "___ wildlife from danger requires everyone to obey the park rules.", opts: ["Preserve", "Preserved", "Preserving", "Preserves"], ans: 2, source: "AI生成", rat: "动词作主语用动名词 Preserving（保护）。Preserve 原形；Preserved 过去分词；Preserves 第三人称单数，均不能作主语。" },
            { q: "In this national park, visitors are prohibited from ___ the wild animals.", opts: ["feed", "fed", "to feed", "feeding"], ans: 3, source: "AI生成", rat: "prohibit sb from doing（禁止某人做某事），用动名词 feeding。feed 原形；fed 过去分词；to feed 不定式，均不符。" },
            { q: "Visitors are prohibited from ___ pictures inside the ancient temple.", opts: ["taking", "take", "took", "to take"], ans: 0, source: "AI生成", rat: "prohibit...from doing；用动名词 taking（拍照）。take 原形；took 过去式；to take 不定式，均不符。" },
            { q: "With its beautiful scenery, the park ___ to thousands of tourists each year.", opts: ["prohibits", "appeals", "observes", "accompanies"], ans: 1, source: "AI生成", rat: "appeal to（吸引）符合“公园吸引游客”。prohibit 禁止；observe 观察；accompany 陪伴，均不符。" },
            { q: "We were all deeply attracted by the ___ scenery of the national park.", opts: ["fascinated", "fascination", "fascinating", "fascinate"], ans: 2, source: "AI生成", rat: "修饰事物 scenery 用 -ing 形容词 fascinating（迷人的）。fascinated 修饰人；fascination 名词；fascinate 动词，均不符。" },
            { q: "Strict rules were made to ___ the rare plants in the reserve.", opts: ["appeal", "wander", "accompany", "preserve"], ans: 3, source: "AI生成", rat: "preserve（保护/保存）符合“保护保护区里的珍稀植物”。appeal 吸引；wander 漫步；accompany 陪伴，均不符。" },
            { q: "Tourists must ___ all the rules when they visit the protected forest.", opts: ["observe", "appeal", "wander", "prohibit"], ans: 0, source: "AI生成", rat: "observe 取“遵守”的生义，observe the rules（遵守规则）。appeal 吸引；wander 漫步；prohibit 禁止，均不符。" },
            { q: "The mountain peak is clearly ___ on a fine and sunny day.", opts: ["broad", "visible", "scenic", "ancient"], ans: 1, source: "AI生成", rat: "visible（可见的）符合“晴天时山峰清晰可见”。broad 宽阔的；scenic 风景优美的；ancient 古老的，均不符。" },
            { q: "A ___ river runs quietly through the green valley of the park.", opts: ["visible", "remote", "broad", "sharp"], ans: 2, source: "AI生成", rat: "a broad river（宽阔的河流）符合“静静流过山谷”。visible 可见的；remote 偏僻的；sharp 锋利的，均不符。" },
            { q: "A friendly guide will ___ you through the whole forest park.", opts: ["prohibit", "appeal", "wander", "accompany"], ans: 3, source: "AI生成", rat: "accompany sb（陪伴某人）符合“向导陪你游览”。prohibit 禁止；appeal 吸引；wander 漫步，均不符。" },
            { q: "We spent the whole afternoon ___ around the quiet old town.", opts: ["wandering", "appealing", "prohibiting", "observing"], ans: 0, source: "AI生成", rat: "wander around（四处漫步）符合“在古镇闲逛一下午”。appeal 吸引；prohibit 禁止；observe 观察，均不符。" },
            { q: "The children had great fun at the dinosaur ___ park last weekend.", opts: ["broad", "theme", "scenic", "remote"], ans: 1, source: "AI生成", rat: "theme park（主题公园）是固定搭配，dinosaur theme park（恐龙主题公园）。broad 宽阔的；scenic 风景的；remote 偏僻的，均不符。" },
            { q: "He likes to ___ to work every morning to keep himself healthy.", opts: ["wander", "appeal", "cycle", "prohibit"], ans: 2, source: "AI生成", rat: "cycle 取“骑自行车”的生义（熟义是“循环”），cycle to work（骑车上班）。wander 漫步；appeal 吸引；prohibit 禁止，均不符。" },
            { q: "The village is so ___ that few tourists ever find their way there.", opts: ["visible", "broad", "fascinating", "remote"], ans: 3, source: "AI生成", rat: "remote 取“偏僻的”生义（熟义是“遥远的”），符合“很少游客能找到”。visible 可见的；broad 宽阔的；fascinating 迷人的，均不符。" },
            { q: "There was a ___ rise in the number of visitors during the holiday.", opts: ["sharp", "visible", "broad", "remote"], ans: 0, source: "AI生成", rat: "sharp 取“急剧的”生义（熟义是“锋利的”），a sharp rise（急剧上升）。visible 可见的；broad 宽阔的；remote 偏僻的，均不符。" },
            { q: "This area is ___ with rich natural resources and beautiful scenery.", opts: ["visible", "blessed", "broad", "remote"], ans: 1, source: "AI生成", rat: "be blessed with（有幸拥有）是固定搭配，符合“拥有丰富资源和美景”。visible 可见的；broad 宽阔的；remote 偏僻的，均不符。" },
            { q: "Protecting the environment is our common ___, not just the government's.", opts: ["responsible", "responsibly", "responsibility", "response"], ans: 2, source: "AI生成", rat: "responsibility（名词：责任）符合“我们共同的责任”。responsible 形容词；responsibly 副词；response 回应，均不作此名词。" },
            { q: "Standing on the hilltop, we enjoyed the ___ view of the whole valley.", opts: ["visible", "remote", "internal", "fascinating"], ans: 3, source: "AI生成", rat: "fascinating view（迷人的景色）符合“山顶俯瞰山谷美景”。visible 可见的；remote 偏僻的；internal 内部的，均不符。" }
          ],
          "S1-4": [
            { q: "In some cultures, you should avoid ___ too much direct eye contact.", opts: ["making", "make", "to make", "made"], ans: 0, source: "AI生成", rat: "avoid 后只接动名词 doing，选 making。make 原形；to make 不定式；made 过去分词，均不符 avoid doing。" },
            { q: "He kept ___ his head, showing that he disagreed with the plan.", opts: ["shake", "shaking", "to shake", "shaken"], ans: 1, source: "AI生成", rat: "keep 后接动名词 doing，keep shaking（不停摇头）。shake 原形；to shake 不定式；shaken 过去分词，均不符。" },
            { q: "Would you mind ___ your gestures so that everyone can understand?", opts: ["explain", "to explain", "explaining", "explained"], ans: 2, source: "AI生成", rat: "mind 后只接动名词 doing，mind explaining（介意解释一下）。explain 原形；to explain 不定式；explained 过去分词，均不符。" },
            { q: "I ___ post the letter yesterday, but I'm afraid you didn't receive it.", opts: ["do", "have", "am", "did"], ans: 3, source: "AI生成", rat: "用 did + 动词原形强调过去的谓语动作（确实寄了）；由 yesterday 知用过去时 did。do 表现在；have、am 结构错误，均不符。" },
            { q: "She ___ look worried, though she said everything was fine.", opts: ["does", "did", "has", "is"], ans: 0, source: "AI生成", rat: "用 does + 动词原形强调现在的谓语动作（确实显得担心）；由 said 与一般现在语境，does 强调“的确”。did 过去；has、is 结构错误，均不符。" },
            { q: "My favourite way to relax is ___ to soft music after school.", opts: ["listen", "listening", "listened", "to listening"], ans: 1, source: "AI生成", rat: "-ing 形式作表语，说明主语 way 的内容，用 listening。listen 原形；listened 过去分词；to listening 结构错误，均不符。" },
            { q: "Her main job is ___ foreign visitors around the old city.", opts: ["guide", "guided", "guiding", "to guiding"], ans: 2, source: "AI生成", rat: "-ing 形式作表语，说明 job 的内容，用 guiding。guide 原形；guided 过去分词；to guiding 结构错误，均不符。" },
            { q: "It is not ___ to speak loudly in a public library.", opts: ["reliable", "identical", "visible", "appropriate"], ans: 3, source: "AI生成", rat: "appropriate（恰当的）符合“在图书馆大声说话不合适”。reliable 可靠的；identical 相同的；visible 可见的，均不符。" },
            { q: "Body language is an important part of how people ___ with each other.", opts: ["interact", "interpret", "demonstrate", "witness"], ans: 0, source: "AI生成", rat: "interact with（互动）符合“人们如何相互交流”。interpret 诠释；demonstrate 展示；witness 目击，均不符。" },
            { q: "A smile may be ___ differently in different cultures around the world.", opts: ["interacted", "interpreted", "witnessed", "favoured"], ans: 1, source: "AI生成", rat: "interpret（诠释/解读）符合“微笑在不同文化中被不同解读”。interact 互动；witness 目击；favour 偏袒，均不符。" },
            { q: "The teacher is always ___ of students who try their best.", opts: ["in interpret", "in witness", "in favour", "in barrier"], ans: 2, source: "AI生成", rat: "in favour of（赞成/偏爱）是固定搭配，符合“老师总是欣赏努力的学生”。其余三项均非正确固定短语。" },
            { q: "Many people ___ the accident and told the police what they saw.", opts: ["interpreted", "interacted", "favoured", "witnessed"], ans: 3, source: "AI生成", rat: "witness（目击）符合“目击事故并向警方讲述”。interpret 诠释；interact 互动；favour 偏袒，均不符。" },
            { q: "He is a ___ friend; you can always count on him for help.", opts: ["reliable", "identical", "appropriate", "internal"], ans: 0, source: "AI生成", rat: "a reliable friend（可靠的朋友）符合“总能指望他帮忙”。identical 相同的；appropriate 恰当的；internal 内部的，均不符。" },
            { q: "A common language helps to break down the ___ between people.", opts: ["gestures", "barriers", "favours", "witnesses"], ans: 1, source: "AI生成", rat: "break down barriers（打破障碍）符合“共同语言打破人与人的隔阂”。gestures 手势；favours 偏袒；witnesses 目击者，均不符。" },
            { q: "The teacher used a model to ___ how the machine works.", opts: ["interpret", "witness", "demonstrate", "favour"], ans: 2, source: "AI生成", rat: "demonstrate（展示/演示）符合“用模型演示机器如何运作”。interpret 诠释；witness 目击；favour 偏袒，均不符。" },
            { q: "The twins look so ___ that even their mother can hardly tell them apart.", opts: ["reliable", "appropriate", "internal", "identical"], ans: 3, source: "AI生成", rat: "identical（一模一样的）符合“连母亲都难以分辨双胞胎”。reliable 可靠的；appropriate 恰当的；internal 内部的，均不符。" },
            { q: "He ___ nodded without saying a single word to the visitors.", opts: ["merely", "reliably", "identically", "internally"], ans: 0, source: "AI生成", rat: "merely（仅仅）符合“只是点点头，一句话没说”。reliably 可靠地；identically 相同地；internally 内部地，均不符。" },
            { q: "A friendly ___ such as a wave can make others feel welcome.", opts: ["barrier", "gesture", "favour", "witness"], ans: 1, source: "AI生成", rat: "gesture 取“姿态/表示”的生义（熟义是“手势”），a friendly gesture（友好的表示）。barrier 障碍；favour 偏袒；witness 目击者，均不符。" },
            { q: "Good leaders know how to ___ different methods to solve problems.", opts: ["witness", "favour", "employ", "interpret"], ans: 2, source: "AI生成", rat: "employ 取“运用/使用”的生义（熟义是“雇用”），employ different methods（运用不同方法）。witness 目击；favour 偏袒；interpret 诠释，均不符。" },
            { q: "Body language is a key ___ of human communication.", opts: ["barrier", "favour", "witness", "component"], ans: 3, source: "AI生成", rat: "component（组成部分/要素）符合“肢体语言是人类交流的关键组成部分”。barrier 障碍；favour 偏袒；witness 目击者，均不符。" }
          ],
          "S1-5": [
            { q: "It is essential that every student ___ careful during the chemistry experiment.", opts: ["be", "is", "was", "being"], ans: 0, source: "AI生成", rat: "It is essential that 从句用虚拟语气 (should) + 动词原形，should 省略后用 be。is、was、being 均不符虚拟语气。" },

            { q: "It is important that everyone ___ the importance of saving food.", opts: ["realizes", "realized", "realize", "realizing"], ans: 2, source: "AI生成", rat: "It is important that 从句用虚拟语气 (should) + 动词原形 realize。realizes、realized、realizing 均不符虚拟语气。" },
            { q: "It was in 1973 ___ he first succeeded in growing high-yield rice.", opts: ["when", "which", "who", "that"], ans: 3, source: "AI生成", rat: "强调句强调时间状语 in 1973，连接词仍用 that，不用 when。which、who 不用于此强调句，均不符。" },

            { q: "He worked day and night to ___ his goal of feeding more people.", opts: ["obtain", "attain", "contain", "maintain"], ans: 1, source: "AI生成", rat: "attain a goal（达到目标）搭配恰当。obtain 获得（具体物）；contain 包含；maintain 维持，均不与 goal 这样搭配此意。" },

            { q: "With great effort, he finally ___ his childhood dream of feeding the world.", opts: ["tackled", "attained", "shortened", "expanded"], ans: 1, source: "AI生成", rat: "attain a dream（实现梦想）符合“实现儿时梦想”。tackle 解决；shorten 缩短；expand 扩展，均不符。" },
            { q: "Unlike ___ farming, his new way produces much more rice.", opts: ["innovative", "scenic", "conventional", "remote"], ans: 2, source: "AI生成", rat: "conventional farming（传统耕作）与“他的新方法”形成对比。innovative 创新的（语义相反）；scenic 风景的；remote 偏僻的，均不符。" },
            { q: "Years of hard work finally turned his bold idea into ___.", opts: ["shortage", "pioneer", "expansion", "reality"], ans: 3, source: "AI生成", rat: "turn...into reality（变成现实）符合“把大胆想法变成现实”。shortage 短缺；pioneer 先驱；expansion 扩张，均不符。" },
            { q: "The rapid ___ of cities has brought both chances and problems.", opts: ["expansion", "shortage", "reality", "pioneer"], ans: 0, source: "AI生成", rat: "the rapid expansion（迅速扩张）符合“城市快速扩张带来机遇与问题”。shortage 短缺；reality 现实；pioneer 先驱，均不符。" },
            { q: "Thanks to the new seeds, the rice ___ has greatly increased this year.", opts: ["shortage", "yield", "reality", "pioneer"], ans: 1, source: "AI生成", rat: "rice yield（水稻产量）符合“今年产量大增”。shortage 短缺；reality 现实；pioneer 先驱，均不符。" },

          "S2-1": [

            { q: "The teacher suspected the boy ___ copying others' homework.", opts: ["for", "with", "about", "of"], ans: 3, source: "AI生成", rat: "suspect sb of doing（怀疑某人做某事），介词用 of。for、with、about 均不与 suspect 搭配此意。" },
            { q: "___ to strong sunlight for too long, his skin was badly burned.", opts: ["Exposed", "Expose", "Exposing", "To expose"], ans: 0, source: "AI生成", rat: "skin 与 expose 是被动关系（被暴露），用过去分词 Exposed 作状语。Exposing 表主动；Expose、To expose 形式错误。" },
            { q: "___ to the cold wind all night, the old man caught a bad cold.", opts: ["Expose", "Exposed", "Exposing", "To expose"], ans: 1, source: "AI生成", rat: "man 与 expose 是被动关系（被暴露于冷风），用过去分词 Exposed 作状语。Exposing 表主动；Expose、To expose 形式错误。" },
            { q: "The scientists are working hard to ___ the real cause of the disease.", opts: ["defeat", "cure", "investigate", "suspect"], ans: 2, source: "AI生成", rat: "investigate the cause（调查原因）搭配恰当。defeat 击败；cure 治愈；suspect 怀疑，均不符“查明原因”。" },

            { q: "Curiosity is an important ___ of every great scientist.", opts: ["characteristic", "defeat", "victim", "conclusion"], ans: 0, source: "AI生成", rat: "characteristic（特征/品质）符合“好奇心是伟大科学家的重要特征”。defeat 击败；victim 受害者；conclusion 结论，均不符。" },

            { q: "The patient suffered from a ___ illness and had to stay in hospital.", opts: ["severely", "severity", "severed", "severe"], ans: 3, source: "AI生成", rat: "a severe illness（严重的疾病），形容词 severe 修饰名词。severely 副词；severity 名词；severed 切断的，均不符。" },
            { q: "This special medicine can ___ many patients of the rare disease.", opts: ["cure", "defeat", "suspect", "investigate"], ans: 0, source: "AI生成", rat: "cure sb of sth（治愈某人某病）是固定搭配。defeat 击败；suspect 怀疑；investigate 调查，均不符。" },

            { q: "He is good at ___ difficult problems in a calm and careful way.", opts: ["handling", "defeating", "suspecting", "exposing"], ans: 0, source: "AI生成", rat: "handle 取“处理/应对”的生义（熟义是“把手”），handle problems（处理问题）。defeat 击败；suspect 怀疑；expose 暴露，均不符。" },

            { q: "She wore an ___ dress to the dinner and looked very graceful.", opts: ["elegant", "exceptional", "modest", "stable"], ans: 0, source: "AI生成", rat: "an elegant dress（优雅的裙装）符合“显得很优雅”。exceptional 卓越的；modest 谦虚的；stable 稳定的，均不符。" },
            { q: "The chef ___ the green peppers with meat and cheese.", opts: ["consumed", "stuffed", "sliced", "tricked"], ans: 1, source: "AI生成", rat: "stuff...with（把……塞满）符合“把青椒塞满肉和奶酪”。consume 消耗；slice 切片；trick 欺骗，均不符。" },
            { q: "Her cooking skill is truly ___; everyone praises her dishes.", opts: ["modest", "stable", "exceptional", "minimum"], ans: 2, source: "AI生成", rat: "exceptional（卓越的）符合“厨艺出众，人人称赞”。modest 谦虚的；stable 稳定的；minimum 最小的，均不符。" },
            { q: "Health should always be our top ___ when choosing food.", opts: ["cuisine", "minimum", "trick", "priority"], ans: 3, source: "AI生成", rat: "top priority（首要任务/重中之重）符合“选食物时健康最重要”。cuisine 菜肴；minimum 最小量；trick 诀窍，均不符。" },
            { q: "Though very famous, the cook remained ___ about his success.", opts: ["modest", "elegant", "exceptional", "stable"], ans: 0, source: "AI生成", rat: "modest（谦虚的）符合“虽然出名却对成功很谦虚”。elegant 优雅的；exceptional 卓越的；stable 稳定的，均不符。" },
            { q: "There is a useful ___ to keep vegetables fresh for a longer time.", opts: ["priority", "trick", "cuisine", "minimum"], ans: 1, source: "AI生成", rat: "a useful trick（有用的诀窍）符合“让蔬菜保鲜更久”。priority 优先；cuisine 菜肴；minimum 最小量，均不符。" },
            { q: "Please ___ the bread into thin pieces before putting on the cheese.", opts: ["stuff", "consume", "slice", "associate"], ans: 2, source: "AI生成", rat: "slice 取“切成片”的生义（熟义是“薄片”），slice the bread（把面包切片）。stuff 塞满；consume 消耗；associate 联系，均不符。" },
            { q: "Prices of food have stayed ___ over the past few months.", opts: ["elegant", "exceptional", "modest", "stable"], ans: 3, source: "AI生成", rat: "stable 取“稳定的”生义（熟义是“马厩”），stay stable（保持稳定）。elegant 优雅的；exceptional 卓越的；modest 谦虚的，均不符。" },
            { q: "Eating too much sugar is closely linked to the ___ of fizzy drinks.", opts: ["consumption", "consume", "consumed", "consuming"], ans: 0, source: "AI生成", rat: "consumption（名词：消耗/食用）派生自 consume，the consumption of（……的消费量）。consume 动词；consumed 过去分词；consuming 分词，均不作此名词。" },
            { q: "There is a close ___ between healthy food and a long life.", opts: ["associate", "association", "associated", "associating"], ans: 1, source: "AI生成", rat: "association（名词：关联）派生自 associate，a close association between（……之间的密切关联）。associate 动词；associated 过去分词；associating 分词，均不作此名词。" },
            { q: "This dish ___ mainly of fresh fish and a little salt.", opts: ["is consisted", "is consisting", "consists", "has consisted"], ans: 2, source: "AI生成", rat: "consist of 无被动、无进行，用一般现在时 consists。is consisted、is consisting 违反规则；has consisted 完成时此处也不自然，均不符。" },
            { q: "Traditional Chinese food is well known for its ___ taste and healthy ingredients.", opts: ["stable", "minimum", "slippery", "exceptional"], ans: 3, source: "AI生成", rat: "exceptional taste（卓越的口味）符合“中国传统食物以美味和健康食材著称”。stable 稳定的；minimum 最小的；slippery 滑的，均不符。" }
          ],
          "S2-4": [
            { q: "___ in the far north, the city has very long and cold winters.", opts: ["Located", "Locate", "Locating", "To locate"], ans: 0, source: "AI生成", rat: "be located in（位于）为被动，作状语用过去分词 Located。Locating、Locate、To locate 均不符“位于”的被动状语用法。" },
            { q: "___ near the lake, the small house enjoys a wonderful view.", opts: ["Situate", "Situated", "Situating", "To situate"], ans: 1, source: "AI生成", rat: "be situated near（坐落于）为被动，作状语用过去分词 Situated。Situate、Situating、To situate 均不符被动状语用法。" },
            { q: "___ with China, Canada has a much smaller population.", opts: ["Compare", "Comparing", "Compared", "To compare"], ans: 2, source: "AI生成", rat: "compared with（与……相比）是固定的过去分词短语作状语。Compare、Comparing、To compare 均不构成该习惯表达。" },
            { q: "___ from the plane, the fields look like a huge green carpet.", opts: ["See", "Seeing", "To see", "Seen"], ans: 3, source: "AI生成", rat: "fields 与 see 是被动关系（被看），用过去分词 Seen 作状语。Seeing 表主动；See、To see 形式错误。" },
            { q: "The newly built bridge ___ about 1,200 metres in length.", opts: ["measures", "is measured", "is measuring", "has been measured"], ans: 0, source: "AI生成", rat: "measure 表示“量度为（某长度）”时是系动词用法，无被动、无进行，用 measures。is measured、is measuring、has been measured 均错。" },
            { q: "From the mountain top, we enjoyed the ___ view of the whole valley.", opts: ["slight", "spectacular", "urban", "scenic"], ans: 1, source: "AI生成", rat: "spectacular view（壮观的景色）符合登高远望。slight 轻微的；urban 城市的；scenic（虽近似但 spectacular 更突出“壮观”），slight、urban 明显不符。" },
            { q: "Canada is a country with a rich ___ of different cultures and peoples.", opts: ["border", "peak", "mixture", "distance"], ans: 2, source: "AI生成", rat: "a mixture of（……的混合）符合“多元文化和民族的融合”。border 边界；peak 山峰；distance 距离，均不符。" },
            { q: "The two countries share a long ___ that stretches for thousands of miles.", opts: ["mixture", "peak", "distance", "border"], ans: 3, source: "AI生成", rat: "share a border（共享边界）符合“绵延数千英里”。mixture 混合；peak 山峰；distance 距离，均不符。" },
            { q: "There was only a ___ difference between the two paintings.", opts: ["slight", "spectacular", "urban", "scenic"], ans: 0, source: "AI生成", rat: "a slight difference（细微的差别）符合“两幅画只有微小差别”。spectacular 壮观的；urban 城市的；scenic 风景的，均不符。" },
            { q: "More and more people are moving from the countryside to ___ areas.", opts: ["slight", "urban", "scenic", "massive"], ans: 1, source: "AI生成", rat: "urban areas（城市地区）与“从乡村迁来”相对。slight 轻微的；scenic 风景的；massive 巨大的，均不符。" },
            { q: "The small village is a long ___ from the nearest town.", opts: ["mixture", "border", "distance", "peak"], ans: 2, source: "AI生成", rat: "a long distance from（离……很远）符合“小村离最近的镇很远”。mixture 混合；border 边界；peak 山峰，均不符。" },
            { q: "The snow-covered ___ of the mountain shone brightly in the sun.", opts: ["border", "mixture", "distance", "peak"], ans: 3, source: "AI生成", rat: "the peak of the mountain（山峰）符合“积雪的山峰在阳光下闪耀”。border 边界；mixture 混合；distance 距离，均不符。" },
            { q: "The government took strong ___ to protect the wild forests.", opts: ["measures", "borders", "peaks", "mixtures"], ans: 0, source: "AI生成", rat: "take measures（采取措施）符合“保护原始森林”。borders 边界；peaks 山峰；mixtures 混合物，均不符。" },
            { q: "Many early settlers chose to ___ along the rivers of the new land.", opts: ["measure", "settle", "border", "peak"], ans: 1, source: "AI生成", rat: "settle（定居）符合“早期移民沿河定居”。measure 测量；border 接壤；peak 达到顶峰，均不符。" },
            { q: "The train passed through a ___ valley full of green trees and rivers.", opts: ["slight", "urban", "scenic", "massive"], ans: 2, source: "AI生成", rat: "a scenic valley（风景优美的山谷）符合“满是绿树和河流”。slight 轻微的；urban 城市的；massive 巨大的，均不符。" },
            { q: "The river lies ___ the borders of two large countries.", opts: ["measure", "peak", "mixture", "within"], ans: 3, source: "AI生成", rat: "within 取“在……之内”的生义，within the borders（在边界之内）。measure 测量；peak 山峰；mixture 混合，均不符词性与语义。" },
            { q: "With the ___ of time, the small town has grown into a big city.", opts: ["passage", "border", "peak", "mixture"], ans: 0, source: "AI生成", rat: "passage 取“（时间的）流逝”生义（熟义是“通道/段落”），the passage of time（时光流逝）。border 边界；peak 山峰；mixture 混合，均不符。" },
            { q: "A ___ rock fell from the cliff and blocked the narrow mountain road.", opts: ["slight", "massive", "scenic", "urban"], ans: 1, source: "AI生成", rat: "massive 取“巨大的”生义，a massive rock（巨石）。slight 轻微的；scenic 风景的；urban 城市的，均不符。" },
            { q: "The journey takes ___ five hours by car along the coast.", opts: ["slightly", "scenically", "approximately", "massively"], ans: 2, source: "AI生成", rat: "approximately 取“大约”的生义，approximately five hours（大约五小时）。slightly 轻微地；scenically 风景地；massively 大量地，均不符。" },
            { q: "___ in the south of the country, the town has a warm climate all year.", opts: ["Lay", "Lain", "To lie", "Lying"], ans: 3, source: "AI生成", rat: "lie 与逻辑主语 town 是主动关系（位于），用现在分词 Lying 作状语。Lay、Lain、To lie 均不符主动状语用法。" }
          ],
          "S2-5": [
            { q: "Apply some pressure to the wound, ___ necessary, to stop the bleeding.", opts: ["if", "unless", "while", "since"], ans: 0, source: "AI生成", rat: "if necessary 是 if it is necessary 的省略，意为“如有必要”。unless 除非；while 当……时；since 既然，均不符语境。" },
            { q: "Call an ambulance at once, ___ the injured person can't move at all.", opts: ["unless", "if", "though", "while"], ans: 1, source: "AI生成", rat: "if（如果）符合“如果伤者完全无法移动就立即叫救护车”。unless 除非；though 尽管；while 当……时，均不符语境。" },
            { q: "It is vital that the injured man ___ to hospital without delay.", opts: ["is sent", "sends", "be sent", "sent"], ans: 2, source: "AI生成", rat: "It is vital that 从句用虚拟语气 (should) be done，故 be sent。is sent、sends、sent 均不符虚拟语气被动。" },
            { q: "It is necessary that everyone ___ some basic first aid skills.", opts: ["learns", "learned", "learning", "learn"], ans: 3, source: "AI生成", rat: "It is necessary that 从句用虚拟语气 (should) + 动词原形 learn。learns、learned、learning 均不符虚拟语气。" },
            { q: "You'd better ___ some medicine to the burned skin at once.", opts: ["apply", "appeal", "attach", "adapt"], ans: 0, source: "AI生成", rat: "apply...to（把……涂/敷于）符合急救语境。appeal 呼吁；attach 附上；adapt 适应，均不符。" },
            { q: "First aid is a ___ skill that may save a person's life in an emergency.", opts: ["temporary", "vital", "slight", "modest"], ans: 1, source: "AI生成", rat: "vital（至关重要的）符合“可救命”。temporary 暂时的；slight 轻微的；modest 谦虚/适中的，均不符。" },
            { q: "A clean ___ should be used to cover the wound and stop infection.", opts: ["symptom", "injury", "bandage", "technique"], ans: 2, source: "AI生成", rat: "a clean bandage（干净的绷带）符合“包扎伤口防止感染”。symptom 症状；injury 损伤；technique 技巧，均不符。" },
            { q: "Press the wound firmly to stop the ___ as soon as possible.", opts: ["symptom", "bandage", "technique", "bleeding"], ans: 3, source: "AI生成", rat: "stop the bleeding（止血）符合“用力按压伤口”。symptom 症状；bandage 绷带；technique 技巧，均不符。" },
            { q: "Keeping the wound clean helps prevent ___ from spreading.", opts: ["infection", "bandage", "technique", "aid"], ans: 0, source: "AI生成", rat: "infection（感染）符合“保持伤口清洁防止感染扩散”。bandage 绷带；technique 技巧；aid 急救，均不符。" },
            { q: "A high fever is a common ___ of the flu in winter.", opts: ["bandage", "symptom", "technique", "injury"], ans: 1, source: "AI生成", rat: "a common symptom（常见症状）符合“高烧是流感的常见症状”。bandage 绷带；technique 技巧；injury 损伤，均不符。" },
            { q: "Doctors used a new ___ to treat the heart problem successfully.", opts: ["symptom", "bandage", "technique", "aid"], ans: 2, source: "AI生成", rat: "a new technique（新技术/技巧）符合“成功治疗心脏问题”。symptom 症状；bandage 绷带；aid 急救，均不符。" },
            { q: "The medicine only gives ___ relief, so you still need to see a doctor.", opts: ["vital", "slight", "modest", "temporary"], ans: 3, source: "AI生成", rat: "temporary relief（暂时的缓解）符合“仍需看医生”。vital 至关重要的；slight 轻微的；modest 谦虚的，均不符。" },
            { q: "He suffered a serious ___ to his leg in the football match.", opts: ["injury", "symptom", "bandage", "technique"], ans: 0, source: "AI生成", rat: "a serious injury（严重的损伤）符合“足球赛中腿部受伤”。symptom 症状；bandage 绷带；technique 技巧，均不符。" },
            { q: "In an emergency, it is ___ important to keep calm and act fast.", opts: ["vital", "vitally", "vitality", "vitalize"], ans: 1, source: "AI生成", rat: "修饰形容词 important 用副词 vitally（至关重要地）。vital 形容词；vitality 名词；vitalize 动词，均不符副词位置。" },
            { q: "Wear good shoes, for the rocks near the river can be very ___.", opts: ["vital", "temporary", "slippery", "modest"], ans: 2, source: "AI生成", rat: "slippery（滑的）派生自 slip，符合“河边的石头很滑”。vital 至关重要的；temporary 暂时的；modest 谦虚的，均不符。" },
            { q: "In a serious accident, the heart and other ___ may stop working.", opts: ["symptoms", "bandages", "techniques", "organs"], ans: 3, source: "AI生成", rat: "organ 取“器官”的生义，the heart and other organs（心脏和其他器官）。symptoms 症状；bandages 绷带；techniques 技巧，均不符。" },
            { q: "___ out the water from the wet cloth before putting it on the wound.", opts: ["Squeeze", "Apply", "Bandage", "Infect"], ans: 0, source: "AI生成", rat: "squeeze out（挤出）符合“先把湿布里的水挤出来”。apply 涂抹；bandage 包扎；infect 感染，均不符。" },
            { q: "It is necessary to keep calm and ___ pressure to the wound.", opts: ["appeal", "apply", "attach", "adopt"], ans: 1, source: "AI生成", rat: "apply pressure to（对……施加压力）符合急救“按压伤口”，apply 取“施加”生义。appeal 呼吁；attach 附上；adopt 采纳，均不符。" },
            { q: "When giving first aid, every second is ___ to saving a life.", opts: ["temporary", "slippery", "vital", "modest"], ans: 2, source: "AI生成", rat: "be vital to（对……至关重要）符合“每一秒对救命都至关重要”。temporary 暂时的；slippery 滑的；modest 谦虚的，均不符。" },
            { q: "Cover the wound with a clean cloth ___ no bandage is at hand.", opts: ["unless", "while", "since", "if"], ans: 3, source: "AI生成", rat: "if（如果）符合“如果手边没有绷带，就用干净的布盖住伤口”。unless 除非；while 当……时；since 既然，均不符语境。" }
          ],
          "S3-1": [
            { q: "If I ___ you, I would spend more time appreciating great paintings.", opts: ["were", "am", "was", "be"], ans: 0, source: "AI生成", rat: "与现在事实相反的虚拟条件句，be 动词一律用 were。am、was、be 均不符虚拟语气。" },
            { q: "If he ___ harder, he could become a famous artist one day.", opts: ["tries", "tried", "try", "has tried"], ans: 1, source: "AI生成", rat: "与现在/将来事实相反的虚拟条件句，从句用一般过去时 tried，主句用 could do。tries、try、has tried 均不符虚拟语气。" },
            { q: "If the artist ___ alive today, he would be amazed by modern art.", opts: ["is", "was", "were", "be"], ans: 2, source: "AI生成", rat: "与现在事实相反的虚拟条件句，be 动词用 were。is、was、be 均不符虚拟语气。" },
            { q: "I wish I ___ harder on my drawing skills when I was young.", opts: ["study", "studied", "have studied", "had studied"], ans: 3, source: "AI生成", rat: "wish 后表示对过去的遗憾用过去完成时 had studied。studied 表对现在愿望；study、have studied 时态不符。" },
            { q: "She wishes she ___ paint as beautifully as her famous teacher.", opts: ["could", "can", "will", "has"], ans: 0, source: "AI生成", rat: "wish 后表示对现在难以实现的愿望，情态动词用过去式 could。can、will、has 均不符虚拟语气。" },
            { q: "If it had not been for his guidance, I ___ this masterpiece.", opts: ["couldn't finish", "couldn't have finished", "can't finish", "didn't finish"], ans: 1, source: "AI生成", rat: "与过去事实相反的虚拟条件句，主句用 would/could have done，故 couldn't have finished。其余时态不符。" },
            { q: "Had I known the gallery was closed, I ___ there yesterday.", opts: ["wouldn't go", "won't go", "wouldn't have gone", "didn't go"], ans: 2, source: "AI生成", rat: "Had I known 是与过去相反的虚拟倒装，主句用 would have done，故 wouldn't have gone。其余时态不符。" },
            { q: "The painting is so ___ that the apples in it look almost real.", opts: ["visual", "influential", "ancient", "realistic"], ans: 3, source: "AI生成", rat: "realistic（逼真的）符合“画中苹果看起来几乎是真的”。visual 视觉的；influential 有影响力的；ancient 古老的，均不符。" },
            { q: "This museum keeps a fine marble ___ made over two thousand years ago.", opts: ["sculpture", "perspective", "reputation", "coincidence"], ans: 0, source: "AI生成", rat: "a marble sculpture（大理石雕塑）符合“两千多年前制作”。perspective 透视/视角；reputation 名誉；coincidence 巧合，均不符。" },
            { q: "From my ___, art helps us understand ourselves and the world better.", opts: ["sculpture", "perspective", "reputation", "coincidence"], ans: 1, source: "AI生成", rat: "from my perspective（从我的角度看）是固定搭配。sculpture 雕塑；reputation 名誉；coincidence 巧合，均不符。" },
            { q: "The young painter soon earned a good ___ for his original works.", opts: ["perspective", "sculpture", "reputation", "coincidence"], ans: 2, source: "AI生成", rat: "earn a reputation（赢得名声）符合“因原创作品赢得好名声”。perspective 视角；sculpture 雕塑；coincidence 巧合，均不符。" },
            { q: "Ancient Chinese paintings are an important part of human ___.", opts: ["perspective", "coincidence", "reputation", "civilisation"], ans: 3, source: "AI生成", rat: "human civilisation（人类文明）符合“中国古画是人类文明的重要部分”。perspective 视角；coincidence 巧合；reputation 名誉，均不符。" },
            { q: "Painting and sculpture both belong to the ___ arts.", opts: ["visual", "realistic", "influential", "permanent"], ans: 0, source: "AI生成", rat: "visual arts（视觉艺术）是固定搭配，符合“绘画和雕塑都属于视觉艺术”。realistic 逼真的；influential 有影响力的；permanent 永久的，均不符。" },
            { q: "The artist used a special ___ to make the painting look more lively.", opts: ["reputation", "technique", "coincidence", "perspective"], ans: 1, source: "AI生成", rat: "a special technique（特殊技法）符合“让画显得更生动”。reputation 名誉；coincidence 巧合；perspective 视角，均不符。" },
            { q: "Picasso was one of the most ___ artists of the twentieth century.", opts: ["realistic", "visual", "influential", "permanent"], ans: 2, source: "AI生成", rat: "influential（有影响力的）符合“20世纪最有影响力的艺术家之一”。realistic 逼真的；visual 视觉的；permanent 永久的，均不符。" },
            { q: "By a strange ___, the two artists were born on the very same day.", opts: ["reputation", "perspective", "sculpture", "coincidence"], ans: 3, source: "AI生成", rat: "by a strange coincidence（凑巧/巧合）符合“两位艺术家同一天出生”。reputation 名誉；perspective 视角；sculpture 雕塑，均不符。" },
            { q: "This painting ___ first among all the works in the exhibition.", opts: ["ranks", "reputes", "sculptures", "coincides"], ans: 0, source: "AI生成", rat: "rank first（排名第一）符合“在展览所有作品中排第一”。reputes、sculptures、coincides 均非此语境正确用词。" },
            { q: "It is the ___ of this town to hold a grand art show every spring.", opts: ["sculpture", "convention", "reputation", "perspective"], ans: 1, source: "AI生成", rat: "convention 取“习俗/惯例”的生义（熟义是“会议”），the convention of（……的惯例）。sculpture 雕塑；reputation 名誉；perspective 视角，均不符。" },
            { q: "Many modern artists ___ new ideas from traditional Chinese painting.", opts: ["rank", "repute", "adopt", "coincide"], ans: 2, source: "AI生成", rat: "adopt 取“采用/采纳”的生义（熟义是“收养”），adopt new ideas（采纳新理念）。rank 排名；repute；coincide 巧合，均不符。" },
            { q: "Art plays a crucial role in helping us see the world from different ___.", opts: ["reputations", "coincidences", "sculptures", "perspectives"], ans: 3, source: "AI生成", rat: "from different perspectives（从不同角度）符合“帮我们从不同角度看世界”。reputations 名誉；coincidences 巧合；sculptures 雕塑，均不符。" }

          "S3-2": [
            { q: "It is high time that you ___ to give up smoking for your health.", opts: ["decided", "decide", "will decide", "deciding"], ans: 0, source: "AI生成", rat: "It is high time that 从句谓语用一般过去时 decided（或 should decide）。decide 原形；will decide 将来时；deciding 动名词，均不符。" },
            { q: "It is high time that the school ___ more attention to students' health.", opts: ["pays", "paid", "will pay", "paying"], ans: 1, source: "AI生成", rat: "It is high time that 从句用一般过去时 paid（虚拟语气）。pays、will pay、paying 均不符该结构。" },
            { q: "The doctor suggested that he ___ less meat and more vegetables.", opts: ["eats", "ate", "eat", "eating"], ans: 2, source: "AI生成", rat: "suggest 表“建议”时，从句用虚拟语气 (should) + 动词原形 eat。eats、ate、eating 均不符虚拟语气。" },
            { q: "After thinking it over, she made up her ___ to live a healthier life.", opts: ["brain", "head", "idea", "mind"], ans: 3, source: "AI生成", rat: "make up one's mind（下定决心）为固定搭配。brain、head、idea 均不能用于该习语。" },
            { q: "He finally made up his ___ to give up drinking alcohol.", opts: ["mind", "brain", "thought", "idea"], ans: 0, source: "AI生成", rat: "make up one's mind（下定决心）为固定搭配。brain、thought、idea 均不能用于该习语。" },
            { q: "Building a good habit calls for a strong sense of self-___.", opts: ["surgery", "discipline", "tobacco", "reward"], ans: 1, source: "AI生成", rat: "self-discipline（自律）符合“养成好习惯需要强烈的自律”。surgery 手术；tobacco 烟草；reward 回报，均不符。" },
            { q: "Regular exercise benefits both our physical and ___ health.", opts: ["negative", "dynamic", "mental", "temporary"], ans: 2, source: "AI生成", rat: "mental health（心理健康）与 physical health 相对应。negative 消极的；dynamic 动态的；temporary 暂时的，均不符。" },
            { q: "Drug ___ has ruined the lives of many young people.", opts: ["surgery", "reward", "discipline", "abuse"], ans: 3, source: "AI生成", rat: "drug abuse（滥用毒品）是固定搭配，符合“毁了很多年轻人的生活”。surgery 手术；reward 回报；discipline 纪律，均不符。" },
            { q: "Smoking ___ is harmful not only to smokers but also to those around them.", opts: ["tobacco", "surgery", "reward", "discipline"], ans: 0, source: "AI生成", rat: "smoke tobacco（吸烟草）符合“吸烟对周围人也有害”。surgery 手术；reward 回报；discipline 纪律，均不符。" },
            { q: "Drinking too much ___ does great harm to the liver.", opts: ["surgery", "alcohol", "reward", "discipline"], ans: 1, source: "AI生成", rat: "alcohol（酒精）符合“饮酒过多伤肝”。surgery 手术；reward 回报；discipline 纪律，均不符。" },
            { q: "The patient needed an urgent ___ to remove the tumour.", opts: ["tobacco", "reward", "surgery", "discipline"], ans: 2, source: "AI生成", rat: "surgery（手术）符合“需要紧急手术切除肿瘤”。tobacco 烟草；reward 回报；discipline 纪律，均不符。" },
            { q: "A healthy lifestyle brings rich ___ to both body and mind.", opts: ["surgeries", "disciplines", "tobaccos", "rewards"], ans: 3, source: "AI生成", rat: "rich rewards（丰厚的回报）符合“健康生活方式给身心带来回报”。surgeries 手术；disciplines 纪律；tobaccos 烟草，均不符。" },
            { q: "Too much screen time can have a ___ effect on children's eyesight.", opts: ["negative", "mental", "dynamic", "rewarding"], ans: 0, source: "AI生成", rat: "a negative effect（负面影响）符合“屏幕时间过长损害视力”。mental 心理的；dynamic 动态的；rewarding 有益的（语义相反），均不符。" },
            { q: "The teacher is full of energy and gives very ___ lessons.", opts: ["negative", "dynamic", "mental", "temporary"], ans: 1, source: "AI生成", rat: "dynamic lessons（生动有活力的课）符合“老师精力充沛”。negative 消极的；mental 心理的；temporary 暂时的，均不符。" },
            { q: "Volunteering brought her a deep sense of ___ that money cannot buy.", opts: ["surgery", "tobacco", "reward", "abuse"], ans: 2, source: "AI生成", rat: "a sense of reward（回报感/满足感）符合“做志愿带来金钱买不到的满足”。surgery 手术；tobacco 烟草；abuse 滥用，均不符。" },
            { q: "If you feel unwell, you should ___ a doctor as soon as possible.", opts: ["skip", "examine", "repeat", "consult"], ans: 3, source: "AI生成", rat: "consult 取“咨询/请教”的生义，consult a doctor（看医生/咨询医生）。skip 跳过；examine 检查；repeat 重复，均不符。" },
            { q: "Don't ___ breakfast, because it gives you energy for the morning.", opts: ["skip", "consult", "examine", "repeat"], ans: 0, source: "AI生成", rat: "skip 取“跳过/不吃”的生义（熟义是“跳绳”），skip breakfast（不吃早餐）。consult 咨询；examine 检查；repeat 重复，均不符。" },
            { q: "The doctor will ___ your eyes to find out what the problem is.", opts: ["skip", "examine", "consult", "repeat"], ans: 1, source: "AI生成", rat: "examine 取“检查/查看”的生义，examine your eyes（检查眼睛）。skip 跳过；consult 咨询；repeat 重复，均不符。" },
            { q: "For this serious illness, you'd better see a ___ rather than a common doctor.", opts: ["surgery", "tobacco", "specialist", "discipline"], ans: 2, source: "AI生成", rat: "specialist 取“专家/专科医生”的生义，see a specialist（看专科医生）。surgery 手术；tobacco 烟草；discipline 纪律，均不符。" },
            { q: "It is high time that we ___ a more active and healthy lifestyle.", opts: ["choose", "will choose", "choosing", "chose"], ans: 3, source: "AI生成", rat: "It is high time that 从句谓语用一般过去时 chose（虚拟语气）。choose 原形；will choose 将来时；choosing 动名词，均不符该结构。" }
