              const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });

              if (!textRes) throw new Error("Empty response");

              if (attempt === 2) throw error;
              await new Promise(r => setTimeout(r, delays[attempt]));
            }

        const buildFullQuiz = (key, dbData) => {
          const qList = [];
          const w = dbData.words;
          
          qList.push({ type: '阅读理解', q: `Understanding the topic of ${dbData.tag} is vital. For instance, facing a ${w[0][0]} requires courage. Experts emphasize that a proper ${w[2][0]} is the key.`, sq: `What is the key according to experts?`, opts: [`A proper ${w[2][0]}`, `Ignoring the ${w[0][0]}`, 'Playing sports', 'Sleeping late'], ans: 0, hint: '寻找 Experts emphasize 后面的内容', rationale: `本单元阅读高频词：${w[2][0]}。` });
          qList.push({ type: '阅读理解', q: `To master this topic, consistent review of ${w[3][0]} behavior is essential. Education experts suggest focusing on application rather than rote learning.`, sq: `What do education experts suggest?`, opts: ['Memorizing rules', 'Consistent review', 'Application of knowledge', 'Ignoring grammar'], ans: 2, hint: '定位 experts suggest', rationale: '考查细节提取能力。' });
          
          for(let i=0; i<5; i++) {
            qList.push({ type: '完形填空', q: `In my daily routine, I always encounter the scenario related to ____. It is a key factor in ${dbData.tag}.`, opts: [w[i][0], 'water', 'sky', 'noise'], ans: 0, hint: `中文含义：${w[i][1]}`, rationale: `语境需要填入表示“${w[i][1]}”的单词。` });
          }

          for(let i=5; i<10; i++) {
            qList.push({ type: '语法填空', q: `The result of the ____ (${w[i][0]}) was quite surprising to us all.`, opts: [w[i][0], w[i][0]+'ing', w[i][0]+'ed', 'to '+w[i][0]], ans: 0, hint: `词性与词义：${w[i][1]}`, rationale: `考查本单元基础词汇的变形与运用。` });
          }
          qList.push({ type: '语法填空', q: `Grammar Focus: I am ____ (interest) in this amazing subject.`, opts: ['interest', 'interesting', 'interested', 'interests'], ans: 2, hint: '-ed修饰人的感受。', rationale: '分词形容词：人感到...用-ed结尾。' });
          
          const sigQ = SIGNATURE_GRAMMAR_DB[key];
          if (sigQ) {
            qList.push({ type: '语法填空', q: `【本单元必考陷阱】: ${sigQ[0]}`, opts: [sigQ[1], sigQ[1]+'ing', 'to '+sigQ[1], 'other'], ans: 0, hint: sigQ[2], rationale: `本单元最核心的提分语法点：${sigQ[2]}` });

            <div className="w-full max-w-xl mx-auto flex flex-col items-center animate-in fade-in zoom-in-95 duration-500">

          const [essayFeedback, setEssayFeedback] = useState(null);
          const [aiFocus, setAiFocus] = useState(null);
          const [loadingAiFocus, setLoadingAiFocus] = useState(false);
          const [isGeneratingQuiz, setIsGeneratingQuiz] = useState(false);

          const [currentQuizArr, setCurrentQuizArr] = useState([]);
          const [quizIdx, setQuizIdx] = useState(0);
          const [answeredIdx, setAnsweredIdx] = useState(null);
          const [sessionScore, setSessionScore] = useState(0);
          const [mistakesQueue, setMistakesQueue] = useState([]); 
          const [isFinished, setIsFinished] = useState(false);
          const [quizMode, setQuizMode] = useState('full');

          const handlePlayAudio = (text, e) => {
            if (e) e.stopPropagation();
            if (!text || !window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            setPlayingWord(text);
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            utterance.onend = () => setPlayingWord(null);
            utterance.onerror = () => setPlayingWord(null);
            window.speechSynthesis.speak(utterance);
          };

          const handleGetAiFocus = async () => {
            setLoadingAiFocus(true);
            setAiFocus(null);
            try {
              const res = await callGemini(`针对高中英语单元 "${dbData.title} (${dbData.tag})"，请用一句话指出它在高考中最核心的考点或陷阱。`);
              setAiFocus(res || "AI 返回内容为空。");
            } catch (e) { 
              setAiFocus("网络请求失败，请稍后重试。"); 
            } finally { 
              setLoadingAiFocus(false); 
            }
          };

          const startQuiz = (mode = 'full', newQs = null) => {
            setQuizMode(mode);
            setQuizIdx(0);
            setSessionScore(0);
            setAnsweredIdx(null);
            setIsFinished(false);
            
            if (mode === 'full') {
              const q = buildFullQuiz(unitKey, dbData);
              setCurrentQuizArr(q.map((item, i) => ({ ...item, oIdx: i })));
              setMistakesQueue([]);
            } else if (mode === 'generated' && newQs) {
              setCurrentQuizArr(newQs.map((item, i) => ({ ...item, oIdx: i })));
              setMistakesQueue([]);
            } else {
              const full = buildFullQuiz(unitKey, dbData);
              setCurrentQuizArr(mistakesQueue.map(idx => ({ ...full[idx], oIdx: idx })));
              setMistakesQueue([]); 
            }
            setTab('quiz');
          };

          const handleAnswer = (idx) => {
            if (answeredIdx !== null) return;
            setAnsweredIdx(idx);
            const q = currentQuizArr[quizIdx];
            if (idx === q.ans) setSessionScore(s => s + 1);
            else setMistakesQueue(p => [...p, q.oIdx]);
          };

          const nextQuestion = () => {
            if (quizIdx < currentQuizArr.length - 1) {
              setQuizIdx(i => i + 1);
              setAnsweredIdx(null);
            } else {
              setIsFinished(true);
              if (quizMode === 'full') { 
                setMasteryData(prev => ({ ...prev, [unitKey]: Math.round((sessionScore / currentQuizArr.length) * 100) }));
              }
            }
          };

          const generateNewWithAI = async () => {
            setIsGeneratingQuiz(true);
            try {
              const prompt = `针对高中生，基于 "${dbData.title}" 主题和词汇 [${dbData.words.map(w=>w[0]).join(', ')}]，生成 4 道单选题。返回纯 JSON。`;
              const schema = {
                type: "ARRAY", items: { type: "OBJECT", properties: { type: { type: "STRING" }, q: { type: "STRING" }, opts: { type: "ARRAY", items: { type: "STRING" } }, ans: { type: "INTEGER" }, hint: { type: "STRING" }, rationale: { type: "STRING" } }, required: ["type", "q", "opts", "ans", "hint", "rationale"] }
              };
              const res = await callGemini(prompt, schema);
              startQuiz('generated', JSON.parse(res));
            } catch (e) { alert("AI 组卷失败，请重试。"); }
            finally { setIsGeneratingQuiz(false); }
          };

          const handleGrade = async () => {
            if (!essayText.trim()) return;
            setIsGrading(true);
            try {
              const prompt = `学生针对 "${dbData.tag}" 写了作文：\n${essayText}\n请给15分制评分，用中文指出语法错误，并提供一篇满分范文。格式必须为JSON：{"score":数字,"errs":"中文错误点评","model":"满分范文","advice":"一句鼓励"}`;
              const schema = { type: "OBJECT", properties: { score: { type: "INTEGER" }, errs: { type: "STRING" }, model: { type: "STRING" }, advice: { type: "STRING" } }, required: ["score", "errs", "model", "advice"] };
              const res = await callGemini(prompt, schema);
              setEssayFeedback(JSON.parse(res));
            } catch (e) { alert("批改失败，请稍后重试。"); }
            finally { setIsGrading(false); }
          };

          return (
            <div className="flex h-screen bg-[#F8FAFC] font-sans text-slate-800 overflow-hidden">
              <aside className={`fixed inset-y-0 left-0 bg-white border-r border-slate-200 w-72 flex flex-col z-40 transition-transform duration-300 ease-[cubic-bezier(0.4,0,0.2,1)] transform ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0 shadow-[4px_0_24px_rgba(0,0,0,0.02)]`}>
                <div className="p-8 flex items-center justify-between border-b border-slate-100">
                  <div className="flex items-center gap-3">
                    <div className="bg-slate-900 text-white p-2.5 rounded-xl shadow-md"><GraduationCap className="w-5 h-5" /></div>
                    <div>
                      <h1 className="font-black text-xl tracking-tight text-slate-900">糖糖提分通</h1>
                      <span className="text-[10px] font-bold text-blue-600 uppercase tracking-widest bg-blue-50 px-2 py-0.5 rounded">TT1.0 正式版</span>
                    </div>
                  </div>
                  <button className="md:hidden p-2 text-slate-400 hover:bg-slate-100 rounded-full" onClick={() => setSidebarOpen(false)}><X className="w-4 h-4" /></button>
                </div>
                <div className="flex-1 overflow-y-auto px-4 py-6 space-y-1">
                  <div className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4 px-2">全高中教材 100% 真实对齐</div>
                  {SYLLABUS.map(book => (
                    <button 
                      key={book.id}
                      onClick={() => { setActiveBook(book); setActiveUnit(1); setTab('notes'); if(window.innerWidth < 768) setSidebarOpen(false); }}
                      className={`w-full flex items-center gap-3 py-3.5 px-4 rounded-2xl transition-all font-bold text-sm ${
                        activeBook.id === book.id 
                        ? 'bg-slate-900 text-white shadow-lg' 
                        : 'text-slate-500 hover:bg-slate-100 hover:text-slate-800'
                      }`}
                    >
                      <Book className={`w-4 h-4 ${activeBook.id === book.id ? 'text-blue-400' : 'opacity-50'}`} />
                      {book.name}
                    </button>
                  ))}
                </div>
              </aside>

              <main className="flex-1 flex flex-col overflow-hidden relative">
                <header className="bg-white/80 backdrop-blur-xl border-b border-slate-200/60 px-6 md:px-10 py-5 flex items-center justify-between z-20 sticky top-0">
                  <div className="flex items-center gap-4">
                    <button className="md:hidden p-2 bg-white rounded-full shadow-sm border border-slate-200 text-slate-600" onClick={() => setSidebarOpen(true)}><Menu className="w-5 h-5" /></button>
                    <div>
                      <div className="flex items-center gap-2 mb-1">
                        <span className="text-slate-400 text-xs font-bold">{activeBook.name}</span>
                        <ChevronRight className="w-3 h-3 text-slate-300" />
                        <span className="text-blue-600 text-[10px] font-black uppercase tracking-widest bg-blue-50 px-2 py-0.5 rounded-md">{dbData.tag}</span>
                      </div>
                      <h2 className="text-2xl font-black text-slate-900 tracking-tight">{dbData.title}</h2>
                    </div>
                  </div>
                  <div className="hidden md:flex bg-slate-100 p-1.5 rounded-full border border-slate-200/50">
                    {[1, 2, 3, 4, 5].map(u => (
                      <button 
                        key={u}
                        onClick={() => { setActiveUnit(u); setTab('notes'); setEssayFeedback(null); }}
                        className={`w-10 h-10 rounded-full font-bold text-sm transition-all ${
                          activeUnit === u ? 'bg-white text-slate-900 shadow-sm border border-slate-200/50' : 'text-slate-400 hover:text-slate-700'
                        }`}
                      >
                        {u}
                      </button>
                    ))}
                  </div>
                </header>

                <div className="flex-1 overflow-y-auto px-4 md:px-10 py-10 pb-32">
                  <div className="max-w-5xl mx-auto">
                    {tab !== 'mastery' && (
                      <SegmentedTabs 
                        activeTab={tab} 
                        onChange={(id) => { if(id === 'quiz' && !isFinished) startQuiz('full'); setTab(id); }}
                        tabs={[
                          { id: 'notes', label: '核心笔记', icon: <BookOpen className="w-4 h-4" /> },
                          { id: 'cards', label: '互动识字卡', icon: <Layers className="w-4 h-4" /> },
                          { id: 'quiz', label: '真题实战卷', icon: <Target className="w-4 h-4" /> },
                          { id: 'writing', label: 'AI 批改', icon: <MessageSquare className="w-4 h-4" /> },
                          { id: 'mastery', label: '掌握度视图', icon: <BarChart3 className="w-4 h-4" /> }
                        ]} 
                      />
                    )}

                    {tab === 'notes' && (
                      <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                        <div className="bg-white rounded-[2rem] p-8 md:p-10 shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-slate-100 relative overflow-hidden group">
                          <div className="absolute -top-10 -right-10 p-8 opacity-5 transition-opacity group-hover:opacity-10 pointer-events-none"><Sparkles className="w-48 h-48 text-blue-600" /></div>
                          <div className="relative z-10">
                            <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                               <h3 className="flex items-center gap-3 text-slate-900 font-black text-2xl tracking-tight">
                                 <div className="p-2 bg-amber-100 text-amber-600 rounded-xl"><Sparkles className="w-6 h-6" /></div>
                                 AI 考点探雷仪
                               </h3>
                               <button onClick={handleGetAiFocus} disabled={loadingAiFocus} className="px-6 py-3 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl transition-all flex items-center justify-center gap-2 shadow-md disabled:opacity-50">
                                 {loadingAiFocus ? <Loader2 className="w-4 h-4 animate-spin" /> : <Zap className="w-4 h-4 text-amber-400" />} {loadingAiFocus ? '正在扫描考点...' : '扫描本单元陷阱'}
                               </button>
                            </div>
                            {aiFocus ? (
                              <div className="p-6 bg-blue-50/50 border border-blue-100 rounded-2xl text-blue-900 font-medium text-lg leading-relaxed shadow-inner">{aiFocus}</div>
                            ) : (
                              <div className="p-6 bg-slate-50 border border-slate-100 rounded-2xl text-slate-400 italic text-base">一键召唤 AI，分析本单元在历年高考中的高频考法及易错陷阱...</div>
                            )}
                          </div>
                        </div>

                        <div className="bg-white rounded-[2rem] p-8 md:p-10 shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-slate-100">
                          <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                            <Layers className="w-4 h-4" /> Level 1 高频核心词汇 (点击直接发音)
                          </h3>
                          <div className="flex flex-wrap gap-3">
                            {dbData.words.map((w, i) => (
                              <button 
                                key={i} onClick={(e) => handlePlayAudio(w[0], e)}
                                className="group flex flex-col items-start p-4 bg-slate-50 border border-slate-200/60 rounded-2xl hover:bg-white hover:shadow-lg hover:border-blue-200 transition-all text-left min-w-[140px]"
                              >
                                <div className="flex justify-between items-center w-full mb-2">
                                  <span className="font-black text-lg text-slate-800 group-hover:text-blue-600 transition-colors">{w[0]}</span>
                                  <Volume2 className={`w-4 h-4 ${playingWord === w[0] ? 'animate-pulse text-blue-500' : 'text-slate-300 group-hover:text-blue-500'}`} />
                                </div>
                                <span className="text-xs font-bold text-slate-500">{w[1]}</span>
                              </button>
                            ))}
                          </div>
                          <div className="mt-8 pt-8 border-t border-slate-100">
                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Level 2 熟词生义</h3>
                            <div className="p-5 bg-blue-50/50 rounded-2xl text-blue-900 font-bold border border-blue-100/50 cursor-pointer hover:bg-blue-50 transition-colors flex justify-between items-center group" onClick={(e) => handlePlayAudio(dbData.l2, e)}>
                              <span>{dbData.l2}</span>
                              <Volume2 className="w-4 h-4 text-blue-300 group-hover:text-blue-600" />
                            </div>
                          </div>
                        </div>
                        
                        <div className="grid md:grid-cols-2 gap-8">
                          <div className="bg-slate-900 text-white rounded-[2rem] p-8 shadow-xl relative overflow-hidden">
                            <div className="absolute top-0 right-0 opacity-10 p-6"><Target className="w-32 h-32" /></div>
                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-6 relative z-10">深度提分公式</h3>
                            <p className="font-mono leading-relaxed text-blue-100 text-lg relative z-10">{dbData.gram}</p>
                          </div>
                          <div className="bg-gradient-to-br from-indigo-50 to-blue-50 border border-blue-100 rounded-[2rem] p-8">
                            <div className="flex justify-between items-start mb-6">
                               <h3 className="text-xs font-black text-blue-500 uppercase tracking-widest">李华应用文万能句</h3>
                               <button onClick={(e) => handlePlayAudio(dbData.lihua, e)} className="p-3 bg-white rounded-full text-blue-600 hover:bg-blue-100 shadow-sm transition-all">
                                 <Volume2 className={`w-5 h-5 ${playingWord === dbData.lihua ? 'animate-pulse' : ''}`} />
                               </button>
                            </div>
                            <p className="font-serif italic font-black text-slate-800 text-2xl leading-relaxed">"{dbData.lihua}"</p>
                          </div>
                        </div>
                      </div>
                    )}

                    {tab === 'cards' && (
                      <FlashcardCarousel cards={cards} playingWord={playingWord} handlePlayAudio={handlePlayAudio} />
                    )}

                    {tab === 'writing' && (
                      <div className="bg-white rounded-[2rem] p-8 md:p-12 shadow-sm border border-slate-200/60 animate-in fade-in">
                        <div className="flex items-center gap-4 mb-8">
                          <div className="p-3 bg-amber-50 text-amber-500 rounded-2xl border border-amber-100"><MessageSquare className="w-6 h-6" /></div>
                          <div>
                            <h2 className="text-2xl font-black text-slate-900 tracking-tight">AI 写作私教</h2>
                            <p className="text-slate-500 text-sm mt-1">Topic: {dbData.tag}</p>
                          </div>
                        </div>
                        <textarea 
                          value={essayText} onChange={e => setEssayText(e.target.value)}
                          placeholder="Dear Li Hua, regarding the topic..."
                          className="w-full h-56 p-6 bg-slate-50 border border-slate-200/80 rounded-2xl focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-500/10 transition-all resize-none text-slate-700 text-lg mb-8 outline-none"
                        />
                        <button 
                          onClick={handleGrade} disabled={isGrading || !essayText.trim()}
                          className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-lg shadow-lg hover:bg-black transition-all flex items-center justify-center gap-2 disabled:opacity-50"
                        >
                          {isGrading ? <Loader2 className="w-6 h-6 animate-spin" /> : <Sparkles className="w-5 h-5 text-amber-400" />} {isGrading ? 'AI 审阅中...' : '提交智能批改'}
                        </button>

                        {essayFeedback && (
                          <div className="mt-12 space-y-6 animate-in slide-in-from-top-4">
                            <div className="flex items-center justify-between pb-6 border-b border-slate-100">
                               <h3 className="text-xl font-black text-slate-900">诊断报告</h3>
                               <div className="bg-white px-5 py-2 rounded-full shadow-sm border border-slate-200 flex items-center gap-2">
                                 <span className="text-slate-400 font-bold text-sm">Score</span>
                                 <span className="text-2xl font-black text-blue-600">{essayFeedback.score}/15</span>
                               </div>
                            </div>
                            <div className="bg-rose-50/50 p-6 rounded-2xl border border-rose-100">
                              <p className="text-xs font-black text-rose-500 uppercase tracking-widest mb-3">语法与用词</p>
                              <p className="text-slate-700 font-medium leading-relaxed whitespace-pre-wrap">{essayFeedback.errs}</p>
                            </div>
                            <div className="bg-slate-900 p-8 rounded-3xl text-white shadow-xl relative overflow-hidden mt-6">
                               <p className="text-xs font-bold text-blue-400 uppercase tracking-widest mb-4 flex items-center gap-2"><Sparkles className="w-4 h-4" /> 满分范文参考</p>
                               <p className="leading-relaxed font-serif text-xl italic font-medium">{essayFeedback.model}</p>
                            </div>
                          </div>
                        )}
                      </div>
                    )}

                    {tab === 'quiz' && (
                      <div className="max-w-3xl mx-auto">
                        {!isFinished ? (
                          <div className="bg-white rounded-[2rem] p-8 md:p-12 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 relative">
                            <div className="flex justify-between items-center mb-10 pb-6 border-b border-slate-100">
                              <span className="bg-blue-50 text-blue-600 px-4 py-1.5 rounded-lg text-xs font-black tracking-widest uppercase">
                                {currentQuizArr[quizIdx].type} {quizMode === 'generated' && '· AI'}
                              </span>
                              <div className="flex items-center gap-4 w-1/3">
                                 <div className="h-2 flex-1 bg-slate-100 rounded-full overflow-hidden">
                                    <div className="h-full bg-blue-600 transition-all duration-300" style={{ width: `${(quizIdx+1)/currentQuizArr.length*100}%` }} />
                                 </div>
                                 <span className="text-[11px] font-black text-slate-400">{quizIdx+1}/{currentQuizArr.length}</span>
                              </div>
                            </div>
                            
                            <div className="mb-10">
                              <p className="text-slate-800 text-xl font-bold leading-relaxed mb-6">{currentQuizArr[quizIdx].q}</p>
                              {currentQuizArr[quizIdx].sq && <p className="text-blue-700 font-bold text-lg bg-blue-50/50 p-5 rounded-2xl border-l-4 border-blue-600">Q: {currentQuizArr[quizIdx].sq}</p>}
                            </div>

                            <div className="space-y-4">
                              {currentQuizArr[quizIdx].opts.map((opt, i) => (
                                <button key={i} onClick={() => handleAnswer(i)} className={`w-full p-6 rounded-2xl border-2 text-left transition-all flex items-center justify-between text-lg font-medium ${
                                  answeredIdx === null ? 'border-slate-100 hover:border-blue-400 hover:bg-blue-50/30' : i === currentQuizArr[quizIdx].ans ? 'border-emerald-500 bg-emerald-50 text-emerald-900 shadow-sm' : answeredIdx === i ? 'border-rose-500 bg-rose-50 text-rose-900' : 'border-slate-50 opacity-40'
                                }`}>
                                  <span>{opt}</span>
                                  {answeredIdx !== null && i === currentQuizArr[quizIdx].ans && <CheckCircle2 className="w-6 h-6 text-emerald-500" />}
                                  {answeredIdx === i && i !== currentQuizArr[quizIdx].ans && <XCircle className="w-6 h-6 text-rose-500" />}
                                </button>
                              ))}
                            </div>

                            {answeredIdx !== null && (
                              <div className="mt-10 p-8 bg-slate-50 rounded-2xl border border-slate-100 animate-in slide-in-from-top-4 duration-300">
                                <div className="flex items-center gap-2 text-blue-600 font-black text-sm mb-4"><Lightbulb className="w-5 h-5" /> 专家深度解析</div>
                                <p className="text-slate-700 text-base leading-relaxed mb-8">
                                   {currentQuizArr[quizIdx].hint && <span className="font-bold text-slate-900 bg-yellow-200 px-2 py-0.5 rounded mr-2 text-sm">{currentQuizArr[quizIdx].hint}</span>}
                                   <br/><br/>{currentQuizArr[quizIdx].rationale || '结合本单元核心词法进行判定。'}
                                </p>
                                <button onClick={nextQuestion} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-slate-200 hover:bg-black transition-all hover:-translate-y-1">
                                  {quizIdx < currentQuizArr.length - 1 ? '继续下一题' : '查看结算报告'}
                                </button>
                              </div>
                            )}
                          </div>
                        ) : (
                          <div className="text-center bg-white border border-slate-100 rounded-[3rem] p-12 md:p-20 shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] relative overflow-hidden animate-in zoom-in-95 duration-500">
                             <div className="absolute top-0 right-0 w-80 h-80 bg-blue-50 rounded-full blur-3xl -mr-40 -mt-40 pointer-events-none" />
                             <div className="w-24 h-24 bg-slate-900 rounded-full flex items-center justify-center mx-auto mb-8 relative z-10"><Award className="w-12 h-12 text-white" /></div>
                             <h2 className="text-3xl font-black text-slate-900 mb-2 relative z-10 tracking-tight">测试完成</h2>
                             <div className="text-8xl font-black text-blue-600 mb-12 relative z-10 tracking-tighter">
                               {Math.round((sessionScore/currentQuizArr.length)*100)}<span className="text-2xl text-slate-300 font-bold ml-2">分</span>
                             </div>
                             <div className="flex flex-col gap-4 max-w-sm mx-auto relative z-10">
                                {mistakesQueue.length > 0 && <button onClick={() => startQuiz('mistakes')} className="w-full bg-rose-50 text-rose-600 py-5 rounded-2xl font-bold hover:bg-rose-100 flex items-center justify-center gap-2 transition-all border border-rose-100"><XCircle className="w-5 h-5" /> 重练 {mistakesQueue.length} 道错题</button>}
                                <button onClick={() => startQuiz('full')} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold hover:bg-black transition-all flex justify-center items-center gap-2"><RotateCcw className="w-5 h-5" /> 重新挑战全卷 (15题)</button>
                             </div>
                          </div>
                        )}
                      </div>
                    )}

                    {tab === 'mastery' && (
                      <div className="animate-in fade-in duration-500">
                        <div className="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-4">
                           <div>
                             <h2 className="text-3xl font-black text-slate-900 mb-2 tracking-tight">全景掌握度雷达</h2>
                             <p className="text-slate-500 font-medium">全局追踪 7 册书 35 个单元的进度</p>
                           </div>
                           <div className="bg-white border border-slate-200 px-4 py-2.5 rounded-xl flex items-center gap-3 shadow-sm">
                              <div className="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse" />
                              <span className="text-[11px] font-black text-slate-600 uppercase tracking-widest">Live Sync</span>
                           </div>
                        </div>

                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                          {SYLLABUS.map(book => (
                            <div key={book.id} className="bg-white border border-slate-200/60 rounded-3xl p-8 shadow-[0_4px_20px_rgb(0,0,0,0.03)] hover:shadow-[0_8px_30px_rgb(0,0,0,0.06)] transition-all">
                              <h3 className="font-black text-lg text-slate-900 mb-8 flex items-center justify-between border-b border-slate-100 pb-4">
                                {book.name} <span className="text-[10px] text-indigo-500 px-3 py-1 bg-indigo-50 rounded-full uppercase font-black">{book.id}</span>
                              </h3>
                              <div className="space-y-6">
                                {book.units.map(u => {
                                  const score = masteryData[`${book.id}-${u}`];
                                  const title = (UNIT_DB[`${book.id}-${u}`]?.title || 'Unit ' + u).split(' ')[0];
                                  return (
                                    <div key={u} className="group">
                                      <div className="flex justify-between items-center text-xs mb-3">
                                        <span className="font-bold text-slate-600 truncate max-w-[140px]">U{u}: {title}</span>
                                        {score !== undefined ? <span className="font-mono font-black text-slate-900">{score}%</span> : <span className="text-slate-300 font-medium">-</span>}
                                      </div>
                                      <div className="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                         <div className={`h-full transition-all duration-1000 ease-out ${score >= 90 ? 'bg-emerald-500' : score >= 70 ? 'bg-blue-500' : 'bg-rose-500'}`} style={{ width: `${score || 0}%` }} />
                                      </div>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </main>
            </div>
          );
        };

        // 渲染 React 应用
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
