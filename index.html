                                            <button onClick={() => startQuiz(tab === 'gaokao_quiz' ? 'gaokao' : 'full')} className="w-full bg-slate-100 text-slate-700 py-4 rounded-2xl font-bold active:bg-slate-200">重新刷题</button>
                                        </div>
                                    )}
                                </div>
                            )}

                            {tab === 'mistakes' && (
                                <div>
                                    <h2 className="text-2xl font-bold tracking-tight mb-6">专属强化错题库</h2>
                                    {mistakeBank.length === 0 ? (
                                        <div className="text-center p-10 bg-white rounded-3xl ios-shadow text-slate-400 font-medium">太棒了！当前没有任何错题记录。</div>
                                    ) : (
                                        <div className="space-y-6">
                                            <div className="p-4 bg-blue-50 text-blue-600 rounded-2xl font-medium text-sm flex items-start gap-2 mb-4 leading-relaxed">
                                                <Layers className="w-5 h-5 flex-shrink-0 mt-0.5"/>
                                                提示：您的错题已经自动转化为「互动卡片」！去卡片页面翻一翻，点击“还不知道”它会无限循环，死磕到底！
                                            </div>
                                            {mistakeBank.map(m => (
                                                <div key={m.id} className="bg-white p-6 rounded-3xl ios-shadow border-l-4 border-rose-500 relative">
                                                    <button onClick={() => setMistakeBank(prev => prev.filter(x => x.id !== m.id))} className="absolute top-4 right-4 p-2 text-slate-300 active:text-rose-500"><XCircle className="w-5 h-5"/></button>
                                                    <div className="text-[10px] font-bold text-slate-400 mb-3 uppercase tracking-wider">{m.unitKey}</div>
                                                    <p className="font-semibold text-[15px] mb-4 leading-relaxed whitespace-pre-wrap">{m.q}</p>
                                                    <div className="flex flex-col gap-2 mb-4">
                                                        <div className="bg-rose-50 text-rose-700 px-3 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2"><XCircle className="w-4 h-4"/> 你的作答: {m.wrongOpt}</div>
                                                        <div className="bg-emerald-50 text-emerald-700 px-3 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2"><CheckCircle2 className="w-4 h-4"/> 正确答案: {m.correctOpt}</div>
                                                    </div>
                                                    <p className="text-xs font-medium text-slate-500 bg-slate-50 p-4 rounded-xl mb-4 leading-relaxed whitespace-pre-wrap">{m.rat}</p>
                                                    
                                                    {m.meta && (
                                                        <button 
                                                            onClick={() => startReinforcement(m.meta)} 
                                                            className="w-full py-3.5 bg-amber-50 text-amber-700 font-bold rounded-xl active:bg-amber-100 transition-colors flex items-center justify-center gap-2"
                                                        >
                                                            <Zap className="w-4 h-4"/> 根据此考点生成强化训练
                                                        </button>
                                                    )}
                                                </div>
                                            ))}
                                            <button onClick={()=>setMistakeBank([])} className="w-full mt-6 py-4 text-rose-500 font-bold bg-white rounded-2xl active:bg-rose-50 transition-colors">清空错题本</button>
                                        </div>
                                    )}
                                </div>
                            )}

                            {tab === 'mastery' && (
                                <div>
                                    <h2 className="text-2xl font-bold tracking-tight mb-6">学习档案记录</h2>
                                    <div className="bg-white rounded-3xl p-6 ios-shadow">
                                        <h3 className="font-bold text-[15px] mb-5 border-b border-slate-100 pb-3">{SYLLABUS.find(b=>b.id===activeBookId).name} 历史最高分 (实战卷与真题卷)</h3>
                                        <div className="space-y-5">
                                            {[1,2,3,4,5].map(u => {
                                                const score = masteryData[`${activeBookId}-${u}`];
                                                return (
                                                    <div key={u}>
                                                        <div className="flex justify-between items-center text-xs mb-2">
                                                            <span className="font-semibold text-slate-500">Unit {u}</span>
                                                            {score !== undefined ? <span className="font-bold text-blue-600">{score} 分</span> : <span className="text-slate-300">未挑战</span>}
                                                        </div>
                                                        <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                                                            <div className={`h-full transition-all duration-1000 ${score >= 90 ? 'bg-emerald-500' : score >= 60 ? 'bg-blue-500' : 'bg-rose-500'}`} style={{ width: `${score || 0}%` }} />
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
