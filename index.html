          "S3-3": [
            { q: "Global warming will probably ___ more frequent extreme weather.", opts: ["result in", "result from", "come from", "date from"], ans: 0, source: "AI生成", rat: "result in（导致，接结果）符合“变暖导致极端天气”。result from、come from 表“源于”（接原因）；date from 表“追溯到”，均不符。" },
            { q: "The serious flood ___ heavy rain that lasted for a whole week.", opts: ["resulted in", "resulted from", "led to", "caused"], ans: 1, source: "AI生成", rat: "result from（起因于，接原因）符合“洪水起因于连续一周的大雨”。result in、led to 表“导致”（接结果）；caused 后接结果，均不符。" },
            { q: "Cutting down too many trees may ___ serious soil problems.", opts: ["result from", "come from", "result in", "date from"], ans: 2, source: "AI生成", rat: "result in（导致，接结果）符合“砍树导致土壤问题”。result from、come from 接原因；date from 追溯到，均不符。" },
            { q: "We find ___ necessary to take immediate action against pollution.", opts: ["that", "this", "what", "it"], ans: 3, source: "AI生成", rat: "find it + adj + to do 中 it 作形式宾语，真正宾语是不定式。that、this、what 不能作此形式宾语，均不符。" },
            { q: "The government considers ___ important to protect the environment.", opts: ["it", "that", "this", "what"], ans: 0, source: "AI生成", rat: "consider it + adj + to do 中 it 作形式宾语，真正宾语是 to do。that、this、what 不能作此形式宾语，均不符。" },
            { q: "It was the burning of fossil fuels ___ caused the temperature to rise.", opts: ["which", "that", "what", "when"], ans: 1, source: "AI生成", rat: "这是强调句 It was...that...，强调主语 the burning of fossil fuels，连接词用 that。which、what、when 不用于此强调结构，均不符。" },
            { q: "It is clean energy ___ will help us achieve sustainable development.", opts: ["which", "what", "that", "when"], ans: 2, source: "AI生成", rat: "强调句 It is...that...，强调主语 clean energy，连接词用 that。which、what、when 不用于此强调结构，均不符。" },
            { q: "Countries must work together to reduce the ___ of greenhouse gases.", opts: ["policy", "decade", "ecology", "emission"], ans: 3, source: "AI生成", rat: "emission of greenhouse gases（温室气体排放）符合语境。policy 政策；decade 十年；ecology 生态，均不符。" },
            { q: "Only by taking ___ measures can we truly solve the pollution problem.", opts: ["comprehensive", "critical", "average", "fossil"], ans: 0, source: "AI生成", rat: "comprehensive measures（全面的措施）符合“真正解决污染问题”。critical 关键的；average 平均的；fossil 化石的，均不如 comprehensive 贴切。" },
            { q: "We must develop in a ___ way so that future generations can benefit.", opts: ["comprehensive", "sustainable", "critical", "average"], ans: 1, source: "AI生成", rat: "in a sustainable way（以可持续的方式）符合“让子孙后代受益”。comprehensive 全面的；critical 关键的；average 平均的，均不符。" },
            { q: "Burning ___ fuels such as coal releases a lot of carbon dioxide.", opts: ["critical", "average", "fossil", "comprehensive"], ans: 2, source: "AI生成", rat: "fossil fuels（化石燃料）是固定搭配，如煤炭。critical 关键的；average 平均的；comprehensive 全面的，均不符。" },
            { q: "These gases ___ heat in the air and make the earth warmer.", opts: ["result", "sustain", "survey", "trap"], ans: 3, source: "AI生成", rat: "trap heat（吸收/留住热量）符合“使地球变暖”，trap 取“吸收/困住”义。result 导致；sustain 维持；survey 调查，均不符。" },
            { q: "Over the past ___, the average temperature has risen sharply.", opts: ["decade", "emission", "policy", "ecology"], ans: 0, source: "AI生成", rat: "over the past decade（过去十年）符合“平均气温急剧上升”。emission 排放；policy 政策；ecology 生态，均不符。" },
            { q: "If we do nothing, the rising sea level may bring a ___ to coastal cities.", opts: ["policy", "catastrophe", "decade", "ecology"], ans: 1, source: "AI生成", rat: "catastrophe（灾难）符合“海平面上升给沿海城市带来灾难”。policy 政策；decade 十年；ecology 生态，均不符。" },
            { q: "The government has made new ___ to protect the natural environment.", opts: ["emissions", "decades", "policies", "catastrophes"], ans: 2, source: "AI生成", rat: "make policies（制定政策）符合“保护自然环境”。emissions 排放；decades 十年；catastrophes 灾难，均不符。" },
            { q: "Cutting down forests has badly damaged the local ___.", opts: ["policy", "decade", "emission", "ecology"], ans: 3, source: "AI生成", rat: "ecology（生态）符合“砍伐森林破坏了当地生态”。policy 政策；decade 十年；emission 排放，均不符。" },
            { q: "Scientists carried out a ___ to find out how people feel about pollution.", opts: ["survey", "policy", "decade", "emission"], ans: 0, source: "AI生成", rat: "survey 取“调查”的生义，carry out a survey（开展调查）。policy 政策；decade 十年；emission 排放，均不符。" },
            { q: "Protecting the environment is a ___ task that no country can ignore.", opts: ["average", "critical", "fossil", "sustainable"], ans: 1, source: "AI生成", rat: "critical 取“极其重要的/关键的”生义，a critical task（关键任务）。average 平均的；fossil 化石的；sustainable 可持续的，均不如 critical 贴切。" },
            { q: "Heavy traffic in big cities often ___ serious air pollution.", opts: ["results from", "comes from", "results in", "dates from"], ans: 2, source: "AI生成", rat: "result in（导致，接结果）符合“交通拥堵导致空气污染”。results from、comes from 接原因；dates from 追溯到，均不符。" },
            { q: "It is people's careless habits ___ have caused much of the pollution.", opts: ["which", "what", "when", "that"], ans: 3, source: "AI生成", rat: "强调句 It is...that...，强调主语 people's careless habits，连接词用 that。which、what、when 不用于此强调结构，均不符。" }
          ],
          "S3-4": [
            { q: "The little boy was seen ___ into the old house alone.", opts: ["to go", "go", "gone", "goes"], ans: 0, source: "AI生成", rat: "see sb do 变为被动语态时，省略的 to 要还原，故 was seen to go。go、gone、goes 在被动结构中均不符。" },
            { q: "The thief was heard ___ down the back stairs in a hurry.", opts: ["run", "to run", "running", "ran"], ans: 1, source: "AI生成", rat: "hear sb do 变被动时省略的 to 要还原，故 was heard to run。run、ran 不符被动；running 虽可表正在进行，但此处强调整个动作，to run 更准确，均不如 to run。" },
            { q: "The old teacher often makes us ___ the text aloud in the morning.", opts: ["to read", "reading", "read", "reads"], ans: 2, source: "AI生成", rat: "make sb do sth（使役动词主动省 to），用原形 read。to read、reading、reads 均不符使役结构。" },
            { q: "Nothing could make the brave explorer ___ his dangerous plan.", opts: ["to give up", "giving up", "gives up", "give up"], ans: 3, source: "AI生成", rat: "make sb do（使役动词主动省 to），用原形 give up。to give up、giving up、gives up 均不符使役结构。" },
            { q: "Against all odds, the explorers finally ___ to survive in the desert.", opts: ["managed", "tried", "wanted", "hoped"], ans: 0, source: "AI生成", "需复核": true, rat: "由“finally...survive”知最终成功，manage to do 强调“设法做成”，选 managed。tried to do 仅表“努力”不一定成功；wanted/hoped 不含“做成”。【需复核】若命题侧重“努力过程”而非“结果”，tried 亦有可成立的解读，建议结合上下文确认。" },
            { q: "No matter how hard life is, never ___ your dream.", opts: ["assign", "abandon", "endure", "crush"], ans: 1, source: "AI生成", rat: "abandon one's dream（放弃梦想）符合“永不放弃”。assign 分配；endure 忍受；crush 压碎，均不符。" },
            { q: "The brave soldiers had to ___ great hardship in the cold mountains.", opts: ["abandon", "assign", "endure", "crush"], ans: 2, source: "AI生成", rat: "endure hardship（忍受艰难）符合“在寒冷山区忍受艰苦”。abandon 放弃；assign 分配；crush 压碎，均不符。" },
            { q: "With great ___, he kept training and finally reached the mountain top.", opts: ["qualification", "expedition", "candidate", "perseverance"], ans: 3, source: "AI生成", rat: "perseverance（坚持不懈）符合“坚持训练终登顶”。qualification 资格；expedition 探险；candidate 候选人，均不符。" },
            { q: "He showed great ___ and refused to give in to the difficulties.", opts: ["resolution", "qualification", "expedition", "candidate"], ans: 0, source: "AI生成", rat: "resolution（决心）符合“拒绝向困难屈服”。qualification 资格；expedition 探险；candidate 候选人，均不符。" },
            { q: "The team set off on a dangerous ___ to the South Pole.", opts: ["resolution", "expedition", "qualification", "candidate"], ans: 1, source: "AI生成", rat: "an expedition（探险）符合“前往南极的危险探险”。resolution 决心；qualification 资格；candidate 候选人，均不符。" },
            { q: "Only those with the right ___ can apply for this difficult job.", opts: ["resolutions", "expeditions", "qualifications", "candidates"], ans: 2, source: "AI生成", rat: "qualifications（资格）符合“只有具备相应资格者才能申请”。resolutions 决心；expeditions 探险；candidates 候选人，均不符。" },
            { q: "The teacher ___ each student a different part of the project.", opts: ["endured", "abandoned", "crushed", "assigned"], ans: 3, source: "AI生成", rat: "assign sb sth（给某人分配某物）符合“给每个学生分配不同任务”。endure 忍受；abandon 放弃；crush 压碎，均不符。" },
            { q: "The heavy box almost ___ his fingers when it fell down.", opts: ["crushed", "endured", "assigned", "abandoned"], ans: 0, source: "AI生成", rat: "crush（压碎/压伤）符合“重箱子掉下几乎压伤手指”。endure 忍受；assign 分配；abandon 放弃，均不符。" },
            { q: "Their ___ in the wild depended on finding clean water quickly.", opts: ["resolution", "survival", "expedition", "candidate"], ans: 1, source: "AI生成", rat: "survival（生存）符合“野外生存取决于尽快找到水”。resolution 决心；expedition 探险；candidate 候选人，均不符。" },
            { q: "She is one of the strongest ___ for the position of team leader.", opts: ["resolutions", "expeditions", "candidates", "qualifications"], ans: 2, source: "AI生成", rat: "candidates（候选人）符合“队长一职最有力的候选人之一”。resolutions 决心；expeditions 探险；qualifications 资格，均不符。" },
            { q: "When the bell rang, the passengers hurried to ___ the morning train.", opts: ["endure", "assign", "crush", "board"], ans: 3, source: "AI生成", rat: "board 取“上（车/船/飞机）”的生义，board the train（上火车）。endure 忍受；assign 分配；crush 压碎，均不符。" },
            { q: "Despite many dangers, they ___ to reach the lost city at last.", opts: ["managed", "abandoned", "assigned", "crushed"], ans: 0, source: "AI生成", rat: "manage to do 取“设法做到”的生义（熟义是“管理”），符合“历经危险终于到达失落之城”。abandon 放弃；assign 分配；crush 压碎，均不符。" },
            { q: "The explorers went through great ___ before they were finally rescued.", opts: ["resolution", "hardship", "expedition", "candidate"], ans: 1, source: "AI生成", rat: "hardship（艰难/困苦）符合“探险者历经艰苦终获救”。resolution 决心；expedition 探险；candidate 候选人，均不符。" },
            { q: "Lost in the desert, the travellers felt cold, hungry and ___.", opts: ["qualified", "assigned", "miserable", "boarded"], ans: 2, source: "AI生成", rat: "miserable（痛苦的/凄惨的）符合“迷失沙漠，又冷又饿又凄惨”。qualified 合格的；assigned 被分配的；boarded 登上的，均不符。" },
            { q: "The captain was seen ___ the last passenger off the sinking ship.", opts: ["help", "helping", "helped", "to help"], ans: 3, source: "AI生成", rat: "see sb do 变被动时省略的 to 要还原，故 was seen to help。help、helped 不符被动；helping 虽可表进行，但强调完整动作时 to help 更准确，均不如 to help。" }
          ],
          "S3-5": [
            { q: "The idea ___ we should protect traditional poetry is widely accepted.", opts: ["that", "which", "what", "where"], ans: 0, source: "AI生成", rat: "idea 后的同位语从句用 that 引导，且 that 不作成分。which、what 需作成分；where 表地点，均不符。" },
            { q: "The fact ___ poetry can touch our hearts is known to everyone.", opts: ["which", "that", "what", "how"], ans: 1, source: "AI生成", rat: "fact 后的同位语从句用 that 引导，不作成分。which、what 需作成分；how 表方式，均不符。" },
            { q: "Poetry is a special form of literature ___ touches people's hearts deeply.", opts: ["what", "it", "that", "where"], ans: 2, source: "AI生成", rat: "定语从句中关系词作主语，先行词为物，用 that（或 which）。what、it 不引导定语从句；where 作状语，均不符。" },
            { q: "This is the poem ___ the poet wrote for his beloved hometown.", opts: ["what", "where", "when", "that"], ans: 3, source: "AI生成", rat: "定语从句中关系词作 wrote 的宾语，先行词为物，用 that（或 which）。what 不引导定从；where、when 作状语，均不符。" },
            { q: "By no means ___ easy to write a poem that truly moves readers.", opts: ["is it", "it is", "it was", "does it"], ans: 0, source: "AI生成", rat: "否定词组 By no means 置于句首，主句部分倒装，故 is it。it is、it was 未倒装；does it 助动词搭配不当，均不符。" },
            { q: "Not only ___ beautiful language, but it also expresses deep feelings.", opts: ["the poem has", "does the poem have", "has the poem", "the poem does have"], ans: 1, source: "AI生成", rat: "Not only 置于句首，主句部分倒装，需借助助动词，故 does the poem have。the poem has、the poem does have 未倒装；has the poem 倒装但缺少助动词逻辑（实义动词 have 此处用 does 倒装更规范），均不如 B。" },
            { q: "The short poem vividly ___ the poet's deep love for his homeland.", opts: ["translates", "rhymes", "conveys", "repeats"], ans: 2, source: "AI生成", rat: "convey（传达情感）符合“生动传达诗人对故乡的爱”。translate 翻译；rhyme 押韵；repeat 重复，均不符。" },
            { q: "Good poems can ___ deep emotions in just a few simple words.", opts: ["rhyme", "translate", "repeat", "convey"], ans: 3, source: "AI生成", rat: "convey emotions（传达情感）符合“用简单文字传达深情”。rhyme 押韵；translate 翻译；repeat 重复，均不符。" },
            { q: "In this poem, the last word of each line ___ with the next one.", opts: ["rhymes", "conveys", "translates", "repeats"], ans: 0, source: "AI生成", rat: "rhyme with（与……押韵）符合“每行最后一个词押韵”。convey 传达；translate 翻译；repeat 重复，均不符。" },
            { q: "Chinese poetry is often very hard to ___ into other languages.", opts: ["convey", "translate", "rhyme", "repeat"], ans: 1, source: "AI生成", rat: "translate...into（翻译成）符合“中文诗很难译成别的语言”。convey 传达；rhyme 押韵；repeat 重复，均不符。" },
            { q: "Poetry allows us to express our feelings in a ___ and creative way.", opts: ["concrete", "rhythmic", "flexible", "minimum"], ans: 2, source: "AI生成", rat: "a flexible way（灵活的方式）符合“以灵活而有创意的方式表达情感”。concrete 具体的；rhythmic 有节奏的；minimum 最小的，均不如 flexible 贴切。" },
            { q: "Unlike abstract ideas, this poem uses very ___ images like rivers and hills.", opts: ["flexible", "rhythmic", "minimum", "concrete"], ans: 3, source: "AI生成", rat: "concrete images（具体的意象）与 abstract（抽象）相对，符合“河流和山丘等具体意象”。flexible 灵活的；rhythmic 有节奏的；minimum 最小的，均不符。" },
            { q: "The clever use of ___ makes the poem easy to remember and recite.", opts: ["repetition", "format", "minimum", "reputation"], ans: 0, source: "AI生成", rat: "repetition（重复）符合“巧妙的重复让诗易记易诵”。format 格式；minimum 最小量；reputation 名誉，均不符。" },
            { q: "This kind of poem follows a fixed ___ of five words in each line.", opts: ["repetition", "format", "minimum", "reputation"], ans: 1, source: "AI生成", rat: "a fixed format（固定的格式）符合“每行五个字的固定格式”。repetition 重复；minimum 最小量；reputation 名誉，均不符。" },
            { q: "The drums gave the song a strong and lively ___ beat.", opts: ["flexible", "concrete", "rhythmic", "minimum"], ans: 2, source: "AI生成", rat: "a rhythmic beat（有节奏的节拍）符合“鼓声给歌曲强烈而活泼的节奏”。flexible 灵活的；concrete 具体的；minimum 最小的，均不符。" },
            { q: "A good poem can express rich meaning with a ___ of words.", opts: ["maximum", "format", "repetition", "minimum"], ans: 3, source: "AI生成", rat: "with a minimum of words（用最少的字）符合“好诗以最少的字表达丰富含义”。maximum 至多；format 格式；repetition 重复，均不符。" },
            { q: "Each ___ of this long poem describes a different season of the year.", opts: ["verse", "format", "minimum", "reputation"], ans: 0, source: "AI生成", rat: "verse 取“诗节/韵文”的生义，each verse（每一诗节）。format 格式；minimum 最小量；reputation 名誉，均不符。" },
            { q: "Repeated lines form a clear ___ that runs through the whole poem.", opts: ["format", "pattern", "minimum", "reputation"], ans: 1, source: "AI生成", rat: "pattern 取“模式/格律”的生义（熟义是“图案”），a clear pattern（清晰的格律）。format 格式（语义近但 pattern 更指贯穿全诗的规律）；minimum 最小；reputation 名誉，均不符。" },
            { q: "A skilled poet can ___ ordinary words into beautiful lines.", opts: ["rhyme", "repeat", "transform", "translate"], ans: 2, source: "AI生成", rat: "transform 取“彻底改变/使改观”的生义，transform...into（把……变成）。rhyme 押韵；repeat 重复；translate 翻译，均不符。" },
            { q: "Never before ___ such a moving poem about ordinary people's lives.", opts: ["I have read", "I read", "read I", "have I read"], ans: 3, source: "AI生成", rat: "否定副词 Never before 置于句首，主句部分倒装，故 have I read。I have read、I read 未倒装；read I 完全倒装不符。" }
          ],
          "S4-1": [
            { q: "By the time I got to the station, the train ___.", opts: ["had left", "left", "has left", "leaves"], ans: 0, source: "AI生成", rat: "主句 got 是过去时，火车开走发生在“到达”之前，即“过去的过去”，用过去完成时 had left。left、has left、leaves 均不符。" },
            { q: "When she arrived home, her family ___ already had dinner.", opts: ["has", "had", "have", "having"], ans: 1, source: "AI生成", rat: "主句 arrived 是过去时，吃饭发生在到家之前，用过去完成时 had had。has、have、having 均不符“过去的过去”。" },
            { q: "He told me that he ___ the book before he lent it to his friend.", opts: ["reads", "has read", "had read", "reading"], ans: 2, source: "AI生成", rat: "主句 told 是过去时，读书发生在借书之前，用过去完成时 had read。reads、has read、reading 均不符“过去的过去”。" },
            { q: "It is the first time that I ___ such a wonderful English play.", opts: ["saw", "had seen", "see", "have seen"], ans: 3, source: "AI生成", rat: "It is the first time that 从句用现在完成时 have seen。saw、had seen、see 均不符该固定句式。" },
            { q: "It is the second time that she ___ this difficult question today.", opts: ["has asked", "asked", "had asked", "asks"], ans: 0, source: "AI生成", rat: "It is the ... time that 从句用现在完成时 has asked。asked、had asked、asks 均不符该固定句式。" },
            { q: "He often ___ on his school days and feels grateful to his teachers.", opts: ["contrasts", "reflects", "predicts", "abandons"], ans: 1, source: "AI生成", rat: "reflect on（反思、回顾）符合语境。contrast 对比；predict 预测；abandon 放弃，均不符。" },
            { q: "These ___ memories of childhood will stay in my heart forever.", opts: ["subjective", "explicit", "vivid", "precise"], ans: 2, source: "AI生成", rat: "vivid memories（生动的回忆）符合语境。subjective 主观的；explicit 明确的；precise 精确的，均不贴合“生动”。" },
            { q: "The teacher gave ___ instructions so that no one would be confused.", opts: ["subjective", "vivid", "specific", "explicit"], ans: 3, source: "AI生成", rat: "explicit instructions（明确的指示）符合“以免有人困惑”。subjective 主观的；vivid 生动的；specific（虽近但 explicit 更强调“清楚明白”），subjective、vivid 不符。" },
            { q: "Whether a film is good or bad is often a ___ judgement.", opts: ["subjective", "explicit", "vivid", "precise"], ans: 0, source: "AI生成", rat: "a subjective judgement（主观的判断）符合“电影好坏往往因人而异”。explicit 明确的；vivid 生动的；precise 精确的，均不符。" },
            { q: "Scientists need ___ data to draw a reliable conclusion.", opts: ["subjective", "precise", "vivid", "specific"], ans: 1, source: "AI生成", rat: "precise data（精确的数据）符合“得出可靠结论”。subjective 主观的；vivid 生动的；specific（具体的，语义偏），subjective、vivid 明显不符。" },
            { q: "Please give me a ___ time and place for our meeting tomorrow.", opts: ["subjective", "vivid", "specific", "explicit"], ans: 2, source: "AI生成", rat: "a specific time and place（具体的时间和地点）符合语境。subjective 主观的；vivid 生动的；explicit（明确的，与 specific 近但搭配 time and place 用 specific 更自然），subjective、vivid 不符。" },
            { q: "Nobody expected such a happy ___ to this difficult situation.", opts: ["incident", "theme", "contrast", "outcome"], ans: 3, source: "AI生成", rat: "a happy outcome（圆满的结果）符合“没人料到困境有这样的结果”。incident 事件；theme 主题；contrast 对比，均不符。" },
            { q: "A small ___ at the party turned into a big quarrel between them.", opts: ["incident", "outcome", "theme", "contrast"], ans: 0, source: "AI生成", rat: "a small incident（小事件）符合“一件小事演变成大争吵”。outcome 结果；theme 主题；contrast 对比，均不符。" },
            { q: "The main ___ of his speech was the importance of friendship.", opts: ["incident", "theme", "outcome", "contrast"], ans: 1, source: "AI生成", rat: "the main theme（主题）符合“演讲的主题是友谊的重要性”。incident 事件；outcome 结果；contrast 对比，均不符。" },
            { q: "In ___ to his quiet brother, Tom loves talking and making friends.", opts: ["incident", "outcome", "contrast", "theme"], ans: 2, source: "AI生成", rat: "in contrast to（与……形成对比）符合“与安静的弟弟相反，汤姆爱说话”。incident 事件；outcome 结果；theme 主题，均不符。" },
            { q: "He explained the rules in ___ language so that all could understand.", opts: ["subjective", "vivid", "precise", "plain"], ans: 3, source: "AI生成", rat: "plain 取“清楚的/朴素的”生义（熟义是“平原”），plain language（通俗易懂的语言）。subjective 主观的；vivid 生动的；precise 精确的，均不符。" },
            { q: "Before writing, she made a clear ___ of the whole story.", opts: ["outline", "incident", "contrast", "theme"], ans: 0, source: "AI生成", rat: "outline 取“提纲/概述”的生义，make an outline（列提纲）。incident 事件；contrast 对比；theme 主题，均不符。" },
            { q: "A child's natural ___ drives them to ask question after question.", opts: ["curious", "curiosity", "curiously", "cure"], ans: 1, source: "AI生成", rat: "curiosity（名词：好奇心）派生自 curious，符合“好奇心驱使孩子不停发问”。curious 形容词；curiously 副词；cure 治愈，均不作此名词。" },
            { q: "His answer was so ___ that nobody could tell what he really meant.", opts: ["explicit", "precise", "ambiguous", "specific"], ans: 2, source: "AI生成", rat: "ambiguous（模棱两可的）符合“没人弄清他的真实意思”。explicit 明确的；precise 精确的；specific 具体的，语义均相反或不符。" },
            { q: "Reflecting ___ his high school life, he realised how much he had grown.", opts: ["at", "for", "with", "on"], ans: 3, source: "AI生成", rat: "reflect on（反思/回顾）中介词用 on。at、for、with 均不与 reflect 搭配此意。" }
          ],
          "S4-2": [
            { q: "A serious traffic accident ___ at this crossroads last weekend.", opts: ["happened", "was happened", "is happened", "has been happened"], ans: 0, source: "AI生成", rat: "happen 是不及物动词，没有被动语态，用一般过去时 happened。was happened、is happened、has been happened 均错。" },
            { q: "A great change ___ in this small village over the past ten years.", opts: ["was taken place", "took place", "is taken place", "has been taken place"], ans: 1, source: "AI生成", rat: "take place 没有被动语态，用一般过去时 took place。was taken place、is taken place、has been taken place 均违反“take place 无被动”规则。" },
            { q: "The accident ___ before the police arrived at the scene.", opts: ["was occurred", "is occurred", "occurred", "has been occurred"], ans: 2, source: "AI生成", rat: "occur 是不及物动词，无被动，用一般过去时 occurred。was occurred、is occurred、has been occurred 均错。" },
            { q: "Throughout his life, he was committed to ___ the lives of ordinary people.", opts: ["improve", "improved", "to improve", "improving"], ans: 3, source: "AI生成", rat: "be committed to 中 to 是介词，后接动名词 improving。improve 原形；improved 过去式；to improve 不定式，均不符。" },
            { q: "The scientist devoted his whole life to ___ new sources of energy.", opts: ["exploring", "explore", "explored", "to explore"], ans: 0, source: "AI生成", rat: "devote...to 中 to 是介词，后接动名词 exploring。explore 原形；explored 过去式；to explore 不定式，均不符。" },
            { q: "It is widely ___ that he is one of the greatest scientists of our time.", opts: ["acknowledge", "acknowledged", "acknowledging", "to acknowledge"], ans: 1, source: "AI生成", rat: "It is widely acknowledged that...（人们普遍认为）为固定被动句式，用过去分词 acknowledged。acknowledge、acknowledging、to acknowledge 均不符。" },
            { q: "It is generally ___ that hard work leads to success.", opts: ["believe", "believing", "believed", "to believe"], ans: 2, source: "AI生成", rat: "It is generally believed that...（人们普遍相信）为固定被动句式，用过去分词 believed。believe、believing、to believe 均不符。" },
            { q: "Her ___ efforts over many years finally led to a great breakthrough.", opts: ["iconic", "initial", "virtual", "persistent"], ans: 3, source: "AI生成", rat: "persistent efforts（坚持不懈的努力）符合“多年努力终有突破”。iconic 标志性的；initial 最初的；virtual 虚拟的，均不符。" },
            { q: "Einstein is an ___ figure whose theories changed modern science.", opts: ["iconic", "initial", "virtual", "modest"], ans: 0, source: "AI生成", rat: "an iconic figure（标志性人物）符合“理论改变了现代科学”。initial 最初的；virtual 虚拟的；modest 谦虚的，均不符。" },
            { q: "Her discovery had a ___ influence on the treatment of this disease.", opts: ["initial", "profound", "virtual", "persistent"], ans: 1, source: "AI生成", rat: "a profound influence（深远的影响）符合“对这种疾病的治疗影响深远”。initial 最初的；virtual 虚拟的；persistent 坚持的，均不符。" },
            { q: "After years of research, the team finally made a great ___.", opts: ["commitment", "patent", "breakthrough", "genius"], ans: 2, source: "AI生成", rat: "make a breakthrough（取得突破）符合“多年研究终有突破”。commitment 奉献；patent 专利；genius 天才，均不符。" },
            { q: "Many people regard him as a ___ because of his amazing talent.", opts: ["commitment", "breakthrough", "patent", "genius"], ans: 3, source: "AI生成", rat: "a genius（天才）符合“因惊人才华被视为天才”。commitment 奉献；breakthrough 突破；patent 专利，均不符。" },
            { q: "Newton was one of the most ___ scientists in human history.", opts: ["influential", "initial", "virtual", "modest"], ans: 0, source: "AI生成", rat: "influential（有影响力的）符合“人类历史上最有影响力的科学家之一”。initial 最初的；virtual 虚拟的；modest 谦虚的，均不符。" },
            { q: "The scientist applied for a ___ to protect his new invention.", opts: ["genius", "patent", "commitment", "breakthrough"], ans: 1, source: "AI生成", rat: "apply for a patent（申请专利）符合“保护新发明”。genius 天才；commitment 奉献；breakthrough 突破，均不符。" },
            { q: "His deep ___ to science kept him working in the lab day and night.", opts: ["patent", "genius", "commitment", "breakthrough"], ans: 2, source: "AI生成", rat: "commitment to science（对科学的奉献）符合“日夜在实验室工作”。patent 专利；genius 天才；breakthrough 突破，均不符。" },
            { q: "Though a famous scientist, she lived in a ___ house with simple furniture.", opts: ["iconic", "initial", "virtual", "modest"], ans: 3, source: "AI生成", rat: "modest 取“不大的/适中的”生义（熟义是“谦虚的”），a modest house（不大的房子）。iconic 标志性的；initial 最初的；virtual 虚拟的，均不符。" },
            { q: "The scientists ___ a series of experiments to test the new theory.", opts: ["conducted", "acknowledged", "committed", "patented"], ans: 0, source: "AI生成", rat: "conduct 取“实施/进行”的生义，conduct experiments（做实验）。acknowledge 承认；commit 致力于；patent 申请专利，均不符。" },
            { q: "His great discovery soon won him fame and ___ all over the world.", opts: ["patent", "honour", "initial", "virtual"], ans: 1, source: "AI生成", rat: "win fame and honour（赢得名声和荣誉）符合语境，fame 取“名望”生义。patent 专利；initial 最初的；virtual 虚拟的，均不符。" },
            { q: "This scientific ___ has been widely tested and proved correct.", opts: ["patent", "genius", "theory", "commitment"], ans: 2, source: "AI生成", rat: "a scientific theory（科学理论）符合“被广泛验证并证明正确”。patent 专利；genius 天才；commitment 奉献，均不符。" },
            { q: "A terrible earthquake ___ in that area many years ago.", opts: ["was happened", "is happened", "has been happened", "happened"], ans: 3, source: "AI生成", rat: "happen 是不及物动词，没有被动语态，用一般过去时 happened。was happened、is happened、has been happened 均违反“happen 无被动”规则。" }
          ],
          "S4-3": [
            { q: "___ in the fierce battle, the young soldier was quickly sent to hospital.", opts: ["Wounded", "Wounding", "To wound", "Wound"], ans: 0, source: "AI生成", rat: "soldier 与 wound 是被动关系（被打伤），用过去分词 Wounded 作状语。Wounding 表主动；To wound、Wound 形式不符。" },
            { q: "___ by the enemy, the brave fighters still refused to give up.", opts: ["Surrounding", "Surrounded", "To surround", "Surround"], ans: 1, source: "AI生成", rat: "fighters 与 surround 是被动关系（被包围），用过去分词 Surrounded 作状语。Surrounding 表主动；To surround、Surround 形式不符。" },
            { q: "___ all his work, the soldier sat down to write a letter home.", opts: ["Finishing", "Finished", "Having finished", "To finish"], ans: 2, source: "AI生成", rat: "完成工作在写信之前，且 soldier 主动完成，用完成式现在分词 Having finished 作状语。Finishing（不强调先后）、Finished（被动）、To finish（将来未做）均不如准确。" },
            { q: "In 1939, that country officially ___ war on its neighbour.", opts: ["announced", "informed", "spoke", "declared"], ans: 3, source: "AI生成", rat: "declare war on（向……宣战）为固定搭配。announce 通告消息；inform 通知某人；speak 说话，均不与 war on 搭配。" },
            { q: "The government ___ that the war had finally come to an end.", opts: ["announced", "declared", "informed", "spoke"], ans: 0, source: "AI生成", rat: "announce that（宣布消息）符合“政府宣布战争终于结束”。declare 常接 war/independence；inform 接 sb；speak 说话，均不如 announce 贴切。" },
            { q: "Lasting peace was finally won ___ the cost of countless lives.", opts: ["in", "at", "for", "with"], ans: 1, source: "AI生成", rat: "at the cost of（以……为代价）为固定短语。in、for、with 均不构成该习惯表达。" },
            { q: "Many brave heroes made the ultimate ___ to defend their country.", opts: ["conflict", "violence", "sacrifice", "honour"], ans: 2, source: "AI生成", rat: "make the ultimate sacrifice（做出最大牺牲，指捐躯）符合语境。conflict 冲突；violence 暴力；honour 荣誉，均不与 make the ultimate ... 搭配此意。" },
            { q: "The two countries were in serious ___ over the disputed border.", opts: ["honour", "justice", "memorial", "conflict"], ans: 3, source: "AI生成", rat: "in conflict over（在……上冲突）符合“两国因争议边界严重冲突”。honour 荣誉；justice 正义；memorial 纪念碑，均不符。" },
            { q: "The soldiers fought a fierce ___ to defend the small town.", opts: ["battle", "honour", "justice", "memorial"], ans: 0, source: "AI生成", rat: "fight a battle（打一场战役）符合“为保卫小镇激战”。honour 荣誉；justice 正义；memorial 纪念碑，均不符。" },
            { q: "It is a great ___ to serve and protect one's country.", opts: ["conflict", "honour", "violence", "memorial"], ans: 1, source: "AI生成", rat: "a great honour（莫大的荣誉）符合“为国效力是莫大的荣誉”。conflict 冲突；violence 暴力；memorial 纪念碑，均不符。" },
            { q: "A tall ___ was built to remember the heroes who died in the war.", opts: ["conflict", "violence", "memorial", "justice"], ans: 2, source: "AI生成", rat: "a memorial（纪念碑）符合“纪念战争中牺牲的英雄”。conflict 冲突；violence 暴力；justice 正义，均不符。" },

            if (dbData.l2 && Array.isArray(dbData.l2)) {
                dbData.l2.forEach(w => {
                    cards.push({ id: `l2-${w.w}`, f: `[熟词生义/派生]\n${w.w}`, b: w.m, type: 'l2' });
                });
            }
            dbData.grammar.forEach(g => {
                cards.push({ id: `g-${g.t}`, f: `[核心语法]\n${g.t}`, b: `${g.r}\n\n[例句/避坑]: ${g.p}`, type: 'grammar' });
            });
            dbData.sentences.forEach((s, idx) => {
                cards.push({ id: `s-${idx}`, f: `[李华金句] 翻译：\n${s.z}`, b: s.e, type: 'sentence' });
            });
            return shuffle(cards);
        };

        // Fisher-Yates 均匀洗牌
        const shuffle = (arr) => {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        };
        const unique = (arr) => [...new Set((arr || []).filter(Boolean))];
        const pickN = (arr, n) => shuffle(unique(arr)).slice(0, n);
        const cleanWord = (w) => (w || '').replace(/\(.*?\)/g, '').trim();

        const getWordPool = (unitData) => {
            const words = (unitData?.words || []).map(w => ({
                ...w,
                w: cleanWord(w.w),
                m: (w.m || '').trim(),
                d: (w.d || '').trim()
            })).filter(w => w.w);
            const l2 = (unitData?.l2 || []).map(w => ({
                ...w,
                w: cleanWord(w.w),
                m: (w.m || '').trim(),
                d: (w.d || '').trim()
            })).filter(w => w.w);
            return { words, l2, all: [...words, ...l2] };
        };

        const getGrammarPool = (unitData) => {
            return (unitData?.grammar || []).map(g => ({
                ...g,
                t: (g.t || '').trim(),
                r: (g.r || '').trim(),
                p: (g.p || '').trim()
            })).filter(g => g.t || g.r || g.p);
        };

        const getSentencePool = (unitData) => {
            return (unitData?.sentences || []).map((s, idx) => ({

                id: idx,
                z: (s.z || '').trim(),
                e: (s.e || '').trim()
            })).filter(s => s.z || s.e);
        };

        const makeOptions = (correct, pool, count = 4) => {
            const distractors = pickN((pool || []).filter(x => x && x !== correct), count - 1);
            const opts = shuffle([correct, ...distractors]);
            return { opts, ans: opts.indexOf(correct) };
        };

        const makeMeaningDistractors = (pool, correctMean) => {
            const candidates = (pool || []).map(x => x.m).filter(Boolean).filter(x => x !== correctMean);
            return makeOptions(correctMean, candidates, 4);
        };

        const makeWordDistractors = (pool, correctWord) => {
            const candidates = (pool || []).map(x => x.w).filter(Boolean).filter(x => x !== correctWord);
            return makeOptions(correctWord, candidates, 4);
        };

            const candidates = unique([

                ...(pool || []).map(x => x.m).filter(Boolean),
                ...(pool || []).map(x => x.w).filter(Boolean)
            ]).filter(x => x !== correctText);
            return makeOptions(correctText, candidates, 4);
        };

        const makeContextParagraph = (unitData, word = null) => {
            const themes = getThemeText(unitData?.title || '');
            const base = themes[Math.floor(Math.random() * themes.length)];
            if (!word) return base;
            return `${base} In this context, the idea related to "${word.w}" becomes especially important.`;
        };

        const buildThemeMeaningQ = (unitData, word, pool) => {
            const themeText = makeContextParagraph(unitData, word);
            const correct = word.m || '正确释义';
            const { opts, ans } = makeMeaningDistractors(pool, correct);
            return {
                type: '重点练习 - 词义辨析',

In the unit context, what does "${word.w}" most probably mean?`,

[搭配] ${word.d}` : ''}`,
                meta: { type: 'word', data: word }

        };

        const buildContextWordQ = (unitData, word, pool) => {
            const context = makeContextParagraph(unitData, word);
            const correct = word.w;
            const { opts, ans } = makeWordDistractors(pool, correct);
            return {

        const buildCollocationQ = (unitData, word, pool) => {
            const correct = word.d || word.w;

        const buildGrammarInContextQ = (unitData, g, pool) => {
            const themes = getThemeText(unitData?.title || '');
            const themeLine = themes[Math.floor(Math.random() * themes.length)];
            const correct = g.r || g.p || g.t;

            return {

When dealing with the grammar point "${g.t}", which option gives the best rule?`,

                meta: { type: 'grammar', data: g }
            };
        };

        const buildGrammarErrorQ = (unitData, g, pool) => {
            const themes = getThemeText(unitData?.title || '');
            const themeLine = themes[Math.floor(Math.random() * themes.length)];
            const correct = g.p || g.r || g.t;

            return {

A student is likely to lose points on "${g.t}". What is the key pitfall?`,

                meta: { type: 'grammar', data: g }
            };
        };

        const buildSentenceInferenceQ = (unitData, s) => {
            const others = (unitData?.sentences || []).map(x => x.e).filter(Boolean).filter(x => x !== s.e);
            const fallback = [
                'It only explains a grammar form without meaning.',
                'It focuses on an unrelated social issue.',
                'It conveys the opposite of the original sentence.',
                'It is too general to match the sentence exactly.'
            ];
            const { opts, ans } = makeOptions(s.e, [...others, ...fallback], 4);
            return {
                type: '重点练习 - 句意推断',
                q: `[${getRandomTag()}] Read the sentence in the unit context:
"${s.z}"

Which option best expresses its meaning?`,
                opts,
                ans,
                rat: `[解析] 正确理解是：${s.e}。这类题考查句意提炼、情感色彩和主题对应。`,
                meta: { type: 'sentence', data: s }
            };
        };

        const buildWritingStrategyQ = (unitData, word, grammar) => {
            const correct = `Keep the unit theme "${unitData?.title || ''}" in mind, use "${word.w}" accurately, and match it with the grammar point "${grammar?.t || 'of this unit'}".`;
            const opts = shuffle([
                correct,
                'Translate the Chinese meaning directly and ignore collocation.',
                'Use the target word in any tense because meaning matters more than grammar.',
                'Memorize the word alone without connecting it to sentence context.'
            ]);
            return {
                type: '重点练习 - 写作表达',
                q: `[${getRandomTag()}] To write a Zhejiang-style sentence for the topic "${unitData?.title || 'this unit'}", which strategy is the best?`,
                opts,
                ans: opts.indexOf(correct),
                rat: `[解析] 写作题最看重“主题贴合 + 词汇准确 + 语法匹配”。单词、搭配和结构必须同时对。`,
                meta: { type: 'writing', data: { word, grammar } }
            };
        };

        const generateZhejiangQuiz = (unitData, isGaokaoMode = false, unitKey = '') => {
            const { words, l2, all } = getWordPool(unitData);
            const grammar = getGrammarPool(unitData);
            const sentences = getSentencePool(unitData);
            const quiz = [];
            const minCount = isGaokaoMode ? 20 : 10;

            // 按“题型 + 考点”去重，避免同一套题里出现重复题目
            const seen = new Set();
            const pushQ = (q) => {
                const d = q.meta?.data || {};
                const key = `${q.type}|${d.w ?? d.t ?? d.id ?? d.word?.w ?? q.q}`;
                if (seen.has(key)) return;
                seen.add(key);
                quiz.push(q);
            };

            // 先放入该单元的 AI 精选题（已人工校验），保证一定出现并与动态题区分
            (QUESTION_BANK[unitKey] || []).forEach(item => {
                pushQ({
                    type: '精选题（AI生成）',
                    q: item.q,
                    opts: item.opts,
                    ans: item.ans,
                    rat: item.rat,
                    source: item.source || 'AI生成',
                    needsReview: item['需复核'] === true,
                    meta: null
                });
            });
            const curatedCount = quiz.length;

            pickN(words, isGaokaoMode ? 5 : 3).forEach(w => {
                pushQ(buildThemeMeaningQ(unitData, w, all));
                pushQ(buildContextWordQ(unitData, w, all));
            });

            pickN(all, isGaokaoMode ? 4 : 2).forEach(w => {
                pushQ(buildCollocationQ(unitData, w, all));
            });

            pickN(grammar, isGaokaoMode ? 4 : 2).forEach(g => {
                pushQ(buildGrammarInContextQ(unitData, g, grammar));
                pushQ(buildGrammarErrorQ(unitData, g, grammar));
            });

            pickN(sentences, isGaokaoMode ? 4 : 2).forEach(s => {
                pushQ(buildSentenceInferenceQ(unitData, s));
            });

            if (isGaokaoMode && words.length) {
                pickN(words, 2).forEach((w, i) => {
                    pushQ(buildWritingStrategyQ(unitData, w, grammar[i % Math.max(grammar.length, 1)] || null));
                });
            }

            let guard = 0;
            while (quiz.length < minCount && guard < 100) {
                guard++;
                if (words.length) {
                    const w = words[guard % words.length];
                    pushQ(buildThemeMeaningQ(unitData, w, all));
                }
                if (quiz.length >= minCount) break;
                if (grammar.length) {
                    const g = grammar[guard % grammar.length];
                    pushQ(buildGrammarInContextQ(unitData, g, grammar));
                }
                if (quiz.length >= minCount) break;
                if (sentences.length) {
                    const s = sentences[guard % sentences.length];
                    pushQ(buildSentenceInferenceQ(unitData, s));
                }
            }

            // 精选题始终保留在前，其余动态题打乱后填充
            const head = shuffle(quiz.slice(0, Math.min(curatedCount, minCount)));
            const tail = shuffle(quiz.slice(curatedCount));
            return [...head, ...tail].slice(0, minCount);
        };

        const buildReinforcementQs = (mistakeMeta) => {
            const qs = [];
            if (!mistakeMeta) return qs;

            if (mistakeMeta.type === 'word') {
                const w = mistakeMeta.data;
                const correct1 = w.m || 'Correct meaning';
                const opts1 = shuffle([
                    correct1,
                    `The opposite meaning of ${w.w}`,
                    'A random grammar term',
                    'An unrelated topic'
                ]);
                qs.push({
                    type: '错题巩固 - 词义回练',
                    q: `In the same unit context, what is the most suitable meaning of "${w.w}"?`,
                    opts: opts1,
                    ans: opts1.indexOf(correct1),
                    rat: `[解析] ${w.w} 的核心释义是：${w.m || '请回到单元词义理解'}。`,
                    meta: { type: 'word', data: w }
                });

                const correct2 = w.d || w.w;
                const opts2 = shuffle([
                    correct2,
                    `${w.w} to do blindly`,
                    `be ${w.w} with random`,
                    `an incorrect form of ${w.w}`
                ]);
                qs.push({
                    type: '错题巩固 - 搭配回练',
                    q: `Which form or collocation is correctly related to "${w.w}"?`,
                    opts: opts2,
                    ans: opts2.indexOf(correct2),
                    rat: `[解析] 正确搭配/派生形式是：${correct2}。`,
                    meta: { type: 'word', data: w }
                });
            } else if (mistakeMeta.type === 'grammar') {
                const g = mistakeMeta.data;
                const correct1 = g.r || g.p || g.t;
                const opts1 = shuffle([
                    correct1,
                    'Ignore the sentence structure and just choose the longest form.',
                    'Use the same pattern in every sentence.',
                    'Translate Chinese directly without checking grammar.'
                ]);
                qs.push({
                    type: '错题巩固 - 规则回练',
                    q: `What is the key rule behind "${g.t}"?`,
                    opts: opts1,
                    ans: opts1.indexOf(correct1),
                    rat: `[解析] 核心规则是：${g.r || g.p || g.t}。`,
                    meta: { type: 'grammar', data: g }
                });

                const correct2 = g.p || g.r || 'Check structure, meaning and signal words.';
                const opts2 = shuffle([
                    correct2,
                    'Guess according to feeling.',
                    'Prefer the -ing form whenever uncertain.',
                    'Ignore subject, tense and logical relation.'
                ]);
                qs.push({
                    type: '错题巩固 - 避坑回练',
                    q: `How should you avoid mistakes on "${g.t}" next time?`,
                    opts: opts2,
                    ans: opts2.indexOf(correct2),

                    meta: { type: 'grammar', data: g }
                });
            } else if (mistakeMeta.type === 'sentence') {
                const s = mistakeMeta.data;
                const correct = s.e;
                const opts = shuffle([
                    correct,
                    'It means something completely opposite.',
                    'It only explains a grammar point.',
                    'It has no connection with the unit.'
                ]);
                qs.push({
                    type: '错题巩固 - 句意回练',
                    q: `Choose the best understanding of the sentence:
"${s.z}"`,
                    opts,
                    ans: opts.indexOf(correct),
                    rat: `[解析] 正确理解是：${s.e}。`,
                    meta: { type: 'sentence', data: s }
                });
            } else if (mistakeMeta.type === 'writing') {
                const w = mistakeMeta.data?.word;
                const g = mistakeMeta.data?.grammar;
                const correct = `Use the word accurately, keep the topic clear, and match the grammar point "${g?.t || 'of the unit'}".`;
                const opts = shuffle([
                    correct,
                    'Use a memorized sentence without checking whether it fits the topic.',
                    'Choose vocabulary only by difficulty level.',
                    'Ignore grammar and focus only on Chinese meaning.'
                ]);
                qs.push({
                    type: '错题巩固 - 写作回练',
                    q: `When writing with "${w?.w || 'the target word'}", what should you do first?`,
                    opts,
                    ans: opts.indexOf(correct),
                    rat: `[解析] 写作时要同时保证主题、词义、搭配和语法都正确。`,
                    meta: { type: 'writing', data: { word: w, grammar: g } }
                });
            }

            return qs;
        };
