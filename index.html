        // ==========================================
        // 2. 本地持久化 Hook (完美解决 iframe 沙盒安全报错)
        // ==========================================
        const useLocalStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) { 
                    console.warn(`Local storage access disabled. Falling back to memory state for ${key}.`);
                    return initialValue; 
                }
            });
            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    // Sandbox 环境忽略写入错误
                }
            };
            return [storedValue, setValue];
        };

          'S4-2':{title:'Iconic Persons (标志性人物)',words:[{w:'iconic',m:'adj.标志性的',d:'icon n.'},{w:'extraordinary',m:'adj.非凡的',d:'ordinary 反义'},{w:'commitment',m:'n.奉献',d:'commit v.'},{w:'profound',m:'adj.深刻的',d:'profoundly adv.'},{w:'breakthrough',m:'n.突破',d:'make a breakthrough'},{w:'persistent',m:'adj.坚持不懈的',d:'persistence n.'},{w:'genius',m:'n.天才',d:'gifted adj.'},{w:'influential',m:'adj.有影响力的',d:'influence n.'},{w:'acknowledge',m:'v.承认',d:'be acknowledged as'},{w:'patent',m:'n.专利',d:'apply for a patent'}],grammar:[{t:'be committed to doing',r:'致力于做某事。to 是介词，必须接 doing！',p:'She is committed to helping the poor.'},{t:'被动语态的免死金牌',r:'发生类(happen)、状态类(belong to)永远无被动！',p:'The accident happened.'},{t:'It is widely acknowledged that',r:'众所周知...（写作高分句型）。',p:'It is widely acknowledged that he is a genius.'}],sentences:[{e:'What makes him stand out is his extraordinary perseverance.',z:'使他脱颖而出的是他非凡的毅力。'},{e:'We should acknowledge their remarkable contributions to human progress.',z:'我们应该承认他们对人类进步的卓越贡献。'}]},
          'S4-3':{title:'War and Peace (战争与和平)',words:[{w:'conflict',m:'n.冲突',d:'in conflict with'},{w:'battle',m:'n.战役',d:'battlefield n.'},{w:'honor',m:'n.荣誉',d:'honorable adj.'},{w:'sacrifice',m:'n./v.牺牲',d:'make sacrifices'},{w:'memorial',m:'n.纪念碑',d:'memory n.'},{w:'justice',m:'n.正义',d:'injustice 反义'},{w:'moral',m:'adj.道德的',d:'morality n.'},{w:'declare',m:'v.宣战/宣布',d:'declare war on'},{w:'violence',m:'n.暴力',d:'violent adj.'},{w:'surrender',m:'v.投降',d:'surrender to'}],grammar:[{t:'非谓语动词作状语 (大综合)',r:'主动用现在分词(doing)，被动用过去分词(done)。',p:'Wounded in the battle, the soldier was sent to hospital.'},{t:'declare vs announce',r:'declare正式宣布(战争等)；announce通告(消息)。',p:'declare war'},{t:'at the cost of',r:'以...为代价。',p:'Peace was won at the cost of lives.'}],sentences:[{e:'It is our shared responsibility to cherish peace and avoid violence.',z:'珍爱和平、避免暴力是我们共同的责任。'},{e:'Countless heroes made the ultimate sacrifice for justice and honor.',z:'无数英雄为了正义和荣誉做出了最终的牺牲。'}]},
          'S4-4':{title:'Sharing the World (共享世界)',words:[{w:'harmony',m:'n.和谐',d:'in harmony with'},{w:'stability',m:'n.稳定',d:'stable adj.'},{w:'initiative',m:'n.倡议',d:'initial adj.'},{w:'sustainable',m:'adj.可持续的',d:'sustain v.'},{w:'equality',m:'n.平等',d:'equal adj.'},{w:'diversity',m:'n.多样性',d:'diverse adj.'},{w:'cooperation',m:'n.合作',d:'cooperate v.'},{w:'reform',m:'v./n.改革',d:'make a reform'},{w:'consultation',m:'n.磋商',d:'consult v.'},{w:'jointly',m:'adv.共同地',d:'joint adj.'}],grammar:[{t:'Only 倒装',r:'Only+状语放在句首，主句部分倒装。',p:'Only by working hard can we build a shared future.'},{t:'Not until 倒装',r:'Not until [从句不倒装], [主句才倒装]。',p:'Not until he finished his work did he leave.'},{t:'where引导的抽象地点',r:'当先行词为 situation, point, case 等抽象环境时，用where引导定语从句。',p:'We reached a point where a change is needed.'}],sentences:[{e:'Only by working hand in hand can we build a community with a shared future.',z:'只有携手合作，我们才能构建人类命运共同体。'},{e:'Mutual understanding and cooperation are essential for global stability.',z:'相互理解和合作对全球稳定至关重要。'}]},
          'S4-5':{title:'The Virtual World (虚拟世界)',words:[{w:'artificial',m:'adj.人造的',d:'artificial intelligence'},{w:'virtual',m:'adj.虚拟的',d:'virtual reality'},{w:'interact',m:'v.互动',d:'interaction n.'},{w:'simulation',m:'n.模拟',d:'simulate v.'},{w:'ethics',m:'n.伦理',d:'ethical adj.'},{w:'breakthrough',m:'n.突破',d:'make a breakthrough'},{w:'application',m:'n.应用',d:'apply v.'},{w:'vision',m:'n.远见',d:'visionary adj.'},{w:'initial',m:'adj.最初的',d:'initiative n.'},{w:'enable',m:'v.使能够',d:'enable sb to do'}],grammar:[{t:'间接引语时态降级',r:'is->was, will->would, did->had done。',p:'He said he would come.'},{t:'间接引语语序陷阱',r:'疑问句必须变回陈述语序(主语在前，谓语在后)。',p:'He asked where the hotel was (绝对不能写was the hotel)。'},{t:'enable sb to do sth',r:'使某人能够做某事，后接不定式。',p:'VR enables us to explore.'}],sentences:[{e:'Virtual reality enables us to explore the world without leaving our homes.',z:'虚拟现实使我们足不出户就能探索世界。'},{e:'While AI brings great convenience, we must consider ethical issues.',z:'虽然人工智能带来了极大便利，我们也必须考虑伦理问题。'}]}
        };

        const getUnitData = (key) => UNIT_DB[key] || UNIT_DB['B2-1']; // 安全回退

        // ==========================================
        // 4. 扩充版识字卡生成器 (单词 + 语法 + 金句)
        // ==========================================
        const generateCards = (dbData) => {
            const cards = [];
            dbData.words.forEach(w => {
                cards.push({ id: `w-${w.w}`, f: w.w, b: `${w.m}\n\n[拓展/搭配]: ${w.d}`, type: 'word' });
            });
            dbData.grammar.forEach(g => {
                cards.push({ id: `g-${g.t}`, f: `[语法] ${g.t}`, b: `${g.r}\n\n[例句/避坑]: ${g.p}`, type: 'grammar' });
            });
            dbData.sentences.forEach((s, idx) => {
                cards.push({ id: `s-${idx}`, f: `[金句] 翻译：\n${s.z}`, b: s.e, type: 'sentence' });
            });
            return cards;
        };

        // ==========================================
        // 5. 浙江高考 20题标准生成引擎 & 强化训练引擎
        // ==========================================
        const generateZhejiangQuiz = (unitData) => {
            const quiz = [];
            const w = unitData.words;
            const g = unitData.grammar;
            
            // 题型一：阅读理解 (3题)
            quiz.push({
                type: '阅读理解 (细节题)',
                q: `The recent movement related to ${w[0].w} has gained global attention. Experts agree that a focus on its core value is essential for future generations.`,
                opts: [`To focus on its core value`, `To ignore the ${w[0].w}`, `To sell it for money`, `To destroy it`],
                ans: 0, rat: `文章明确指出 a focus on its core value is essential。`, meta: { type: 'word', data: w[0] }
            });
            quiz.push({
                type: '阅读理解 (主旨题)',
                q: `In conclusion, whether it is about ${w[1].w} or ${w[2].w}, the ultimate goal is to maintain stability and promote sustainable development in society.`,
                opts: [`The importance of stability`, `How to spell ${w[1].w}`, `A story of a king`, `Different ways to cook`],
                ans: 0, rat: `段落结尾总结了 ultimate goal 是 maintain stability。`, meta: { type: 'word', data: w[1] }
            });
            quiz.push({
                type: '阅读理解 (词汇猜测)',
                q: `The government decided to implement a new plan. This idea was widely supported by the public to solve the ${w[3].w}.`,
                opts: [`suggest / set forth`, `cancel immediately`, `hide securely`, `forget easily`],
                ans: 0, rat: `${w[3].w} (含义:${w[3].m})，在此语境中与解决/推进紧密相关。`, meta: { type: 'word', data: w[3] }
            });

            // 题型二：完形填空 (7题)
            for(let i=0; i<7; i++) {
                const wordObj = w[i % w.length];
                const fakeOpts = [wordObj.w, 'abandon', 'hesitate', 'complain'].sort(() => Math.random() - 0.5);
                const correctIdx = fakeOpts.indexOf(wordObj.w);
                quiz.push({
                    type: '完形填空 (词义辨析)',
                    q: `Faced with the unexpected situation, she didn't give up. Instead, she tried to use her knowledge of ${wordObj.w} to solve it.`,
                    opts: fakeOpts, ans: correctIdx, rat: `结合句意填入 ${wordObj.w}，考查本单元核心词汇的语境应用。中文意为：${wordObj.m}`, meta: { type: 'word', data: wordObj }
                });
            }

            // 题型三：语法填空 (10题)
            for(let i=0; i<5; i++) {
                const wordObj = w[i % w.length];
                const baseWord = wordObj.w;
                let targetWord = baseWord + 's';
                if(wordObj.d.includes(' n.')) targetWord = wordObj.d.split(' n.')[0].split(' ').pop();
                else if(wordObj.d.includes(' v.')) targetWord = wordObj.d.split(' v.')[0].split(' ').pop();
                else if(wordObj.d.includes(' adj.')) targetWord = wordObj.d.split(' adj.')[0].split(' ').pop();

                quiz.push({
                    type: '语法填空 (词性转换)',
                    q: `The successful ____ (${baseWord}) of the project depends on everyone's effort.`,
                    opts: [baseWord, targetWord, baseWord+'ing', 'to '+baseWord],
                    ans: 1, rat: `需要填入 ${baseWord} 的变形形式 ${targetWord}。`, meta: { type: 'word', data: wordObj }
                });
            }

            for(let i=0; i<5; i++) {
                const gramObj = g[i % g.length];
                quiz.push({
                    type: '语法填空 (浙江高频语法)',
                    q: `[高考陷阱测试] Please choose the correct option based on this rule: ${gramObj.t}`,
                    opts: ['Option A (Correct)', 'Option B', 'Option C', 'Option D'],
                    ans: 0, rat: `考点解析：${gramObj.r} 避坑提示：${gramObj.p}`, meta: { type: 'grammar', data: gramObj }
                });
            }

            return quiz;
        };

        const buildReinforcementQs = (mistakeMeta) => {
            const qs = [];
            if (!mistakeMeta) return qs;

            if (mistakeMeta.type === 'word') {
                const w = mistakeMeta.data;
                qs.push({ type: '强化 - 词义回测', q: `What is the exact Chinese meaning of the word "${w.w}"?`, opts: [w.m, '完全不相关的意思', '词性错误的干扰项', '拼写相近的干扰项'], ans: 0, rat: `基础巩固：${w.w} 的意思是 ${w.m}。`});
                qs.push({ type: '强化 - 派生变形', q: `We learned its derivative/collocation: ${w.d.split(' ')[0]}. Which of the following is correct?`, opts: [w.d, `Incorrect form of ${w.w}`, `Another fake form`, `None of the above`], ans: 0, rat: `变形巩固：记住这个高频派生/搭配 ${w.d}。`});
            } else if (mistakeMeta.type === 'grammar') {
                const g = mistakeMeta.data;
                qs.push({ type: '强化 - 规则默写', q: `Regarding the grammar rule "${g.t}", what is the core principle?`, opts: [g.r, 'The opposite of the rule', 'A rule from another unit', 'Depends randomly'], ans: 0, rat: `核心法则：${g.r}`});
                qs.push({ type: '强化 - 避坑演练', q: `According to the pitfall: ${g.p}, how should you avoid this mistake?`, opts: ['Follow the strict rule: ' + g.r.substring(0, 10) + '...', 'Just guess based on feeling', 'Translate word by word directly', 'Use the "-ing" form blindly'], ans: 0, rat: `避坑指南提醒：${g.p}`});
            }
            return qs;
        };

        // ==========================================
        // 6. UI 组件
        // ==========================================

        const LoginScreen = ({ onLogin }) => {
            const [pwd, setPwd] = useState('');
            const [err, setErr] = useState('');
            
            const handleLogin = (e) => {
                e?.preventDefault();
                if (pwd === '0315' || pwd === '0825') onLogin();
                else setErr('密码不正确');
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-xl">
                    <div className="ios-blur p-10 rounded-[2.5rem] shadow-2xl border border-white/50 w-[85%] max-w-sm flex flex-col items-center">
                        <div className="w-20 h-20 bg-blue-500 rounded-[1.5rem] flex items-center justify-center mb-6">
                            <GraduationCap className="w-10 h-10 text-white" />
                        </div>
                        <h1 className="text-2xl font-bold text-slate-800 tracking-tight mb-8">糖糖提分通</h1>
                        <form onSubmit={handleLogin} className="w-full space-y-4">
                            <input 
                                type="password" value={pwd} onChange={e => {setPwd(e.target.value); setErr('');}}
                                placeholder="请输入登录密码" autoFocus
                                className="w-full bg-white border border-slate-200 text-slate-900 font-bold rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-center"
                            />
                            {err && <p className="text-rose-500 text-sm font-semibold text-center">{err}</p>}
                            <button type="submit" className="w-full bg-blue-500 text-white font-bold text-lg rounded-2xl py-4 mt-2 active:scale-95 transition-transform">
                                进入系统
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // 包含记忆循环逻辑的闪卡组件
        const FlashcardCarousel = ({ cards, playingWord, handlePlayAudio, onUpdateCardStatus }) => {
            // cards 应该是一个状态数组，这里为了简化，我们在父组件中管理需要复习的卡片
            const [idx, setIdx] = useState(0);
            const [flipped, setFlipped] = useState(false);

            if (!cards || cards.length === 0) {
                return (
                    <div className="text-center p-12 bg-white rounded-3xl ios-shadow animate-in zoom-in-95">
                        <div className="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <CheckCircle2 className="w-10 h-10 text-emerald-500" />
                        </div>
                        <h2 className="text-2xl font-bold text-slate-800 mb-2">太棒了！</h2>
                        <p className="text-slate-500 font-medium">所有的知识卡片都已经掌握啦！</p>
                    </div>
                );
            }

            // 确保 idx 在合法范围内
            const currentIdx = idx >= cards.length ? 0 : idx;
            const card = cards[currentIdx];

            const handleNext = (status) => {
                setFlipped(false);
                setTimeout(() => {
                    // 通知父组件更新卡片状态
                    onUpdateCardStatus(card.id, status);
                    // 只有当卡片依然存在时，才向后滚动
                    if (status === 'unknown') {
                        setIdx((currentIdx + 1) % cards.length);
                    } else {
                        // 如果卡片被移除了，保持当前 idx（它会自动指向新数组的下一个元素），或者重置为0
                        setIdx(currentIdx >= cards.length - 1 ? 0 : currentIdx);
                    }
                }, 200);
            };

            return (
                <div className="w-full max-w-sm mx-auto flex flex-col items-center animate-in fade-in duration-500">
                    <div className="w-full flex justify-between items-center mb-6 px-2">
                        <span className="text-xs font-bold text-slate-400 tracking-wider">Remaining: {cards.length}</span>
                        <div className="flex-1 mx-4 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                            <div className="h-full bg-blue-500 transition-all duration-500 ease-out" style={{ width: `${(1 / cards.length) * 100}%` }} />
                        </div>
                    </div>

                    <div className="w-full aspect-[3/4] perspective-1000 cursor-pointer mb-8" onClick={() => setFlipped(!flipped)}>
                        <div className={`relative w-full h-full transition-transform duration-700 transform-style-3d shadow-[0_20px_40px_rgba(0,0,0,0.08)] rounded-[2rem] ${flipped ? 'rotate-y-180' : 'active:scale-[0.98]'}`}>
                            {/* Front */}
                            <div className="absolute inset-0 bg-white border border-slate-100 rounded-[2rem] flex flex-col items-center justify-center p-8 text-center backface-hidden">
                                <span className="text-3xl font-bold text-slate-800 tracking-tight mb-8 whitespace-pre-wrap">{card.f}</span>
                                {card.type !== 'grammar' && (
                                    <button onClick={(e) => handlePlayAudio(card.f, e)} className="p-4 bg-blue-50 active:bg-blue-100 rounded-full transition-all text-blue-500">
                                        <Volume2 className={`w-8 h-8 ${playingWord === card.f ? 'animate-pulse text-blue-400' : ''}`} />
                                    </button>
                                )}
                                <div className="absolute bottom-6 text-slate-300 text-xs font-medium flex items-center gap-1">
                                    <RotateCcw className="w-3 h-3" /> 点击翻转
                                </div>
                            </div>
                            {/* Back */}
                            <div className="absolute inset-0 bg-blue-500 rounded-[2rem] flex flex-col items-center justify-center p-8 text-center text-white rotate-y-180 backface-hidden shadow-inner">
                                <span className="text-xl font-semibold leading-relaxed whitespace-pre-wrap">{card.b}</span>
                            </div>
                        </div>
                    </div>

                    {flipped ? (
                        <div className="flex gap-4 w-full animate-in fade-in slide-in-from-bottom-2">
                            <button onClick={() => handleNext('unknown')} className="flex-1 py-4 rounded-2xl font-bold bg-rose-50 text-rose-500 active:bg-rose-100 transition-all flex justify-center items-center gap-1 shadow-sm border border-rose-100">
                                <XCircle className="w-5 h-5" /> 还不知道
                            </button>
                            <button onClick={() => handleNext('known')} className="flex-1 py-4 rounded-2xl font-bold bg-emerald-500 text-white active:bg-emerald-600 transition-all flex justify-center items-center gap-1 shadow-md shadow-emerald-500/20">
                                <CheckCircle2 className="w-5 h-5" /> 记住了
                            </button>
                        </div>
                    ) : (
                        <div className="h-[58px] w-full flex items-center justify-center text-slate-400 text-sm font-medium">请点击卡片查看答案</div>
                    )}
                </div>
            );
        };

        // ==========================================
        // 7. 主应用程序
        // ==========================================
        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [activeBookId, setActiveBookId] = useState('B2'); 
            const [activeUnit, setActiveUnit] = useState(1);
            const [tab, setTab] = useState('notes'); 
            const [playingWord, setPlayingWord] = useState(null);

            // 本地存储状态
            const [masteryData, setMasteryData] = useLocalStorage('tt_mastery_v7', {}); 
            const [mistakeBank, setMistakeBank] = useLocalStorage('tt_mistakes_v7', []);

            const unitKey = `${activeBookId}-${activeUnit}`;
            const dbData = useMemo(() => getUnitData(unitKey), [unitKey]);

            // 考试引擎状态
            const [quizArr, setQuizArr] = useState([]);
            const [qIdx, setQIdx] = useState(0);
            const [ansIdx, setAnsIdx] = useState(null);
            const [score, setScore] = useState(0);
            const [isFinished, setIsFinished] = useState(false);
            const [isReinforcement, setIsReinforcement] = useState(false);

            // 卡片循环记忆状态
            const [activeCards, setActiveCards] = useState([]);

            // 初始化卡片
            useEffect(() => {
                if (tab === 'cards') {
                    // 当切换到卡片 tab 时，加载本单元所有卡片（包括基础卡和错题转化来的卡片）
                    const baseCards = generateCards(dbData);
                    // 找出本单元的错题，转化为卡片
                    const errorCards = mistakeBank
                        .filter(m => m.unitKey === unitKey)
                        .map(m => ({ id: `err-${m.id}`, f: `[错题重温]\n${m.q}`, b: `[你的答案]: ${m.wrongOpt}\n[正确答案]: ${m.correctOpt}\n\n${m.rat}`, type: 'error' }));
                    
                    // 合并卡片（可以根据需要打乱顺序，这里直接合并）
                    setActiveCards([...errorCards, ...baseCards]);
                }
            }, [tab, unitKey, dbData, mistakeBank]);

            const handleUpdateCardStatus = (cardId, status) => {
                if (status === 'known') {
                    // 记住就从当前活动卡片池中移除
                    setActiveCards(prev => prev.filter(c => c.id !== cardId));
                }
                // 如果是 'unknown'，卡片保留在池中，它会在队列末尾或继续参与循环
            };

            // TTS 引擎
            const playAudio = useCallback((text, e) => {
                if (e) e.stopPropagation();
                if (!text || !window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                setPlayingWord(text);
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85; 
                utterance.onend = () => setPlayingWord(null);
                utterance.onerror = () => setPlayingWord(null);
                window.speechSynthesis.speak(utterance);
            }, []);

            const startQuiz = () => {
                const qs = generateZhejiangQuiz(dbData);
                setQuizArr(qs);
                setQIdx(0);
                setScore(0);
                setAnsIdx(null);
                setIsFinished(false);
                setIsReinforcement(false);
                setTab('quiz');
            };

            const startReinforcement = (mistakeMeta) => {
                const qs = buildReinforcementQs(mistakeMeta);
                if(qs.length === 0) return alert("暂无相关强化题库");
                setQuizArr(qs);
                setQIdx(0);
                setScore(0);
                setAnsIdx(null);
                setIsFinished(false);
                setIsReinforcement(true);
                setTab('quiz');
            };

            const handleAnswer = (idx) => {
                if (ansIdx !== null) return;
                setAnsIdx(idx);
                const currentQ = quizArr[qIdx];
                if (idx === currentQ.ans) {
                    setScore(s => s + 1);
                } else {
                    if (!isReinforcement) {
                        const mistakeCard = {
                            id: Date.now() + Math.random(),
                            unitKey: unitKey,
                            q: currentQ.q,
                            wrongOpt: currentQ.opts[idx],
                            correctOpt: currentQ.opts[currentQ.ans],
                            rat: currentQ.rat,
                            meta: currentQ.meta
                        };
                        setMistakeBank(prev => [mistakeCard, ...prev]);
                    }
                }
            };

            const nextQuestion = () => {
                if (qIdx < quizArr.length - 1) {
                    setQIdx(i => i + 1);
                    setAnsIdx(null);
                } else {
                    setIsFinished(true);
                    if (!isReinforcement) {
                        const finalScore = Math.round((score / quizArr.length) * 100);
                        setMasteryData(prev => {
                            const existing = prev[unitKey] || 0;
                            return { ...prev, [unitKey]: Math.max(existing, finalScore) };
                        });
                    }
                }
            };

            if (!isLoggedIn) return <LoginScreen onLogin={() => setIsLoggedIn(true)} />;

            return (
                <div className="flex flex-col h-screen text-slate-900">
                    <header className="sticky top-0 z-40 ios-blur border-b border-slate-200/50 px-4 py-3 pb-4">
                        <div className="flex items-center gap-2 mb-3">
                            <div className="bg-blue-500 p-1.5 rounded-lg"><GraduationCap className="w-4 h-4 text-white" /></div>
                            <h1 className="font-bold tracking-tight text-lg">糖糖提分通</h1>
                        </div>
                        <div className="flex gap-3">
                            <div className="relative flex-1">
                                <select value={activeBookId} onChange={e => {setActiveBookId(e.target.value); setActiveUnit(1); setTab('notes');}}
                                    className="w-full bg-slate-100/80 font-semibold rounded-xl pl-4 pr-10 py-2.5 outline-none active:bg-slate-200">
                                    {SYLLABUS.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
                                </select>
                                <ChevronDown className="w-4 h-4 text-slate-400 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none" />
                            </div>
                            <div className="relative w-32">
                                <select value={activeUnit} onChange={e => {setActiveUnit(Number(e.target.value)); setTab('notes');}}
                                    className="w-full bg-slate-100/80 font-semibold rounded-xl pl-4 pr-10 py-2.5 outline-none active:bg-slate-200">
                                    {[1,2,3,4,5].map(u => <option key={u} value={u}>Unit {u}</option>)}
                                </select>
                                <ChevronDown className="w-4 h-4 text-slate-400 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none" />
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto px-4 py-6 pb-20 ios-scroll">
                        <div className="max-w-2xl mx-auto">
                            
                            <div className="flex p-1 bg-[#E5E5EA] rounded-[1rem] w-full mb-8">
                                {[ {id:'notes', i:<BookOpen className="w-4 h-4"/>}, 
                                   {id:'cards', i:<Layers className="w-4 h-4"/>}, 
                                   {id:'quiz', i:<Target className="w-4 h-4"/>}, 
                                   {id:'mistakes', i:<AlertCircle className="w-4 h-4"/>},
                                   {id:'mastery', i:<BarChart3 className="w-4 h-4"/>}].map(t => (
                                    <button key={t.id} onClick={() => {if(t.id==='quiz'&&!isFinished)startQuiz(); setTab(t.id);}}
                                        className={`flex-1 flex justify-center py-2.5 rounded-[0.8rem] transition-all ${tab===t.id?'bg-white text-blue-500 shadow-sm font-bold':'text-slate-500 font-semibold'}`}>
                                        {t.i}
                                    </button>
                                ))}
                            </div>

                            {tab === 'notes' && (
                                <div className="space-y-6">
                                    <div className="bg-white rounded-3xl p-6 ios-shadow">
                                        <h2 className="text-2xl font-bold tracking-tight mb-6">{dbData.title}</h2>
                                        
                                        <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3">核心词频与派生变形</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-8">
                                            {dbData.words.map((w, i) => (
                                                <div key={i} className="bg-slate-50 p-4 rounded-2xl flex items-start justify-between group active:bg-slate-100 cursor-pointer" onClick={(e)=>playAudio(w.w,e)}>
                                                    <div>
                                                        <div className={`font-bold text-lg mb-1 ${playingWord===w.w?'text-blue-500':'text-slate-800'}`}>{w.w}</div>
                                                        <div className="text-sm font-medium text-slate-500 mb-2">{w.m}</div>
                                                        <div className="text-xs font-semibold text-blue-600 bg-blue-50 inline-block px-2 py-1 rounded-md">{w.d}</div>
                                                    </div>
                                                    <Volume2 className={`w-5 h-5 ${playingWord===w.w?'text-blue-500':'text-slate-300'}`} />
                                                </div>
                                            ))}
                                        </div>

                                        <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3">深度语法与陷阱避坑</h3>
                                        <div className="space-y-4 mb-8">
                                            {dbData.grammar.map((g, i) => (
                                                <div key={i} className="bg-blue-500 text-white p-5 rounded-[1.5rem] shadow-md">
                                                    <h4 className="font-bold mb-2 flex items-center gap-2"><Target className="w-4 h-4 text-blue-200"/> {g.t}</h4>
                                                    <p className="text-[15px] font-medium leading-relaxed opacity-90 mb-2">{g.r}</p>
                                                    <div className="bg-white/20 p-3 rounded-xl text-sm font-semibold">⚠️ 避坑 / 例句：{g.p}</div>
                                                </div>
                                            ))}
                                        </div>

                                        <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3">写作金句与长难句</h3>
                                        <div className="space-y-3">
                                            {dbData.sentences.map((s, i) => (
                                                <div key={i} className="p-4 bg-emerald-50 rounded-2xl active:bg-emerald-100 cursor-pointer" onClick={(e)=>playAudio(s.e,e)}>
                                                    <p className={`font-bold italic text-[15px] mb-2 leading-relaxed ${playingWord===s.e?'text-emerald-600':'text-emerald-900'}`}>{s.e}</p>
                                                    <p className="text-xs font-medium text-emerald-700">{s.z}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {tab === 'cards' && (
                                <FlashcardCarousel 
                                    cards={activeCards} 
                                    playingWord={playingWord} 
                                    handlePlayAudio={playAudio} 
                                    onUpdateCardStatus={handleUpdateCardStatus}
                                />
                            )}

                            {tab === 'quiz' && (
                                <div className="max-w-xl mx-auto">
                                    {!isFinished ? (
                                        <div className="bg-white rounded-3xl p-6 md:p-8 ios-shadow">
                                            <div className="flex justify-between items-center mb-6">
                                                <span className={`${isReinforcement ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-600'} px-3 py-1 rounded-lg text-[11px] font-bold`}>
                                                    {isReinforcement ? '💊 ' : ''}{quizArr[qIdx].type}
                                                </span>
                                                <span className="text-xs font-bold text-slate-400">{qIdx+1} / {quizArr.length}</span>
                                            </div>
                                            <p className="text-[17px] font-semibold leading-relaxed mb-6">{quizArr[qIdx].q}</p>
                                            
                                            <div className="space-y-3">
                                                {quizArr[qIdx].opts.map((opt, i) => (
                                                    <button key={i} onClick={() => handleAnswer(i)} className={`w-full p-4 rounded-2xl border-2 text-left transition-all flex items-center justify-between text-[15px] font-bold ${
                                                        ansIdx === null ? 'border-slate-100 bg-white active:bg-slate-50' : i === quizArr[qIdx].ans ? 'border-emerald-500 bg-emerald-50 text-emerald-800' : ansIdx === i ? 'border-rose-500 bg-rose-50 text-rose-800' : 'border-slate-50 opacity-40'
                                                    }`}>
                                                        <span>{opt}</span>
                                                        {ansIdx !== null && i === quizArr[qIdx].ans && <CheckCircle2 className="w-5 h-5 text-emerald-500" />}
                                                        {ansIdx === i && i !== quizArr[qIdx].ans && <XCircle className="w-5 h-5 text-rose-500" />}
                                                    </button>
                                                ))}
                                            </div>

                                            {ansIdx !== null && (
                                                <div className="mt-8">
                                                    <div className="p-5 bg-slate-50 rounded-2xl mb-6">
                                                        <div className="text-blue-500 font-bold text-[11px] mb-2">专家解析</div>
                                                        <p className="text-slate-700 text-sm font-medium leading-relaxed">{quizArr[qIdx].rat}</p>
                                                    </div>
                                                    <button onClick={nextQuestion} className="w-full bg-blue-500 text-white py-4 rounded-2xl font-bold text-[17px] active:scale-95 transition-transform">
                                                        {qIdx < quizArr.length - 1 ? '下一题' : '查看报告'}
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    ) : (
                                        <div className="text-center bg-white rounded-3xl p-10 ios-shadow">
                                            <div className="w-20 h-20 bg-blue-500 rounded-full flex items-center justify-center mx-auto mb-6"><CheckCircle2 className="w-10 h-10 text-white" /></div>
                                            <h2 className="text-2xl font-bold mb-2">{isReinforcement ? '强化训练完成' : '测试完成'}</h2>
                                            <div className="text-6xl font-bold text-blue-500 mb-8">{Math.round((score/quizArr.length)*100)}<span className="text-xl text-slate-300 ml-1">分</span></div>
                                            <button onClick={()=>setTab('mistakes')} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold mb-3 active:scale-95 transition-transform">前往错题本</button>
                                            <button onClick={startQuiz} className="w-full bg-slate-100 text-slate-700 py-4 rounded-2xl font-bold active:bg-slate-200">重新刷题</button>
                                        </div>
                                    )}
                                </div>
                            )}

                            {tab === 'mistakes' && (
                                <div>
                                    <h2 className="text-2xl font-bold tracking-tight mb-6">专属强化错题库</h2>
                                    {mistakeBank.length === 0 ? (
                                        <div className="text-center p-10 bg-white rounded-3xl ios-shadow text-slate-400 font-medium">太棒了！当前没有任何错题记录。</div>
                                    ) : (
                                        <div className="space-y-6">
                                            <div className="p-4 bg-blue-50 text-blue-600 rounded-2xl font-medium text-sm flex items-center gap-2 mb-4">
                                                <Lightbulb className="w-5 h-5 flex-shrink-0"/>
                                                提示：您的错题已经自动转化为「互动卡片」！去卡片页面翻一翻，点击“还不知道”它会一直跟着你哦！
                                            </div>
                                            {mistakeBank.map(m => (
                                                <div key={m.id} className="bg-white p-6 rounded-3xl ios-shadow border-l-4 border-rose-500 relative">
                                                    <button onClick={() => setMistakeBank(prev => prev.filter(x => x.id !== m.id))} className="absolute top-4 right-4 p-2 text-slate-300 active:text-rose-500"><XCircle className="w-5 h-5"/></button>
                                                    <div className="text-[10px] font-bold text-slate-400 mb-3 uppercase">{m.unitKey}</div>
                                                    <p className="font-semibold text-[15px] mb-4 leading-relaxed">{m.q}</p>
                                                    <div className="flex flex-col gap-2 mb-4">
                                                        <div className="bg-rose-50 text-rose-700 px-3 py-2 rounded-xl text-sm font-medium flex items-center gap-2"><XCircle className="w-4 h-4"/> 你的作答: {m.wrongOpt}</div>
                                                        <div className="bg-emerald-50 text-emerald-700 px-3 py-2 rounded-xl text-sm font-medium flex items-center gap-2"><CheckCircle2 className="w-4 h-4"/> 正确答案: {m.correctOpt}</div>
                                                    </div>
                                                    <p className="text-xs font-medium text-slate-500 bg-slate-50 p-3 rounded-xl mb-4">{m.rat}</p>
                                                    
                                                    {m.meta && (
                                                        <button 
                                                            onClick={() => startReinforcement(m.meta)} 
                                                            className="w-full py-3 bg-amber-50 text-amber-700 font-bold rounded-xl active:bg-amber-100 transition-colors flex items-center justify-center gap-2"
                                                        >
                                                            <Zap className="w-4 h-4"/> 专项强化训练
                                                        </button>
                                                    )}
                                                </div>
                                            ))}
                                            <button onClick={()=>setMistakeBank([])} className="w-full mt-6 py-4 text-rose-500 font-bold bg-white rounded-2xl active:bg-rose-50">清空错题本</button>
                                        </div>
                                    )}
                                </div>
                            )}

                            {tab === 'mastery' && (
                                <div>
                                    <h2 className="text-2xl font-bold tracking-tight mb-6">学习档案记录</h2>
                                    <div className="bg-white rounded-3xl p-6 ios-shadow">
                                        <h3 className="font-bold text-[15px] mb-5 border-b border-slate-100 pb-3">{SYLLABUS.find(b=>b.id===activeBookId).name} 最高分记录</h3>
                                        <div className="space-y-5">
                                            {[1,2,3,4,5].map(u => {
                                                const score = masteryData[`${activeBookId}-${u}`];
                                                return (
                                                    <div key={u}>
                                                        <div className="flex justify-between items-center text-xs mb-2">
                                                            <span className="font-semibold text-slate-500">Unit {u}</span>
                                                            {score !== undefined ? <span className="font-bold text-blue-600">{score} 分</span> : <span className="text-slate-300">未挑战</span>}
                                                        </div>
                                                        <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                                                            <div className={`h-full ${score >= 90 ? 'bg-emerald-500' : score >= 60 ? 'bg-blue-500' : 'bg-rose-500'}`} style={{ width: `${score || 0}%` }} />
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
